function makeBookingFromSub(s){
  var t=null;
  if(s.data&&s.data.tourId)t=tours.find(function(x){return x.id===s.data.tourId;});
  if(!t&&s.tour)t=tours.find(function(x){return shortName(x)===s.tour||x.name===s.tour;});
  /* avoid duplicate booking: match the source submission first, then guest+tour+start */
  var dup=bookings.find(function(b){return b.fromSub&&b.fromSub===s.id;})||
          bookings.find(function(b){return (b.guest||"").toLowerCase()===(s.name||"").toLowerCase()&&b.tour===(t?t.id:"")&&b.start===(s.start_date||(t?t.start:""));});
  if(!dup){
    var start=s.start_date||(t?t.start:"");var end=s.end_date||(t?t.end:start);
    var nb={id:"B"+Date.now()+Math.floor(Math.random()*100),fromSub:s.id,bookingDate:dShort(new Date()),tour:t?t.id:"",customTour:t?"":(s.tour||""),guest:s.name||"—",members:"",party:s.party||1,country:s.country||"—",email:s.email||"",phone:s.phone||"",status:"Confirmed",pay:"Deposit",notes:(s.data&&(s.data.message||s.data.medical))||"",start:start,end:end,deposit:0,lastPendingDate:""};
    bookings.unshift(nb);
    addOrUpdateCustomer(s);
    pushBooking(nb);
  }
  return t;
}
function convertToBooking(id){
  var s=_submissions.find(function(x){return x.id===id;});if(!s)return;
  var t=makeBookingFromSub(s);
  renderBookings();renderTours();renderCalendar();renderCustomers();setSubStatus(id,"booked",true);persistData();
  alert("Booking + customer created for "+(s.name||"guest")+(t?" on "+shortName(t):"")+". It now shows in Bookings, the tour, Calendar occupancy and Customers.");
}
/* Guest-detail submissions auto-create a booking + customer; interest submissions auto-create a lead.
   Idempotent via status, and the snapshot-clear stops phantom sample data. */
function autoProcessSubmissions(){
  var changed=false;
  (_submissions||[]).forEach(function(s){
    if(s.type==="reservation_response"||s.type==="op_status_update"||s.type==="driver_trip_log")return;
    /* Driver & guide registrations: RE-AFFIRM the directory record on every pass
       (idempotent — matched by name/phone) so a sync race can never leave them
       missing from the Drivers / External Guides tables. If the record already
       exists nothing changes (no push spam); if it was lost, it's recreated. The
       submission is the source of truth — delete the submission to remove the entry. */
    if(s.type==="driver"){
      if(addOrUpdateDriver(s))changed=true;
      if(s.status!=="booked"){s.status="booked";saveSubmissionRow(s);changed=true;}
      markSubProcessed(s.id);return;
    }
    if(s.type==="guidedir"){
      if(addOrUpdateExternalGuide(s))changed=true;
      if(s.status!=="booked"){s.status="booked";saveSubmissionRow(s);changed=true;}
      markSubProcessed(s.id);return;
    }
    /* one-time conversions for the rest */
    if(s.status==="booked"||s.status==="lead-added")return;
    if(subProcessed(s.id))return;
    if(s.type==="client"){makeBookingFromSub(s);s.status="booked";markSubProcessed(s.id);changed=true;saveSubmissionRow(s);}
    else if(s.type==="interest"){
      addOrUpdateCustomer(s);
      if(!leads.find(function(l){return (l.name||"").toLowerCase()===(s.name||"").toLowerCase()&&l.tour===(s.tour||"—");}))
        leads.unshift({id:"L"+Date.now()+Math.floor(Math.random()*100),name:s.name||"—",country:s.country||"—",tour:s.tour||"—",date:(s.start_date||"").slice(0,7)||"—",stage:"New",src:"Web form"});
      s.status="lead-added";markSubProcessed(s.id);changed=true;saveSubmissionRow(s);
    }
  });
  if(changed){renderBookings();renderTours();renderCalendar();renderCustomers();renderCRM();if(document.getElementById("guideBody"))renderGuides();if(document.getElementById("logBody"))renderLog(_logTab);persistData();}
}
/* Manual recovery lever: clears every driver's "already synced" vehicle ledger and
   re-runs the registration processor, so a vehicle that was silently dropped by a
   past bug (e.g. a blank-name entry, or a name-collision) gets a fresh chance to be
   added — without needing that driver to register again. Existing vehicles are
   untouched; this only lets already-processed submissions be re-evaluated. */
function forceResyncVehicles(){
  drivers.forEach(function(d){d.vehKeysSynced=[];});
  if(typeof loadSubmissions==="function")loadSubmissions(true);
  else if(typeof autoProcessSubmissions==="function"){autoProcessSubmissions();renderLog("Vehicles & Drivers");}
  alert("Re-checked every driver's registration for a missing vehicle.");
}
/* Registration-number identity: strips spaces/punctuation and case so "AN01 P9577",
   "AN01-P9577" and "an01p9577" all compare equal — reg no. is the true unique
   identifier for a vehicle, unlike its (often generic/repeated) name. */
function normReg(s){return String(s||"").toUpperCase().replace(/[^A-Z0-9]/g,"");}
/* A driver's self-registration flows into the Drivers directory (and adds their
   vehicle(s) to the Vehicles list if new), with an auto login code.
   IDENTITY: matched by source-submission id (fromSub) FIRST, then name/phone —
   so an admin rename/phone-edit still matches the same record instead of spawning
   a duplicate. Once adminLocked (set when the admin saves an edit in the console),
   registration data can never overwrite the record's fields again — only new
   vehicles from a later registration still get added (that's additive, never
   overwrites anything the admin touched).
   VEHICLES: tracked PER SUBMISSION via drv.vehSubsSynced (a list of submission ids
   already processed) — not a single once-ever flag. That was the bug: if the same
   driver submitted the form more than once (e.g. one registration per vehicle),
   only the first submission's vehicle(s) were ever added; the flag being already
   "true" silently blocked every later submission's vehicles forever. Per-submission
   tracking means every distinct registration's vehicles get added exactly once,
   however many times (or forms) a driver submits, while a submission already
   processed is never repeated (so a manually deleted vehicle from an
   already-processed submission won't reappear). */
function addOrUpdateDriver(s){
  if(!s.name)return false;var d=s.data||{};var changed=false;
  var drv=drivers.find(function(x){return x.fromSub===s.id;})
    ||drivers.find(function(x){return (x.name||"").toLowerCase()===s.name.toLowerCase()||(s.phone&&x.phone===s.phone);});
  var created=false;
  if(!drv){drv={name:s.name,code:String(Math.floor(1000+Math.random()*9000))};drivers.unshift(drv);changed=true;created=true;}
  drv.fromSub=drv.fromSub||s.id;
  if(!drv.adminLocked){
    if(created){drv.name=s.name;drv.phone=s.phone||"";}
    if(!drv.phone&&s.phone)drv.phone=s.phone;
    if(!drv.license&&d.license)drv.license=d.license;
    if(!drv.address&&d.address)drv.address=d.address;
    if(!drv.licenseDoc)drv.licenseDoc=d.licenseDoc||((d.documents&&d.documents[0]&&d.documents[0].url)||"");
    if(!drv.documents&&d.documents&&d.documents.length)drv.documents=d.documents;
  }
  if(!drv.code)drv.code=String(Math.floor(1000+Math.random()*9000));
  /* Vehicle identity is the REG. NO., not the name — two different physical
     vehicles can share a generic name (e.g. two "Xylo"s). Matching by name only
     (the old bug) treated a newly-registered vehicle as "already exists" whenever
     its name collided with an unrelated vehicle, silently dropping it forever.
     Tracked per VEHICLE (drv.vehKeysSynced, keyed by submission+reg/name) rather
     than per submission, so: (a) every vehicle in a multi-vehicle registration is
     evaluated on its own merits even if a sibling entry in the same submission
     collided by name, and (b) a vehicle already synced once won't reappear if an
     admin deletes it later. */
  var vlist=(d.vehicles&&d.vehicles.length)?d.vehicles:(d.vehicle?[{name:d.vehicle,reg:d.reg}]:[]);
  if(vlist[0]&&!drv.adminLocked){drv.veh=drv.veh||vlist[0].name||"";drv.reg=drv.reg||vlist[0].reg||"";}
  drv.vehKeysSynced=drv.vehKeysSynced||[];
  vlist.forEach(function(vv){
    if(!vv||(!vv.name&&!vv.reg))return; /* previously required a name, silently dropping a
       registration that only had a reg. no. entered (this is what happened to M Raju's
       vehicle) — now a reg. no. alone is enough to create the row. */
    var vvName=vv.name||vv.reg;
    var key=s.id+"|"+(normReg(vv.reg)||vvName.toLowerCase());
    if(drv.vehKeysSynced.indexOf(key)>-1)return; /* already handled once — respects a later admin delete */
    var vvReg=normReg(vv.reg);
    var existing=vehicles.find(function(v){return vvReg?normReg(v.reg)===vvReg:(v.name||"").toLowerCase()===vvName.toLowerCase();});
    if(!existing){
      vehicles.unshift({name:vvName,reg:vv.reg||"",type:"Car",cap:parseInt(vv.seats||d.seats)||0,driver:s.name,avail:"Available",fromSub:s.id});
      changed=true;
    }
    drv.vehKeysSynced.push(key);changed=true;
  });
  return changed;
}
/* A guide's self-registration flows into the External Guides directory. Same identity
   rules as drivers: match by fromSub first; once adminLocked (admin saved an edit),
   registration data can never overwrite the record's fields again. */
function addOrUpdateExternalGuide(s){
  if(!s.name)return false;
  var d=s.data||{};var changed=false;
  var g=externalGuides.find(function(x){return x.fromSub===s.id;})
    ||externalGuides.find(function(x){return (x.name||"").toLowerCase()===s.name.toLowerCase()||(s.phone&&x.phone===s.phone);});
  var created=false;
  if(!g){g={name:s.name};externalGuides.unshift(g);changed=true;created=true;}
  g.fromSub=g.fromSub||s.id;
  if(!g.adminLocked){
    if(created){g.name=s.name;g.phone=s.phone||"";}
    if(!g.phone&&s.phone)g.phone=s.phone;
    if(!g.email&&s.email)g.email=s.email;
    if(!g.expertise&&d.expertise)g.expertise=d.expertise;
    if(!g.address&&d.address)g.address=d.address;
    if(!g.idNo&&d.idNo)g.idNo=d.idNo;
    if(!g.idDoc)g.idDoc=d.licenseDoc||((d.documents&&d.documents[0]&&d.documents[0].url)||"");
    if(!g.documents&&d.documents&&d.documents.length)g.documents=d.documents;
  }
  guideId(g);
  return changed;
}
function setSubStatus(id,status,silent){
  var s=_submissions.find(function(x){return x.id===id;});if(s){s.status=status;saveSubmissionRow(s);}
  renderRequests();
}
function deleteSub(id){
  if(!confirm("Delete this submission?"))return;
  var s=_submissions.find(function(x){return x.id===id;});var cl=sbClient();
  markSubDeleted(id);markSubProcessed(id); /* never reappear, never re-auto-process */
  _submissions=_submissions.filter(function(x){return x.id!==id;});renderRequests();
  if(cl&&s&&s._rowid)cl.from("workspaces").delete().eq("id",s._rowid).then(function(){});
}

function applyReservationResponses(){
  var changed=false;
  (_submissions||[]).filter(function(s){return s.type==="reservation_response";}).forEach(function(s){
    var d=s.data||{};var r=reservations.find(function(x){return x.id===d.rid;});if(!r)return;

    else if(d.response==="declined"&&r.stage!=="declined"){r.stage="declined";r.declined=true;r.declinedAt=s.created_at;changed=true;}
  });

/* A guide's status update / withdraw-decline reason, submitted from ops-guide.html.
   _submissions is sorted NEWEST-first; apply OLDEST-first so that if a guide sent
   several updates, the most recent one is the one that's applied last and wins
   (applying in array order previously made the oldest update win — backwards). */
function applyOpStatusUpdates(){
  var changed=false;
  var updates=(_submissions||[]).filter(function(s){return s.type==="op_status_update"&&!subProcessed(s.id);});
  updates.sort(function(a,b){return (a.created_at||"").localeCompare(b.created_at||"");});
  updates.forEach(function(s){
    var d=s.data||{};var o=ops.find(function(x){return x.id===d.opId;});
    if(o){
      /* Status authority belongs to the guide: a guide's update sets the real,
         dashboard-facing status (and clears every driver-reported status, since
         the guide's call now supersedes them). A driver's update only ever sets
         a driver-reported status — per SEGMENT (d.segKey: "primary" for the
         operation's own Vehicle/Driver fields, "start|driver" for a leg), so a
         driver can complete leg 1 while their leg 3 stays Scheduled — and never
         touches the operation's real status on the board. */
      if(d.driver){
        var tgt=o;
        if(d.segKey&&d.segKey!=="primary"){tgt=(o.legs||[]).find(function(l){return ((l.start||"")+"|"+(l.driver||""))===d.segKey;})||o;}
        tgt.driverStatus=d.newStatus||tgt.driverStatus;
        if(d.clearFeedback){tgt.driverFeedback="";tgt.driverFeedbackAt="";}
        else if(d.reason){tgt.driverFeedback=d.reason;tgt.driverFeedbackAt=s.created_at;}
      }else{
        o.status=d.newStatus||o.status;clearDriverStatuses(o);
        if(d.clearFeedback){o.guideFeedback="";o.guideFeedbackAt="";}
        else if(d.reason){o.guideFeedback=d.reason;o.guideFeedbackAt=s.created_at;}
      }
      changed=true;
    }
    markSubProcessed(s.id);
  });
  if(changed){persistData();renderDashOps();}
}
/* A driver's self-logged trip, submitted from driver-app.html — added to tripLogs
   so it appears under Logistics > Daily Activity exactly like an owner-entered trip. */
function applyDriverTripLogs(){
  var changed=false;
  var logs=(_submissions||[]).filter(function(s){return s.type==="driver_trip_log"&&!subProcessed(s.id);});
  logs.sort(function(a,b){return (a.created_at||"").localeCompare(b.created_at||"");});
  logs.forEach(function(s){
    var d=s.data||{};
    if(!tripLogs.some(function(x){return x.fromSub===s.id;})){
      /* Trips logged in the driver app's offline mode carry no driver name
         (the app never fetched it) — only the driver's phone. Map that phone
         back to the driver here so the trip is attributed correctly. */
      var drvName=s.name;
      if((!drvName||drvName==="")&&d.phone){var _dn=function(p){return String(p||"").replace(/\D/g,"");};var drv=(drivers||[]).find(function(x){return _dn(x.phone)===_dn(d.phone);});drvName=(drv&&drv.name)||("Phone "+d.phone);}
      tripLogs.push({id:"TR"+Date.now()+Math.floor(Math.random()*100),fromSub:s.id,date:d.date||todayISO,veh:d.veh||"—",reg:d.reg||"",driver:drvName||"—",startKm:+d.startKm||0,endKm:+d.endKm||0,totalKm:Math.max((+d.endKm||0)-(+d.startKm||0),0),loc:d.loc||"—",time:d.time||"—",startT:d.startT||"",endT:d.endT||"",tourCode:d.tourCode||"",offline:!!d.offline});
      changed=true;
    }
    markSubProcessed(s.id);
  });
  if(changed){saveLogs();if(document.getElementById("logBody"))renderLog("Daily vehicle activity");}
}
/* A driver's request to delete their own logged trip — drivers can only ever
   INSERT new rows (RLS locks anon writes to insert-only), so a delete has to be a
   request the console applies, same pattern as an op status update. */
function applyDriverTripDeletes(){
  var changed=false;
  var reqs=(_submissions||[]).filter(function(s){return s.type==="driver_trip_delete"&&!subProcessed(s.id);});
  reqs.forEach(function(s){
    var d=s.data||{};
    var before=tripLogs.length;
    tripLogs=tripLogs.filter(function(x){return x.id!==d.tripId&&(!d.fromSub||x.fromSub!==d.fromSub);});
    if(tripLogs.length!==before)changed=true;
    markSubProcessed(s.id);
  });
  if(changed){saveLogs();if(document.getElementById("logBody"))renderLog("Daily vehicle activity");}
}

  openScrim();

function orphanChoice(id,choice){
  var r=reservations.find(function(x){return x.id===id;});
  if(r){
    if(choice==="delete"){reservations=reservations.filter(function(x){return x.id!==id;});}
    else if(choice==="yes"){createTourFromReservation(id);r.orphanHandled=true;}
    else{r.orphanHandled=true;}
    persistData();
  }
  closeModal();if(document.getElementById("resKanban"))renderReservations();
  setTimeout(checkOrphanReservations,250);
}
function renderReservations(){
  var k=document.getElementById("resKanban");if(!k)return;

/* Every participant on a tour mirrors that tour's POC payment status — so a member
   can never show "Paid" while the POC (and the tour) is on "Deposit". Runs on every
   customer render, so a booking/tour status change propagates to all of them. */
function cascadeTourCustomers(tourId){
  if(!tourId)return;
  var t=tours.find(function(x){return x.id===tourId;});if(!t)return;
  var pay=tourPayStatus(t);
  if(!pay)return; /* no financial figures yet — leave customers as-is */
  customers.forEach(function(c){if(c.details&&c.details.tourId===tourId)c.pay=pay;});
}
function cascadeAllCustomerPayments(){(tours||[]).forEach(function(t){cascadeTourCustomers(t.id);});}

function perRecordSetupSQL(){
  return "-- Run this ONCE in the Supabase SQL editor. Creates one table per collection,\n"+
"-- each row = one record (id/name as primary key). Same permissive setup as the\n"+
"-- existing 'workspaces' table, so it works with the publishable key already in the app.\n"+
_recordKeys.map(function(k){return "create table if not exists "+recTable(k)+" (\n  id text primary key,\n  data jsonb,\n  updated_at timestamptz default now()\n);\nalter table "+recTable(k)+" disable row level security;\ngrant all on table "+recTable(k)+" to anon, authenticated;\n";}).join("\n");
}

/* Once the tour is fully paid (pending = 0) and its due date has passed, mark every
   booking on that tour "Fully Paid" so the Bookings section reflects it automatically. */
/* The tour's payment status (from its total vs deposit) drives every booking on it,
   so the booking entries update automatically when the tour's figures change. */
function syncTourPaymentToBookings(t){
  var pay=tourPayStatus(t);
  if(!pay)return;
  bookings.filter(function(b){return b.tour===t.id;}).forEach(function(b){
    b.pay=pay;
    if(pay==="Paid"){b.totalOverride=(b.totalOverride!=null&&b.totalOverride!=="")?b.totalOverride:t.tourCost;b.deposit=bookingTotalCost(b);}
  });
}

/* Payment status for a whole tour: the POC booking's status if set, else derived
   from the tour's own cost vs deposit entered at creation. */
/* Tour payment status is driven by the money entered on the tour: total cost vs
   deposit received. Pending == 0 (deposit >= total) -> "Paid"; a deposit that is
   less than the total -> "Deposit". Returns "" (show nothing) when no financial
   figures have been entered yet — on the tour or on its POC booking. */
function tourPayStatus(t){
  var cost=parseFloat(t.tourCost)||0,dep=parseFloat(t.tourDeposit)||0;
  if(cost>0||dep>0)return (cost>0&&dep>=cost)?"Paid":"Deposit";
  var poc=t.pocId?bookings.find(function(x){return x.id===t.pocId;}):null;
  if(poc){var tot=bookingTotalCost(poc),d=bookingDeposit(poc);if(tot>0||d>0)return bookingPending(poc)<=0?"Paid":"Deposit";}
  return "";
}

"")+
    "</div>";

}

/* ===== DRIVER LOG ===== */
function openDriverLog(preVeh,preLoc){
  const vehOpts=vehicles.map(v=>"<option value='"+v.name+"' "+(preVeh&&v.name===preVeh?"selected":"")+" data-d='"+v.driver+"'>"+v.name+"</option>").join("");
  document.getElementById("modal").innerHTML=
    "<div class='modal-head'><div><span class='eyebrow'>Driver entry</span><h2 class='display' style='font-size:21px;margin-top:6px'>Log today's trip</h2></div>"+XBTN+"</div>"+
    "<div class='modal-body'>"+
      "<div class='driver-note'><svg viewBox='0 0 24 24' fill='none' stroke-width='2' stroke-linecap='round'><path d='M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z'/></svg>This is the owner's entry screen. On save, the trip appears under Daily Activity.</div>"+
      "<div class='form-grid'>"+
        "<div class='field'><label>Date</label><input class='input' type='date' id='dl_date' value='"+todayISO+"'></div>"+
        "<div class='field'><label>Vehicle</label><select class='input' id='dl_veh' onchange='syncDriver()'>"+vehOpts+"</select></div>"+
        "<div class='field'><label>Driver</label><input class='input' id='dl_driver' placeholder='Driver name'></div>"+
        "<div class='field'><label>Start time</label><div class='time-row'><input class='input' type='time' id='dl_start_t' oninput='updateTripTime()'><button class='now-btn' data-action='setNow' data-arg='dl_start_t'>NOW</button></div></div>"+
        "<div class='field'><label>End time</label><div class='time-row'><input class='input' type='time' id='dl_end_t' oninput='updateTripTime()'><button class='now-btn' data-action='setNow' data-arg='dl_end_t'>NOW</button></div></div>"+
        "<div class='field'><label>Start km</label><input class='input mono' type='number' id='dl_start' placeholder='0' oninput='recalcKm()'></div>"+
        "<div class='field'><label>End km</label><input class='input mono' type='number' id='dl_end' placeholder='0' oninput='recalcKm()'></div>"+
        "<div class='field full'><label>Location / route</label><input class='input' id='dl_loc' value='"+(preLoc||"")+"' placeholder='e.g. Port Blair → Chidiya Tapu → Port Blair'></div>"+
      "</div>"+
      "<div class='time-chip'><svg width='15' height='15' viewBox='0 0 24 24' fill='none' stroke='#3f5249' stroke-width='2'><circle cx='12' cy='12' r='9'/><path d='M12 7v5l3 2' stroke-linecap='round'/></svg>Duration<b id='dl_dur'>—</b></div>"+
      "<div class='kmline'><span class='lab'>Total distance</span><span class='big' id='dl_total'>0 km</span></div>"+
    "</div>"+
    "<div class='modal-foot'><button class='btn btn-ghost' onclick='closeModal()'>Cancel</button><button class='btn btn-primary' onclick='saveDriverLog()'>Save trip</button></div>";
  openScrim();if(preVeh)syncDriver();
}
function syncDriver(){const sel=document.getElementById("dl_veh");const d=sel.options[sel.selectedIndex].dataset.d;const f=document.getElementById("dl_driver");if(f&&d)f.value=d;}
function setNow(id){const d=new Date();document.getElementById(id).value=String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");updateTripTime();}
function updateTripTime(){
  const s=document.getElementById("dl_start_t")?.value,e=document.getElementById("dl_end_t")?.value,el=document.getElementById("dl_dur");if(!el)return;
  if(s&&e){let[sh,sm]=s.split(":").map(Number),[eh,em]=e.split(":").map(Number);let mins=(eh*60+em)-(sh*60+sm);if(mins<0)mins+=1440;el.textContent=Math.floor(mins/60)+"h "+String(mins%60).padStart(2,"0")+"m";}
  else el.textContent="—";
}
function recalcKm(){const s=parseFloat(document.getElementById("dl_start")?.value||0),e=parseFloat(document.getElementById("dl_end")?.value||0);const el=document.getElementById("dl_total");if(el)el.textContent=Math.max(e-s,0).toLocaleString("en-IN")+" km";}
function saveDriverLog(){
  const start=parseFloat(document.getElementById("dl_start").value||0),end=parseFloat(document.getElementById("dl_end").value||0),veh=document.getElementById("dl_veh").value;
  if(!veh||end<=start){alert("Choose a vehicle and enter an end km greater than start km.");return;}
  const dur=document.getElementById("dl_dur").textContent.replace("—","").trim();
  var _tr={id:"TR"+Date.now(),date:document.getElementById("dl_date").value||todayISO,veh,driver:document.getElementById("dl_driver").value||"—",startKm:start,endKm:end,totalKm:end-start,loc:document.getElementById("dl_loc").value||"—",time:dur||"—",startT:document.getElementById("dl_start_t").value||"",endT:document.getElementById("dl_end_t").value||""};
  _tr.tourCode=tripTourCode(_tr);
  tripLogs.push(_tr);
  saveLogs();closeModal();go("logistics");logTab("Daily vehicle activity");
}
function editTrip(id){
  var tr=tripLogs.find(function(x){return x.id===id;});if(!tr)return;
  var vehOpts=vehicles.map(function(v){return"<option value='"+v.name+"' "+(v.name===tr.veh?"selected":"")+">"+v.name+"</option>";}).join("");
  modalForm("Edit trip","Update trip record","<div class='form-grid'><div class='field'><label>Date</label><input class='input' type='date' id='et_date' value='"+tr.date+"'></div><div class='field'><label>Vehicle</label><select class='input' id='et_veh'>"+vehOpts+"</select></div><div class='field'><label>Driver</label><input class='input' id='et_driver' value='"+tr.driver+"'></div><div class='field'><label>Start km</label><input class='input mono' type='number' id='et_startKm' value='"+tr.startKm+"'></div><div class='field'><label>End km</label><input class='input mono' type='number' id='et_endKm' value='"+tr.endKm+"'></div><div class='field'><label>Total km</label><input class='input mono' type='number' id='et_totalKm' value='"+tr.totalKm+"'></div><div class='field full'><label>Location</label><input class='input' id='et_loc' value='"+tr.loc+"'></div><div class='field'><label>Time</label><input class='input' id='et_time' value='"+tr.time+"'></div></div>","saveEditTrip","Update");
  document.getElementById("modal").dataset.trid=id;
}
function saveEditTrip(){
  var id=document.getElementById("modal").dataset.trid;
  var tr=tripLogs.find(function(x){return x.id===id;});if(!tr)return;
  tr.date=document.getElementById("et_date").value;
  tr.veh=document.getElementById("et_veh").value;
  tr.driver=document.getElementById("et_driver").value;
  tr.startKm=parseFloat(document.getElementById("et_startKm").value)||0;
  tr.endKm=parseFloat(document.getElementById("et_endKm").value)||0;
  tr.totalKm=parseFloat(document.getElementById("et_totalKm").value)||0;
  tr.loc=document.getElementById("et_loc").value;
  tr.time=document.getElementById("et_time").value;
  saveLogs();closeModal();renderLog("Daily vehicle activity");
}
function deleteTrip(id){if(!confirm("Delete this trip record?"))return;tripLogs=tripLogs.filter(function(x){return x.id!==id;});saveLogs();renderLog("Daily vehicle activity");}

/* Collapse accidental duplicate bookings (same source submission, or identical
   guest+tour+dates+party) that older builds could create. Keeps the first. */
function dedupeBookings(){
  var seen={},out=[],changed=false;
  (bookings||[]).forEach(function(b){
    var key=b.fromSub?("sub:"+b.fromSub):((b.guest||"").toLowerCase()+"|"+(b.tour||b.customTour||"")+"|"+(b.start||"")+"|"+(b.end||"")+"|"+(b.party||""));
    if(seen[key]){changed=true;return;}
    seen[key]=1;out.push(b);
  });
  if(changed){bookings=out;persistData();}
}
/* ===== BOOT ===== */
function boot(keepView){
  dedupeBookings();
  ensureTourCodes();
  tours.forEach(syncTourPaymentToBookings);
  buildNav();
  document.getElementById("content").innerHTML=[viewDashboard(),viewTours(),viewCalendar(),viewBookings(),viewAccommodation(),viewOperations(),viewCalc(),viewProfitCalc(),viewLogistics(),viewCRM(),viewRequests(),viewReservations(),viewCustomers(),viewSettings()].join("");
  renderTours();renderCalendar();renderBookings();renderAccommodation();renderOperations();calc();renderProfitCalc();renderLog();renderCRM();renderCustomers();renderOperators();renderReservations();
  if(keepView&&TITLES[curView]){
    /* In-place rebuild: no navigation, no history reset — and visually silent.
       Suppress the .view fade-in (it replays on every innerHTML rebuild, which
       reads as the page "refreshing itself") and keep the scroll position. */
    document.body.classList.add("no-anim");
    var _sx=window.scrollX,_sy=window.scrollY;
    go(curView,true);
    window.scrollTo(_sx,_sy);
    setTimeout(function(){document.body.classList.remove("no-anim");},300);
  }else{
    go("dashboard");
    navStack=[];document.getElementById("backBtn").classList.remove("show");
  }
}
/* Background sync used to re-run boot(), which always ended in go("dashboard") — so
   every auto-pull that applied fresh cloud data (every 45s, plus each tab-focus)
   yanked the user off whatever screen they were working on. Background refreshes now
   rebuild in place: same view, same nav history — and if a dialog is open, the
   refresh waits until it's closed so an in-progress edit is never wiped mid-typing. */
var _pendingRefresh=false;
function refreshUI(){
  var scrim=document.getElementById("scrim");
  if(scrim&&scrim.classList.contains("show")){_pendingRefresh=true;return;}
  /* Background/data sync: update ONLY the current view's dynamic content in place —
     never rebuild #content (which visibly flashed the whole page) and never
     re-navigate (which bounced logistics back to the Operations board). The
     dashboard is deliberately NOT re-rendered here, so it never visibly "refreshes
     itself"; it updates on navigation or via the manual refresh button.
     _sbApplying is raised so the render functions' persistData() side-effects don't
     kick off a push loop against the data we just pulled. */
  var wasApplying=_sbApplying;_sbApplying=true;
  try{
    if(curView==="tours")renderTours();
    else if(curView==="calendar")renderCalendar();
    else if(curView==="bookings")renderBookings();
    else if(curView==="accommodation")renderAccommodation();
    else if(curView==="customers")renderCustomers();
    else if(curView==="crm")renderCRM();
    else if(curView==="reservations"){renderReservations();renderGuides();}
    else if(curView==="logistics")renderLog(_logTab);
    else if(curView==="profit"&&typeof renderProfitCalc==="function")renderProfitCalc();
    /* dashboard, calc, requests, settings: intentionally no visible refresh */
  }catch(e){}
  _sbApplying=wasApplying;
}
/* Desktop sidebar collapse — slides the menu off to the left so the work area gets
   the full width. Remembered per device. (On phones the hamburger already does this.) */
function toggleSidebarCollapse(){
  var on=document.body.classList.toggle("side-collapsed");
  try{localStorage.setItem("ieo_side_collapsed",on?"1":"0");}catch(e){}
  var b=document.getElementById("sideCollapseBtn");
  if(b){b.title=on?"Show sidebar":"Hide sidebar";b.setAttribute("aria-label",b.title);}
}
try{if(localStorage.getItem("ieo_side_collapsed")==="1")toggleSidebarCollapse();}catch(e){}
/* Manual refresh for whichever section is open: pulls the latest cloud data and
   re-renders the current view in place. */
async function refreshCurrentView(){
  var btn=document.getElementById("viewRefreshBtn");
  if(btn){if(btn.classList.contains("spinning"))return;btn.classList.add("spinning");}
  try{
    var c=sbConfig();
    if(c&&c.auto&&sbClient()){
      await cloudPull(true);
      if(_perRecordActive)await pullAllRecords();
    }
  }catch(e){}
  boot(true);
  if(btn)btn.classList.remove("spinning");
}
boot();
initAuth().then(function(canSync){if(canSync)cloudInit();});

/* ===== AUTHENTICATION (Supabase email/password) ===== */
var _authMode="signin"; /* signin | signup */
function authClient(){return (typeof sbClient==="function")?sbClient():null;}
function lgEl(id){return document.getElementById(id);}
function lgMsg(box,msg){var e=lgEl(box==="ok"?"lgOk":"lgErr"),o=lgEl(box==="ok"?"lgErr":"lgOk");if(e){e.textContent=msg;e.classList.add("show");}if(o)o.classList.remove("show");}
function lgClearMsg(){["lgErr","lgOk"].forEach(function(i){var e=lgEl(i);if(e)e.classList.remove("show");});}
function showLogin(){var ov=lgEl("loginOverlay");if(ov){ov.classList.add("show");setTimeout(function(){var f=lgEl("lg_email");if(f)f.focus();},80);}}
function hideLogin(){var ov=lgEl("loginOverlay");if(ov)ov.classList.remove("show");}
function applyUser(user){
  var name=(user&&(user.user_metadata&&user.user_metadata.name))||(user&&user.email)||"Operator";
  var who=document.querySelector(".nav-foot .who");if(who)who.textContent=name;
  var role=document.querySelector(".nav-foot .role");if(role)role.textContent=(user&&user.email)||"Signed in";
  var av=document.querySelector(".nav-foot .av");if(av)av.textContent=String(name).split(/[ @.]/).filter(Boolean).map(function(w){return w[0];}).join("").slice(0,2).toUpperCase();
}
/* Auth and data sync used to be two unconnected systems: the login screen was just
   a visual overlay, and the cloud data loaded regardless of whether you'd actually
   signed in. Now cloud sync WAITS for a confirmed sign-in — the shared workspace
   only loads once you're an authenticated user, and starts the moment you sign in
   if you weren't already. (If Supabase Auth itself isn't configured/reachable at
   all, this still fails open and syncs anyway, so a broken auth setup can't lock
   you out of your own data.) */
var _authResolved=false;
function initAuth(){
  return new Promise(function(resolve){
    var cl=authClient();
    if(!cl){hideLogin();resolve(true);return;}
    cl.auth.getSession().then(function(res){
      var s=res&&res.data&&res.data.session;
      if(s&&s.user){applyUser(s.user);hideLogin();resolve(true);}
      else{showLogin();resolve(false);}
    }).catch(function(){showLogin();resolve(true);});
    cl.auth.onAuthStateChange(function(_e,session){
      if(session&&session.user){
        applyUser(session.user);hideLogin();
        if(_authResolved&&!_sbReady)cloudInit(); /* signed in after boot -> sync now */
      }
    });
  }).then(function(canSync){_authResolved=true;return canSync;});
}

/* ===== Install as an app (PWA) — button + hint shown on the sign-in screen ===== */
var _deferredInstallPrompt=null;
function isStandaloneApp(){return window.matchMedia&&window.matchMedia("(display-mode: standalone)").matches||window.navigator.standalone===true;}
if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){});});}
/* The install button on the sign-in screen is ALWAYS visible now (it no longer
   hides itself after install or when no native prompt is available). We just
   capture the native prompt when the browser offers it; installApp() falls back
   to platform instructions when there's no prompt (iOS, already-installed, or a
   browser that hasn't fired the event yet). */
window.addEventListener("beforeinstallprompt",function(e){
  e.preventDefault();
  _deferredInstallPrompt=e;
});
window.addEventListener("appinstalled",function(){
  _deferredInstallPrompt=null;
  var btn=document.getElementById("lgInstallBtn");
  if(btn){btn.lastChild.textContent="App installed ✓";btn.style.opacity="0.7";}
});
function installApp(){
  if(_deferredInstallPrompt){
    _deferredInstallPrompt.prompt();
    _deferredInstallPrompt.userChoice.then(function(){_deferredInstallPrompt=null;});
    return;
  }
  if(isStandaloneApp()){alert("The app is already installed on this device — open it from your home screen.");return;}
  var ua=navigator.userAgent||"";
  var isIOS=/iPad|iPhone|iPod/.test(ua)||(navigator.platform==="MacIntel"&&navigator.maxTouchPoints>1);
  if(isIOS){alert("To install on iPhone/iPad:\n\n1. Tap the Share button (square with an up-arrow) at the bottom of Safari.\n2. Choose \"Add to Home Screen\".");return;}
  alert("To install:\n\nOpen your browser menu (⋮ or ⋯) and choose \"Install app\" or \"Add to Home screen\".\n\nIf you don't see it, the app may already be installed, or try opening this site in Chrome.");
}
(function initInstallHint(){
  if(isStandaloneApp())return; /* already installed/opened as an app — nothing to offer */
  var ua=navigator.userAgent||"";
  var isIOS=/iPad|iPhone|iPod/.test(ua)||(navigator.platform==="MacIntel"&&navigator.maxTouchPoints>1);
  var isSafari=/^((?!chrome|android|crios|fxios).)*safari/i.test(ua);
  if(isIOS){
    var hint=document.getElementById("lgInstallHint");
    if(hint){hint.style.display="block";hint.innerHTML=isSafari?"<b>Install on iPhone/iPad:</b> tap the Share icon <span style='font-family:monospace'>⬆</span>, then \"Add to Home Screen\".":"Open this page in Safari to install it on your Home Screen.";}
  }
  /* Android/desktop Chrome: the button appears automatically via beforeinstallprompt above, if/when the browser decides the app qualifies. */
})();
function authToggleMode(){
  _authMode=(_authMode==="signin")?"signup":"signin";
  lgClearMsg();
  lgEl("lgTitle").textContent=_authMode==="signup"?"Create account":"Sign in";
  lgEl("lgSub").textContent=_authMode==="signup"?"Register a new operator login.":"Welcome back. Sign in to your console.";
  lgEl("lgBtn").textContent=_authMode==="signup"?"Create account":"Sign in";
  lgEl("lgToggle").textContent=_authMode==="signup"?"Back to sign in":"Create new account";
}
function authPrimary(){if(_authMode==="signup")authSignUp();else authSignIn();}
function authSignIn(){
  var cl=authClient();if(!cl){lgMsg("err","Auth service unavailable.");return;}
  var email=lgEl("lg_email").value.trim(),pw=lgEl("lg_pw").value;
  if(!email||!pw){lgMsg("err","Enter your email and password.");return;}
  var remember=lgEl("lg_remember")?lgEl("lg_remember").checked:true;
  try{localStorage.setItem("ieo_remember",remember?"1":"0");}catch(e){}
  lgEl("lgBtn").disabled=true;
  cl.auth.signInWithPassword({email:email,password:pw}).then(function(res){
    lgEl("lgBtn").disabled=false;
    if(res.error){lgMsg("err",res.error.message);return;}
    lgClearMsg();applyUser(res.data.user);hideLogin();
  }).catch(function(e){lgEl("lgBtn").disabled=false;authNetErr(e);});
}
function authNetErr(e){
  lgMsg("err","Couldn't reach the sign-in server. Your Supabase project may be paused, or email auth may be disabled. Check the Supabase dashboard and try again.");
}
function authSignUp(){
  var cl=authClient();if(!cl){lgMsg("err","Auth service unavailable.");return;}
  var email=lgEl("lg_email").value.trim(),pw=lgEl("lg_pw").value;
  if(!email||pw.length<6){lgMsg("err","Enter an email and a password of at least 6 characters.");return;}
  lgEl("lgBtn").disabled=true;
  cl.auth.signUp({email:email,password:pw}).then(function(res){
    lgEl("lgBtn").disabled=false;
    if(res.error){lgMsg("err",res.error.message);return;}
    if(res.data&&res.data.session){applyUser(res.data.user);hideLogin();}
    else{lgMsg("ok","Account created. Check your email to confirm, then sign in.");authToggleMode();}
  }).catch(function(e){lgEl("lgBtn").disabled=false;authNetErr(e);});
}
function authForgot(){
  var cl=authClient();if(!cl){lgMsg("err","Auth service unavailable.");return;}
  var email=lgEl("lg_email").value.trim();
  if(!email){lgMsg("err","Enter your email above first, then tap Forgot password.");return;}
  cl.auth.resetPasswordForEmail(email,{redirectTo:location.href.split("#")[0]}).then(function(res){
    if(res.error){lgMsg("err",res.error.message);return;}
    lgMsg("ok","Password reset link sent to "+email+".");
  }).catch(function(e){authNetErr(e);});
}
/* bypass removed per request */
function logout(){
  var cl=authClient();
  if(cl)cl.auth.signOut().then(function(){showLogin();});
  else showLogin();
}
/* If "remember me" was unchecked, end the session when the tab closes */
window.addEventListener("beforeunload",function(){
  try{if(localStorage.getItem("ieo_remember")==="0"){var cl=authClient();if(cl)cl.auth.signOut();}}catch(e){}
});
</script>
