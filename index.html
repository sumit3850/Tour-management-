<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Island Explorer Ops</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="assets/icon.svg">
<link rel="apple-touch-icon" href="assets/icon.svg">
<meta name="theme-color" content="#143a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Island Explorer">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  /* HDFC-style banking palette: navy blue + red accent on a light-grey canvas */
  --ink:#1b2a4a;--ink-soft:#5a6a86;--forest:#004c8f;--forest-deep:#003a6e;
  --sea:#0a6ed1;--sea-soft:#e7f1fb;--amber:#f0a400;--amber-soft:#fdf0d2;
  --coral:#ed232a;--coral-soft:#fde4e5;--paper:#eef1f6;--surface:#ffffff;--surface-2:#f5f8fc;
  --line:#e2e8f1;--line-soft:#eef2f8;
  --shadow:0 1px 2px rgba(20,40,80,.04),0 8px 24px -12px rgba(20,40,80,.14);
  --shadow-lg:0 12px 40px -12px rgba(20,40,80,.26);
  --r:14px;--r-sm:10px;--r-lg:20px;--sidebar-w:248px;

  --font-body: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'Geist Mono', ui-monospace, 'SF Mono', monospace;
  --shadow-card: 0 1px 3px rgba(22,36,29,0.04), 0 1px 2px rgba(22,36,29,0.06);
  --shadow-card-hover: 0 4px 12px rgba(22,36,29,0.08), 0 2px 4px rgba(22,36,29,0.04);
  --ease-default: cubic-bezier(0.4,0,0.2,1);
  --ease-spring: cubic-bezier(0.34,1.56,0.64,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--font-body);background:var(--paper);color:var(--ink);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums}
h1,h2,h3,h4{line-height:1.2;font-weight:600}
.display{font-family:'Calistoga',Georgia,serif;font-weight:400;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none}
svg{display:block}
::selection{background:var(--amber-soft)}

.app{display:flex;min-height:100dvh}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:linear-gradient(180deg,rgba(227,242,253,0.97) 0%,rgba(200,230,255,0.95) 100%);color:var(--ink);display:flex;flex-direction:column;position:sticky;top:0;height:100dvh;border-right:1px solid rgba(25,118,210,0.1)}
.brand{display:flex;align-items:center;gap:11px;padding:22px 20px 18px}
.brand .mark{width:38px;height:38px;border-radius:11px;background:linear-gradient(150deg,var(--sea),#0d47a1);display:grid;place-items:center;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}
.brand .name{font-family:'Calistoga',serif;font-size:18px;color:var(--ink);line-height:1.05}
.brand .sub{font-size:11px;color:var(--ink-soft);letter-spacing:.04em;text-transform:uppercase;margin-top:1px}
.nav{flex:1;overflow-y:auto;padding:6px 12px 18px}
.nav-group{font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:#5a7d9a;margin:16px 10px 6px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;color:#4a6b7c;font-size:14px;font-weight:500;width:100%;text-align:left;transition:background .15s,color .15s}
.nav-item svg{width:18px;height:18px;stroke:currentColor;flex-shrink:0}
.nav-item:hover{background:rgba(25,118,210,0.08);color:var(--ink)}
.nav-item.active{background:rgba(25,118,210,0.15);color:var(--ink)}
.nav-item.active svg{stroke:var(--sea)}
.nav-foot{padding:14px 18px;border-top:1px solid rgba(25,118,210,0.12);display:flex;align-items:center;gap:11px}
.nav-foot .av{width:34px;height:34px;border-radius:50%;background:var(--amber);color:var(--ink);display:grid;place-items:center;font-weight:700;font-size:13px}
.nav-foot .who{font-size:13px;color:var(--ink);font-weight:600}
.nav-foot .role{font-size:11px;color:#6a8fa8}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:30;background:rgba(246,242,233,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:14px 28px;display:flex;align-items:center;gap:14px}
.hamburger,.backbtn{width:40px;height:40px;border-radius:11px;border:1px solid var(--line);background:var(--surface);place-items:center}
.hamburger{display:none}.hamburger svg{width:20px;height:20px;stroke:var(--ink)}
.backbtn{display:none}.backbtn.show{display:grid}.backbtn svg{width:20px;height:20px;stroke:var(--ink)}
.page-title{font-size:13px;color:var(--ink-soft);font-weight:500}
.page-title b{display:block;font-size:20px;color:var(--ink);font-weight:700;letter-spacing:-.01em}
.search{margin-left:auto;display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:9px 13px;width:280px;max-width:34vw}
.search svg{width:17px;height:17px;stroke:var(--ink-soft);flex-shrink:0}
.search input{border:none;outline:none;background:none;font-size:14px;width:100%;color:var(--ink)}
.iconbtn{width:40px;height:40px;border-radius:11px;border:1px solid var(--line);background:var(--surface);display:grid;place-items:center;position:relative}
.iconbtn svg{width:19px;height:19px;stroke:var(--ink)}
/* Desktop-only sidebar collapse: slides the sidebar off to the left, content expands */
.sidecollapse{display:none}
@media(min-width:861px){
  .sidecollapse{display:grid}
  .sidebar{transition:margin-left .25s ease}
  body.side-collapsed .sidebar{margin-left:calc(var(--sidebar-w)*-1)}
  body.side-collapsed .sidecollapse svg{transform:rotate(180deg)}
}
@keyframes ieoSpin{to{transform:rotate(360deg)}}
.iconbtn.spinning svg{animation:ieoSpin .8s linear infinite}
.iconbtn .dot{position:absolute;top:9px;right:10px;width:7px;height:7px;border-radius:50%;background:var(--coral);border:1.5px solid var(--surface)}
.content{padding:28px;max-width:1320px;width:100%;margin:0 auto}

.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:11px;font-weight:600;font-size:14px;transition:transform .12s,box-shadow .15s,background .15s;white-space:nowrap}
.btn svg{width:17px;height:17px;stroke:currentColor}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--amber);color:#3a2906;box-shadow:0 1px 0 rgba(0,0,0,.05)}
.btn-primary:hover{background:#e9a73a}
.btn-ghost{background:var(--surface);border:1px solid var(--line);color:var(--ink)}
.btn-ghost:hover{background:var(--surface-2);border-color:#d8d0bf}
.btn-sea{background:var(--sea);color:#fff}.btn-sea:hover{background:#0e6b75}
.btn-red{background:var(--coral);color:#fff}.btn-red:hover{background:#c44e35}
.btn-sm{padding:7px 12px;font-size:13px;border-radius:9px}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.card-pad{padding:20px}
.section-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.eyebrow{font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--sea);font-weight:600}
.h-sec{font-size:17px;font-weight:700;letter-spacing:-.01em;color:var(--ink)}

.pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;line-height:1.6}
.pill::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.pill.open{background:var(--sea-soft);color:#0c656f}
.pill.full{background:var(--coral-soft);color:#a9402a}
.pill.closed{background:#ece7da;color:#6b6452}
.pill.completed{background:#e4ece6;color:#3f6d57}
.pill.plain{background:#edeae0;color:#5b6660}
.pill.plain::before{display:none}

.cat{display:inline-flex;align-items:center;padding:3px 9px;border-radius:7px;font-size:11.5px;font-weight:600}
.cat.southandaman{background:#e4ece6;color:#1b4d3e}.cat.littleandaman{background:#e3f1f1;color:#0c656f}
.cat.nicobar{background:#e6ebf3;color:#3a527d}.cat.session{background:#fbeccb;color:#7a5410}.cat.custom{background:#f1e9df;color:#7a5a37}

.bar{height:6px;background:var(--line-soft);border-radius:999px;overflow:hidden}
.bar > span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--sea),var(--forest))}
.bar.warn > span{background:linear-gradient(90deg,var(--amber),var(--coral))}

table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;padding:11px 16px;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:12px 16px;border-bottom:1px solid var(--line-soft);font-size:14px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{transition:background .12s}tbody tr:hover{background:var(--surface-2)}
th.num,td.num{text-align:right;font-variant-numeric:tabular-nums}
td.nowrap,th.nowrap{white-space:nowrap}
td{vertical-align:middle}
.sb-status{font-size:13px;color:var(--ink-soft)}.sb-status.ok{color:var(--forest)}.sb-status.err{color:var(--coral)}
.tour-cols{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:16px;align-items:start}
.tour-col{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r);padding:12px}
.tour-col-head{font-weight:700;font-size:13px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;color:var(--ink);text-transform:uppercase;letter-spacing:.04em}
.tour-col-head .ct{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:1px 9px;font-size:11px;color:var(--ink-soft);font-weight:600}
.tour-col .tour-card{margin-bottom:10px}
.tour-col .tour-card:last-child{margin-bottom:0}
.tour-card .dt-range{font-size:19px;font-weight:700;color:var(--ink);letter-spacing:-.01em;line-height:1.15}
.tour-card .code-tag{display:inline-block;margin-top:4px;font-size:12px;font-weight:600;color:#0c5760;background:var(--sea-soft);border-radius:999px;padding:2px 10px}
.rate-card{background:var(--sea-soft);border:1px solid var(--sea);border-radius:12px;padding:12px 14px;margin-bottom:14px}
.rate-card-h{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--sea);font-weight:700;margin-bottom:6px}
.calc-sub{font-size:12.5px;color:var(--ink-soft);margin:-4px 0 14px;padding-bottom:12px;border-bottom:1px solid var(--line-soft)}
.calc-in{width:130px;text-align:right;border:1px solid var(--line);border-radius:8px;padding:5px 8px;font-size:13px;background:var(--surface)}
.calc-in:focus{outline:none;border-color:var(--sea);box-shadow:0 0 0 2px var(--sea-soft)}
.res-row.edit{align-items:center}
.calc-mini{width:46px;text-align:center;border:1px solid var(--line);border-radius:6px;padding:2px 4px;font-size:12px}
.tourist-toggle{display:flex;gap:6px}
.acc-avail{display:flex;align-items:center;gap:8px;font-size:12px;margin:2px 0 4px}
.acc-avail .bar{flex:1;height:7px;border-radius:5px;background:var(--line);overflow:hidden}
.acc-avail .bar span{display:block;height:100%;background:var(--sea)}
.acc-avail .num{font-weight:700;color:var(--ink);white-space:nowrap}
.req-links{display:flex;flex-direction:column;gap:10px}
.req-link{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:12px;border:1px solid var(--line);border-radius:12px;background:var(--surface-2)}
.req-link .t{font-weight:700;font-size:14px}.req-link .s{font-size:12px;color:var(--ink-soft);margin-top:2px}
.req-link .acts{display:flex;gap:8px}
.req-card{padding:16px;margin-bottom:12px}
.req-top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
.req-type{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--sea);font-weight:700}
.req-name{font-size:16px;font-weight:700;margin-top:4px}
.req-sub{font-size:12.5px;color:var(--ink-soft);margin-top:2px}
.req-meta{text-align:right;font-size:13px;color:var(--ink-soft)}
.req-kv{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px 16px;margin:12px 0;padding:12px 0;border-top:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft)}
.req-kv .kv{font-size:12.5px}.req-kv .kv span{color:var(--ink-soft);text-transform:capitalize}.req-kv .kv b{margin-left:5px}
.req-acts{display:flex;gap:8px;flex-wrap:wrap}
.res-card .res-fig{display:flex;justify-content:space-between;font-size:12.5px;margin-top:4px}
.res-card .res-fig span{color:var(--ink-soft)}
.res-card .edit-btn,.res-card .del-btn{border:1px solid var(--line);background:var(--surface);border-radius:8px;padding:5px 0;font-size:12px;font-weight:600}
.team-card{display:flex;align-items:center;gap:12px;background:var(--sea-soft);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:16px}
.team-card .tc-av{width:42px;height:42px;border-radius:50%;background:var(--forest);color:#fff;display:grid;place-items:center;font-weight:700;flex-shrink:0}
.team-card .tc-role{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:600}
.team-card .tc-name{font-size:15px;font-weight:700;color:var(--ink)}
.team-card .tc-contact{font-size:12.5px;color:var(--ink-soft)}
.poc-star{border:none;background:none;font-size:18px;line-height:1;cursor:pointer;color:var(--ink-soft)}
.poc-star.on{color:var(--amber)}
td.strong{white-space:nowrap}
.qa-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.qa-tile{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 8px;background:var(--surface);border:1px solid var(--line);border-radius:14px;cursor:pointer;transition:transform .12s,box-shadow .15s;font:inherit}
.qa-tile:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.qa-ic{width:44px;height:44px;border-radius:13px;background:var(--sea-soft);display:grid;place-items:center}
.qa-ic svg{width:22px;height:22px;stroke:var(--forest)}
.qa-lbl{font-size:12px;font-weight:600;text-align:center;color:var(--ink);line-height:1.2}
.alert-warn{border-color:var(--coral)!important;background:var(--coral-soft)}
@media(max-width:900px){.qa-grid{grid-template-columns:repeat(3,1fr)}}
.bottom-nav{display:none}
@media(max-width:768px){
  .qa-grid{grid-template-columns:repeat(3,1fr)}
  .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:45;background:var(--surface);border-top:1px solid var(--line);padding:6px 2px;justify-content:space-around;box-shadow:0 -4px 16px -8px rgba(20,40,80,.25)}
  .bottom-nav button{display:flex;flex-direction:column;align-items:center;gap:3px;font:inherit;background:none;border:none;color:var(--ink-soft);font-size:10px;flex:1;padding:4px 0;font-weight:600}
  .bottom-nav button svg{width:22px;height:22px;stroke:currentColor;fill:none}
  .bottom-nav button.active{color:var(--forest)}
  .content{padding-bottom:76px!important}
}
th.ctr,td.ctr{text-align:center}
td.strong{font-weight:600;color:var(--ink)}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}

.view{display:none;animation:fade .25s ease}
body.no-anim .view{animation:none} /* background data refresh — rebuild without the entry animation */
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.kpi{padding:16px}
.kpi .lab{font-size:13px;color:var(--ink-soft);font-weight:500;display:flex;align-items:center;gap:8px}
.kpi .lab svg{width:16px;height:16px;stroke:var(--sea)}
.kpi .val{font-size:28px;letter-spacing:-.02em;margin-top:8px;font-family:'Calistoga',serif}
.kpi .trend{font-size:12px;font-weight:600;margin-top:4px}
.up{color:#2f7d5b}.down{color:var(--coral)}

.grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}

.chart{display:flex;align-items:flex-end;gap:14px;height:140px;padding-top:10px}
.chart .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end}
.chart .stk{width:100%;max-width:34px;border-radius:6px 6px 3px 3px;background:linear-gradient(180deg,var(--sea),var(--forest));transition:height .6s cubic-bezier(.2,.7,.2,1)}
.chart .cl{font-size:11px;color:var(--ink-soft);text-align:center}

.list-row{display:flex;align-items:center;gap:12px;padding:10px 4px;border-bottom:1px solid var(--line-soft)}
.list-row:last-child{border-bottom:none}
.list-row .ic{width:32px;height:32px;border-radius:9px;background:var(--sea-soft);display:grid;place-items:center;flex-shrink:0}
.list-row .ic svg{width:16px;height:16px;stroke:var(--sea)}
.list-row .meta{flex:1;min-width:0}
.list-row .t{font-weight:600;font-size:14px}
.list-row .s{font-size:12px;color:var(--ink-soft)}

.tour-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.tour-card{padding:16px;cursor:pointer;transition:transform .15s,box-shadow .2s,border-color .15s}
.tour-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:#d8d0bf}
.tour-card .nm{font-size:15px;font-weight:700;margin:10px 0 3px;letter-spacing:-.01em}
.tour-card .dt{font-size:12px;color:var(--ink-soft)}
.tour-card .capline{display:flex;justify-content:space-between;font-size:12px;margin:12px 0 6px;color:var(--ink-soft)}
.tour-card .capline b{color:var(--ink)}
.tour-card .foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.tour-del{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:7px;border:1px solid var(--line);background:var(--coral-soft);color:var(--coral);display:grid;place-items:center;cursor:pointer;opacity:0;transition:opacity .15s,background .15s}
.tour-card:hover .tour-del{opacity:1}.tour-del:hover{background:var(--coral);color:#fff}
.tour-card{position:relative}.tour-card .guests{font-size:11px;color:var(--ink-soft);margin-top:6px;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* All tour cards render at the same height regardless of content, and the status
   footer pins to the bottom, so a category with a shorter card (e.g. Narcondam) is
   the same size as the others. */
.tour-cols .tour-card{display:flex;flex-direction:column;min-height:194px}
.tour-cols .tour-card .foot{margin-top:auto}
.tour-card .foot .pills{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

.tabs{display:flex;gap:4px;background:var(--surface-2);border:1px solid var(--line);padding:4px;border-radius:12px;width:max-content;max-width:100%;overflow-x:auto}
.tab{padding:7px 14px;border-radius:9px;font-size:13.5px;font-weight:600;color:var(--ink-soft);white-space:nowrap}
.tab.active{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}

.cal-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.cal-nav{display:flex;align-items:center;gap:6px}
.cal-nav button{width:36px;height:36px;border-radius:9px;border:1px solid var(--line);background:var(--surface);display:grid;place-items:center}
.cal-nav button svg{width:18px;height:18px;stroke:var(--ink)}
.cal-sel{padding:9px 12px;border:1px solid var(--line);border-radius:10px;background:var(--surface);font-family:inherit;font-size:14px;font-weight:600;color:var(--ink);cursor:pointer}
.cal-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;min-width:660px}
.cal .dow{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:600;text-align:center;padding-bottom:4px}
.cal .cell{min-height:84px;border:1px solid var(--line-soft);border-radius:11px;padding:7px;background:var(--surface);position:relative}
.cal .cell.dim{background:var(--surface-2);opacity:.5}
.cal .cell.today{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber)}
.cal .dn{font-size:12px;font-weight:600;color:var(--ink-soft)}
.cal .span{font-size:10px;font-weight:600;color:#fff;border-radius:6px;padding:2px 6px;margin-top:3px;line-height:1.2;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer}

  {k:"quotationLog",arr:1,get:function(){return quotationLog;},set:function(v){quotationLog=v;}}
];
function collectStore(){var o={};STORE.forEach(function(s){o[s.k]=s.get();});return o;}
/* Applying a real saved snapshot: any array collection missing from it becomes empty,
   so the hard-coded sample data never lingers / reappears once you've saved your own data. */
/* Once per-record sync is active, the per-record tables are the ONLY source of
   truth for their tracked collections (vehicles, drivers, ops, tours, ...) —
   applying the whole blob here must skip them entirely. Without this guard, a
   blob pull that happens to be stale for just one collection (e.g. another
   device pushed the blob before it had picked up a newly-added vehicle) would
   silently wipe that collection from memory, and the NEXT per-record push would
   then read the wipe as an intentional deletion and delete it from the cloud too
   — this is exactly how a vehicle could vanish repeatedly and need a manual
   re-sync every time. */
function applyStore(d){
  if(!d)return;
  var snap=STORE.some(function(s){return d[s.k]!==undefined;});
  var skipKeys=(typeof _perRecordActive!=="undefined"&&_perRecordActive&&typeof PER_RECORD_KEYS!=="undefined")?PER_RECORD_KEYS:[];
  STORE.forEach(function(s){
    if(skipKeys.indexOf(s.k)>-1)return;
    if(d[s.k]!==undefined&&d[s.k]!==null)s.set(d[s.k]);
    else if(snap&&s.arr&&s.k!=="operators")s.set([]);
  });
  ensureSheetDefaults();
}
/* Guards the window between page load and the first cloud sync decision. The very
   first boot() call renders the UI from whatever is cached locally — and several
   render*() functions call persistData() as a harmless-looking side effect. If that
   were allowed to re-stamp "last updated" to right now, a device that hasn't opened
   the app in days would look newer than the cloud (its data is old, but the
   timestamp says "just now"), so cloudPull would wrongly skip pulling the real
   latest data — and the follow-up push would then overwrite the cloud with this
   device's stale copy. Blocking the timestamp bump (not the save itself) during this
   window keeps the ORIGINAL local timestamp intact for that first, decisive comparison. */
var _syncBooting=true;
/* _localDirty: this device has a change that hasn't reached the cloud yet.
   _pushInFlight: a flush is currently uploading. A background PULL must never run
   while either is set — otherwise it overwrites your just-made add/delete with the
   cloud's older copy (which doesn't have your change), and resets the change-tracking
   snapshot so your pending push then thinks nothing changed and drops it. That race
   is exactly why deletions "came back" and additions "disappeared". */
var _localDirty=false,_pushInFlight=false;
function persistData(){
  try{
    localStorage.setItem(DATA_KEY,JSON.stringify(collectStore()));
    if(!_syncBooting)localStorage.setItem("ieo_updated",new Date().toISOString());
  }catch(e){}
  if(typeof enrichAllOps==="function")enrichAllOps();
  if(!_syncBooting&&!_sbApplying){
    _localDirty=true;
    /* Also persist this "I have an unpushed edit" flag to localStorage (not just the
       in-memory _localDirty, which resets to false on every reload). Without it, an
       edit made right before a refresh/app-restart/tab-kill — before the 1.5s
       debounced per-record push fires — is invisible to the NEXT cloudInit(), which
       otherwise pulls unconditionally and overwrites the new/edited record in memory
       before it was ever pushed (e.g. a manually added vehicle silently vanishing). */
    try{localStorage.setItem("ieo_record_pending","1");}catch(e){}
  }
  cloudAutoPush();
  if(typeof scheduleRecordPush==="function")scheduleRecordPush();
  if(typeof scheduleSheetSync==="function")scheduleSheetSync();
}
/* Tour code for a trip log — matched by the vehicle being on an operation whose
   date range covers the trip date. Shown before the date in Daily Activity and in
   the Google Sheet's Daily Activity tab. */
function tripTourCode(r){
  if(r&&r.tourCode)return r.tourCode;
  if(!r)return "—";
  var O=(typeof ops!=="undefined"?ops:[]);
  var sn=function(a,b){return a&&b&&String(a).trim().toLowerCase()===String(b).trim().toLowerCase();};
  /* 1) vehicle on an op whose date range covers the trip; 2) any op for that vehicle;
     3) any op for that driver — so a trip logged off the exact tour dates still resolves. */
  var op=O.find(function(o){return sn(o.veh,r.veh)&&o.startISO&&o.endISO&&o.startISO<=r.date&&r.date<=o.endISO&&o.tourId;})
       ||O.find(function(o){return sn(o.veh,r.veh)&&o.tourId;})
       ||O.find(function(o){return sn(o.driver,r.driver)&&o.tourId;});
  return (op&&op.tourId)||"—";
}

/* Backup / restore — a portable file you can move between devices (manual sync) */
function exportData(){
  var payload={version:DATA_KEY,exportedAt:new Date().toISOString(),
    data:collectStore(),
    trips:(typeof tripLogs!=="undefined"?tripLogs:[])};
  var blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  var url=URL.createObjectURL(blob);var a=document.createElement("a");
  a.href=url;a.download="island-explorer-backup-"+new Date().toISOString().slice(0,10)+".json";
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
function importData(input){
  var file=input.files&&input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(){
    try{
      var p=JSON.parse(reader.result);applyStore(p.data||p);
      if(p.trips){tripLogs=p.trips;try{localStorage.setItem("ieo_sync_trips",JSON.stringify(tripLogs));}catch(e){}}
      persistData();boot(true);
      alert("Backup restored successfully.");
    }catch(e){alert("Could not read that file. Please choose a valid Island Explorer backup (.json).");}
  };
  reader.readAsText(file);input.value="";
}
function resetData(){
  if(!confirm("This will erase every change saved on this device and restore the original sample data. Continue?"))return;
  try{localStorage.removeItem(DATA_KEY);}catch(e){}
  location.reload();
}

/* Booking-sheet row — columns + order match the Google Sheet "booking" tab. */
function bookingSheetRow(b){
  var t=tours.find(function(x){return x.id===b.tour;});
  var row={};
  row["Booking ID"]=b.id||"";
  row["BookingDate"]=b.bookingDate||"";
  row["Point of Contact (POC)"]=b.guest||"";
  row["Tour ID"]=t?tourCode(t):"";
  row["Tour"]=t?tourLabel(t):(b.customTour||"");
  row["Tour Start_Date"]=dOpt(b.start);
  row["Tour End_Date"]=dOpt(b.end);
  /* On a POC row, list this booking's members plus the other team members on the same tour */
  var names=[];if(b.members)names=names.concat(String(b.members).split(/[,\n]/));
  if(t&&t.pocId===b.id)names=names.concat(bookings.filter(function(o){return o.tour===b.tour&&o.id!==b.id;}).map(function(o){return o.guest;}));
  row["Member (s)"]=names.map(function(s){return (s||"").trim();}).filter(Boolean).join(", ");
  row["Party Size"]=b.party||1;
  row["Country"]=b.country||"";
  row["Email"]=b.email||"";
  row["Phone"]=b.phone||"";
  row["status"]=b.status||"";
  row["Total Tour Cost"]=bookingTotalCost(b);
  row["Deposit"]=bookingDeposit(b);
  row["Pending Amount"]=bookingPending(b);
  row["Due Date"]=dOpt(b.lastPendingDate);
  row["Payment Status"]=bookingPaymentStatus(b);
  row["Additional Notes"]=b.notes||"";
  return row;
}

    refreshSettings();

   goes through (you're explicitly choosing to push).
   The threshold is deliberately extreme (lose more than 80% of a 30+ record dataset)
   — an earlier, tighter version of this guard (any drop below 50%, baseline of just 5)
   ended up blocking completely normal, small, intentional deletions (e.g. removing a
   few customers/leads) in a modest-sized dataset, which is a far more common and more
   damaging false positive than the rare true "wipe" scenario it exists to catch. The
   real fix for that scenario is the boot-timestamp fix above; this is only a last-resort
   backstop now, not the primary defense. */
function totalRecordCount(){return (tours.length||0)+(bookings.length||0)+(customers.length||0)+(accBookings.length||0)+(ops.length||0)+(leads.length||0)+(externalGuides.length||0);}
var _lastKnownCloudTotal=0;
async function cloudPush(silent){
  var c=sbConfig(),cl=sbClient();
  if(!cl){if(!silent)sbStatus("Not connected — enter Project URL + anon key and Save first.","err");return;}
  if(silent&&_lastKnownCloudTotal>=30&&totalRecordCount()<_lastKnownCloudTotal*0.2){
    console.warn("Auto-push skipped: local data ("+totalRecordCount()+" records) looks drastically smaller than the last known cloud copy ("+_lastKnownCloudTotal+"). Re-pulling instead.");
    cloudPull(true);
    return;
  }
  if(!silent)sbStatus("Pushing to cloud…","");
  try{
    var ts=new Date().toISOString();
    var res=await cl.from("workspaces").upsert({id:c.ws||"default",data:sbCollect(),updated_at:ts});
    if(res.error)throw res.error;
    setLocalUpdated(ts);
    _lastKnownCloudTotal=totalRecordCount();
    if(!_perRecordActive)_localDirty=false; /* blob mode: this push carried the change up */
    if(!silent)sbStatus("Pushed to cloud ✓ "+new Date().toLocaleTimeString(),"ok");
  }catch(e){if(!silent)sbStatus("Push failed: "+(e.message||e),"err");}
}
/* Returns a status so callers (cloudInit especially) can tell whether it's actually
   safe to push afterwards: 'applied' | 'kept-local' | 'empty' | 'failed'. Never
   silently swallow a failure into "proceed as normal" — a caller that pushes
   unconditionally after a failed pull is exactly how stale data overwrites the cloud. */
async function cloudPull(silent){
  var c=sbConfig(),cl=sbClient();
  if(!cl){if(!silent)sbStatus("Not connected — enter Project URL + anon key and Save first.","err");return "failed";}
  if(!silent)sbStatus("Pulling from cloud…","");
  try{
    var res=await cl.from("workspaces").select("data,updated_at").eq("id",c.ws||"default").maybeSingle();
    if(res.error)throw res.error;
    if(!res.data){if(!silent)sbStatus("Nothing saved in the cloud yet — Push from one device first.","");return "empty";}
    var cd=res.data.data||{};
    _lastKnownCloudTotal=(cd.tours||[]).length+(cd.bookings||[]).length+(cd.customers||[]).length+(cd.accBookings||[]).length+(cd.ops||[]).length+(cd.leads||[]).length+(cd.externalGuides||[]).length;
    var cloudTs=res.data.updated_at||"",localTs=localUpdated();
    /* On auto-sync (silent), only overwrite local if the cloud copy is genuinely newer —
       this stops stale cloud data from wiping out your latest local changes/deletions.
       A manual "Pull from cloud" always applies. */
    var shouldApply=!silent||!localTs||(cloudTs&&cloudTs>localTs);
    if(!shouldApply){if(!silent)sbStatus("Your local copy is newer — kept your changes.","ok");return "kept-local";}
    _sbApplying=true;
    sbApply(res.data.data);
    try{localStorage.setItem(DATA_KEY,JSON.stringify(collectStore()));}catch(e){}
    setLocalUpdated(cloudTs||new Date().toISOString());
    refreshUI();
    _sbApplying=false;
    if(!silent)sbStatus("Pulled from cloud ✓ "+new Date().toLocaleTimeString(),"ok");
    return "applied";
  }catch(e){_sbApplying=false;if(!silent)sbStatus("Pull failed: "+(e.message||e),"err");return "failed";}
}
function cloudAutoPush(){
  if(_sbApplying||!_sbReady)return;
  var c=sbConfig();

}
async function cloudInit(){
  var c=sbConfig();
  if(c&&c.auto&&sbClient()){
    var result=await cloudPull(true);
    /* If a PREVIOUS session left an edit unpushed (see persistData's ieo_record_pending
       flag) — e.g. the tab/app closed or reloaded before the debounced per-record push
       fired — flush that edit to the per-record tables NOW, before pulling. Otherwise
       the unconditional pull below would overwrite the in-memory collections with the
       cloud's older copy, silently erasing whatever was added/edited right before the
       reload (this is exactly how a manually-added vehicle could vanish). A normal boot
       with nothing pending skips this and pulls first, as before — so this can't
       resurrect stale data on a device that's actually behind. */
    try{
      if(localStorage.getItem("ieo_record_pending")==="1")await pushAllRecords();
    }catch(e){}
    /* Per-record tables (if the SQL in docs/DATABASE_SCHEMA.md has been run) are the
       more precise source of truth for the list collections — read them after the
       blob pull and let them override those same collections with the real, current,
       per-record state. If the tables don't exist yet, this just fails harmlessly and
       everything keeps working exactly as it did before this layer existed. */
    _perRecordActive=await pullAllRecords();
    if(_perRecordActive&&_recordsChanged)refreshUI();
    _syncBooting=false; /* the decisive comparison is done — normal timestamp bumping resumes */
    /* Only push after a pull that actually succeeded. 'applied' (took the newer cloud
       copy) and 'kept-local' (this device's copy was genuinely newer) both make a
       follow-up push safe/expected. 'failed' must NOT push — with no reliable read of
       the cloud, pushing here is exactly how a stale local copy overwrites good data. */
    if(result==="applied"||result==="kept-local"||result==="empty")await cloudPush(true);
    if(_perRecordActive)pushAllRecords();
  }else{
    _syncBooting=false;
  }
  _sbReady=true;
  /* Pull + auto-process incoming form submissions right away, so a driver/guide who
     registers shows up in Logistics (Vehicles & Drivers / External Guides) without
     the owner having to open the Inbox first. */
  if(typeof loadSubmissions==="function")try{loadSubmissions(false);}catch(e){}
}
/* Multi-device sync: a silent pull only ever ran once, at page load — so a phone
   session left open never saw changes made on a laptop until it was closed and
   reopened. Now re-pull whenever the tab/app regains focus, and poll every 45s
   while it's visible, so every device converges on the newest cloud copy. */
async function cloudResync(){
  var c=sbConfig();if(!c||!c.auto||!sbClient())return;
  /* If this device has unsynced local edits, PUSH them first and skip the pull this
     round — the next resync (focus / 45s) will bring down remote changes. This is the
     fix for adds/deletes being clobbered by a background pull that raced the save. */
  if(_localDirty||_pushInFlight){flushLocal();return;}
  /* Pull the blob FIRST, then the per-record tables — sequentially, so the per-record
     data (the precise source of truth for list collections) always wins over the
     blob's copy of those same collections instead of racing it. */
  await cloudPull(true);
  if(_perRecordActive){var ok=await pullAllRecords();if(ok&&_recordsChanged)refreshUI();}
  /* Also pull + auto-convert any new form submissions (driver/guide registrations,
     guest details, etc.) in the background, on every view — not only the Inbox. */
  if(typeof loadSubmissions==="function")try{loadSubmissions(false);}catch(e){}
}
/* Upload every pending local change now (both sync layers), then clear the dirty flags. */
function flushLocal(){
  clearTimeout(_sbPushTimer);clearTimeout(_recPushTimer);
  _pushInFlight=true;
  var jobs=[cloudPush(true)];
  if(_perRecordActive)jobs.push(pushAllRecords());
  Promise.all(jobs).then(function(){_pushInFlight=false;_localDirty=false;}).catch(function(){_pushInFlight=false;});
}

/* ===== PER-RECORD SYNC — each tour/booking/customer/... as its own database row =====
   The single 'workspaces' blob above is upserted WHOLESALE on every push, so a bug (or
   a stale device) can only ever be as safe as that one comparison gets it right. This
   layer instead gives every record its own row in its own table, keyed by that record's
   own id/name — a push only touches the specific rows that actually changed on THIS
   device since its last sync, so nothing can ever be wiped by a single bad write.

   It activates itself automatically once the tables exist (run the SQL in
   docs/DATABASE_SCHEMA.md) — until then, pullAllRecords() simply fails and the app
   keeps using the safe blob sync above exactly as before. No manual toggle needed. */
var _perRecordActive=false;
var _lastRecordSnapshot={};
var RECORD_KEYFIELD={vehicles:"name",drivers:"name",operators:"name",externalGuides:"gid"};
var PER_RECORD_KEYS=["tours","bookings","customers","accommodations","accBookings","leads","vehicles","drivers","ops","externalGuides","reservations","operators","quotationLog"];
function recTable(key){return "ieo_"+key.replace(/([A-Z])/g,function(m){return "_"+m.toLowerCase();});}
function recKeyField(key){return RECORD_KEYFIELD[key]||"id";}
function recId(key,item){return String((item&&item[recKeyField(key)])||"");}
function recStoreEntry(key){
  if(key==="tripLogs")return {get:function(){return tripLogs;},set:function(v){tripLogs=v;}};
  return STORE.find(function(s){return s.k===key;});
}
async function pushRecordsForKey(key){
  var cl=sbClient();if(!cl)return;
  var entry=recStoreEntry(key);if(!entry)return;
  var items=entry.get()||[];
  var prev=_lastRecordSnapshot[key]||{};
  var seen={},upserts=[];
  items.forEach(function(item){
    var id=recId(key,item);if(!id)return;
    seen[id]=1;
    var json=JSON.stringify(item);
    if(prev[id]!==json)upserts.push({id:id,data:item,updated_at:new Date().toISOString()});
  });
  var deletedIds=Object.keys(prev).filter(function(id){return !seen[id];});
  try{
    if(upserts.length){var r1=await cl.from(recTable(key)).upsert(upserts);if(r1.error)throw r1.error;}
    if(deletedIds.length){var r2=await cl.from(recTable(key)).delete().in("id",deletedIds);if(r2.error)throw r2.error;}
    var snap={};items.forEach(function(item){var id=recId(key,item);if(id)snap[id]=JSON.stringify(item);});
    _lastRecordSnapshot[key]=snap;
  }catch(e){/* table likely doesn't exist yet — per-record sync just stays inactive */}
}
var _recordKeys=PER_RECORD_KEYS.concat(["tripLogs"]);
function pushAllRecords(){return Promise.all(_recordKeys.map(pushRecordsForKey)).then(function(){_localDirty=false;try{localStorage.removeItem("ieo_record_pending");}catch(e){}});}
var _recPushTimer=null;
function scheduleRecordPush(){if(!_perRecordActive||_sbApplying)return;clearTimeout(_recPushTimer);_recPushTimer=setTimeout(pushAllRecords,1500);}
async function fetchRecordsForKey(key){
  var res=await sbClient().from(recTable(key)).select("id,data");
  if(res.error)throw res.error;
  return (res.data||[]).map(function(r){return r.data;});
}
/* Returns true only if EVERY table exists and was read successfully. Fetches
   everything FIRST and only applies it once all fetches succeed — if any table is
   missing partway through, nothing gets mutated, so a partial read can never leave
   some collections on per-record data and others stale/untouched. */
/* _recordsChanged: set by each pull to whether the fetched data actually differs
   from what this device already had. Callers use it to skip the UI rebuild when
   nothing changed — otherwise the every-45s poll visibly "refreshed" the screen
   (fade-in replay + scroll reset) even though the data was identical. */
var _recordsChanged=false;
async function pullAllRecords(){
  var cl=sbClient();if(!cl)return false;
  try{
    var fetched={};
    for(var i=0;i<_recordKeys.length;i++)fetched[_recordKeys[i]]=await fetchRecordsForKey(_recordKeys[i]);
    var changed=false;
    _recordKeys.forEach(function(key){
      var entry=recStoreEntry(key);if(!entry)return;
      var items=fetched[key];
      var snap={};items.forEach(function(item){var id=recId(key,item);if(id)snap[id]=JSON.stringify(item);});
      var prev=_lastRecordSnapshot[key];
      if(!prev||Object.keys(prev).length!==Object.keys(snap).length||Object.keys(snap).some(function(id){return prev[id]!==snap[id];}))changed=true;
      entry.set(items);
      _lastRecordSnapshot[key]=snap;
    });
    _recordsChanged=changed;
    return true;
  }catch(e){return false;}
}

function driverKey(name){

/* Open an uploaded document. Real URLs open directly; base64 data: URIs (the
   no-storage-bucket fallback) are blocked by browsers as top-level navigation,
   so convert them to a Blob URL first — that opens fine in a new tab. */
function openDoc(u){
  if(!u)return;
  if(String(u).slice(0,5)==="data:"){
    try{
      var comma=u.indexOf(",");var meta=u.slice(5,comma);var mime=(meta.split(";")[0])||"application/octet-stream";
      var b64=u.slice(comma+1);var bin=atob(b64);var arr=new Uint8Array(bin.length);
      for(var i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
      var bu=URL.createObjectURL(new Blob([arr],{type:mime}));
      window.open(bu,"_blank");
      setTimeout(function(){URL.revokeObjectURL(bu);},120000);
      return;
    }catch(e){alert("Couldn't open this document.");return;}
  }
  window.open(u,"_blank");
}

/* ===== Room-availability engine: rooms booked out of accBookings, per property per date ===== */
function accRoomsBookedOn(accId,dateISO){
  return accBookings.filter(function(ab){return ab.accId===accId&&ab.status!=="Cancelled"&&ab.checkIn&&ab.checkOut&&dateISO>=ab.checkIn&&dateISO<ab.checkOut;})
    .reduce(function(s,ab){return s+(parseInt(ab.rooms)||1);},0);
}
function accAvailableOn(accId,dateISO){
  var a=accommodations.find(function(x){return x.id===accId;});if(!a)return 0;
  return Math.max(a.rooms-accRoomsBookedOn(accId,dateISO),0);
}
/* Lowest availability across a whole date range (so a booking can't overbook any single night) */
function accAvailableRange(accId,checkIn,checkOut,excludeBookingId){
  var a=accommodations.find(function(x){return x.id===accId;});if(!a)return 0;
  if(!checkIn||!checkOut)return a.rooms;
  var min=a.rooms,d=new Date(checkIn),end=new Date(checkOut);
  while(d<end){
    var iso=d.toISOString().slice(0,10);
    var booked=accBookings.filter(function(ab){return ab.accId===accId&&ab.id!==excludeBookingId&&ab.status!=="Cancelled"&&ab.checkIn&&ab.checkOut&&iso>=ab.checkIn&&iso<ab.checkOut;}).reduce(function(s,ab){return s+(parseInt(ab.rooms)||1);},0);
    min=Math.min(min,a.rooms-booked);
    d.setDate(d.getDate()+1);
  }
  return Math.max(min,0);
}

/* A clash = the SAME vehicle/driver/guide assigned to two operations whose ACTUAL
   date ranges overlap. Previously this compared o.start / o.end, which are display
   strings like "14 Jun" — lexicographic nonsense that flagged non-overlapping tours.
   Now it compares the real ISO dates (startISO/endISO), and ignores operations that
   are Withdrawn / Declined / Cancelled / Completed (not a live conflict). */
function opActive(o){var s=(o.status||"").toLowerCase();return s!=="withdrawn"&&s!=="declined"&&s!=="cancelled"&&s!=="completed"&&s!=="transferred";}
/* Denormalise vehicle reg, driver phone, guide phone/ID, POC name/phone, tour name
   and stay onto each operation, so the guide app and driver app (which only receive
   the ops rows) can show them without their own lookups. */
function enrichOp(o){
  if(!o)return;
  var v=(vehicles||[]).find(function(x){return x.name===o.veh;});o.reg=(v&&v.reg)||o.reg||"";
  var d=(drivers||[]).find(function(x){return x.name===o.driver;});o.driverPhone=(d&&d.phone)||o.driverPhone||"";
  var g=(externalGuides||[]).find(function(x){return x.name===o.guide;});o.guidePhone=(g&&g.phone)||o.guidePhone||"";o.gid=(g&&g.gid)||o.gid||"";
  /* Multi-leg tours (e.g. one vehicle+driver in South Andaman, a different
     pair for Great Nicobar) — denormalize each leg's reg/phone the same way
     as the primary assignment, so the driver/guide apps never need to look
     the fleet directory up themselves. */
  if(o.legs&&o.legs.length)o.legs.sort(function(a,b){if(!a.start)return b.start?1:0;if(!b.start)return -1;return a.start.localeCompare(b.start);});
  (o.legs||[]).forEach(function(l){
    var lv=(vehicles||[]).find(function(x){return x.name===l.veh;});l.reg=(lv&&lv.reg)||l.reg||"";
    var ld=(drivers||[]).find(function(x){return x.name===l.driver;});l.driverPhone=(ld&&ld.phone)||l.driverPhone||"";
  });
  var t=o.fromTour?(tours||[]).find(function(x){return x.id===o.fromTour;}):null;
  if(t){o.tourId=o.tourId||tourCode(t);o.tourName=t.name||tourLabel(t);if(t.stay&&!o.stay)o.stay=t.stay;
    if(t.pocId){var pb=(bookings||[]).find(function(b){return b.id===t.pocId;});if(pb){o.pocName=pb.guest;o.pocPhone=pb.phone||"";}}}
}
function enrichAllOps(){(ops||[]).forEach(enrichOp);}
function detectClashes(){
  var out=[];
  var live=(ops||[]).filter(opActive);
  for(var i=0;i<live.length;i++)for(var j=i+1;j<live.length;j++){
    var a=live[i],c=live[j];
    var as=a.startISO||"",ae=a.endISO||a.startISO||"",cs=c.startISO||"",ce=c.endISO||c.startISO||"";
    if(!as||!cs)continue;                    /* no real date on one of them → can't be a date clash */
    if(!overlaps(as,ae,cs,ce))continue;      /* different, non-overlapping dates → no clash */
    ["veh","driver","guide"].forEach(function(k){
      if(a[k]&&c[k]&&a[k]!=="—"&&String(a[k]).toLowerCase()===String(c[k]).toLowerCase()){
        out.push({what:k,who:a[k],a:a,b:c});
      }
    });
  }
  return out;
}
/* Aggregate every actionable problem into one list for the dashboard Alerts card.
   Each alert carries a kind+id so a tap can jump straight to the exact record. */
function buildAlerts(){
  var A=[];
  detectClashes().forEach(function(c){
    A.push({level:"err",text:c.who+" ("+c.what+") is double-booked on overlapping dates: "+c.a.tour+" & "+c.b.tour,kind:"op",arg:c.a.id});
  });
  (ops||[]).filter(opActive).forEach(function(o){
    if((o.startISO||"")&&(o.startISO<todayISO))return; /* only flag upcoming/undated ops */
    var missing=[];
    if(!o.guide||o.guide==="—")missing.push("guide");
    if(!o.driver||o.driver==="—")missing.push("driver");
    if(!o.veh||o.veh==="—")missing.push("vehicle");
    /* Stay counts as missing when the primary field is empty/"—" (which is
       also what an empty custom-stay entry saves as) AND no additional-stays
       row names one either. A multi-stay op is also flagged if ANY of its
       stay rows was left without a name. */
    var namedStays=(o.stays||[]).filter(function(s){return s.stay&&s.stay!=="—";}).length;
    if((!o.stay||o.stay==="—")&&!namedStays)missing.push("stay");
    else if((o.stays||[]).length>namedStays)missing.push("stay name on one of its stay rows");
    if(missing.length)A.push({level:"warn",text:o.tour+" ("+(o.dateDisplay||dShort(o.startISO)||"—")+") has no "+missing.join(" / "),kind:"op",arg:o.id});
  });
  bookings.forEach(function(b){
    var p=bookingPending(b);
    if(p>0&&b.lastPendingDate&&b.lastPendingDate<todayISO)A.push({level:"err",text:"Payment overdue — "+b.guest+": "+fmt(p)+" (due "+dShort(b.lastPendingDate)+")",kind:"booking",arg:b.id});
  });
  tours.filter(function(t){return t.start>=todayISO;}).forEach(function(t){
    if(!t.pocId&&bookings.some(function(b){return b.tour===t.id;}))A.push({level:"warn",text:"No point-of-contact set for "+shortName(t),kind:"tour",arg:t.id});
  });
  return A;
}

function tourCard(t){

  var gNames=bookings.filter(function(x){return x.tour===t.id;}).map(function(x){return x.guest;}).join(", ");
  return "<div class='card tour-card' data-action='openTour' data-arg='"+t.id+"'>"+
    "<button class='tour-del' title='Delete tour' onclick='event.stopPropagation();deleteTour(\""+t.id+"\")'><svg width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round'><path d='M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6'/></svg></button>"+
    "<div class='dt-range'>"+dShort(t.start)+" – "+dShort(t.end)+"</div>"+
    "<div class='code-tag' title='"+t.name+"'>"+shortName(t)+"</div>"+
    "<div class='capline'><span><b>"+b+"</b> / "+t.cap+" booked</span><span>"+(t.cap-b)+" seats left</span></div>"+
    "<div class='bar "+(pct>=80?"warn":"")+"'><span style='width:"+pct+"%'></span></div>"+
    (gNames?"<div class='guests'>Guests: "+gNames+"</div>":"")+
    "<div class='foot'><span class='pills'>"+pill(seatStatus(t))+payPill(tourPayStatus(t))+"</span><span class='mono' style='font-size:13px;color:var(--ink-soft)'>"+pct+"% full</span></div>"+
  "</div>";
}
function renderTours(filter=curTab){
  const grid=document.getElementById("tourGrid");if(!grid)return;
  const list=tours.filter(t=>{const s=status(t);
    if(filter==="Completed")return s==="completed";
    if(filter==="Upcoming")return s!=="completed"&&new Date(t.start)>new Date(todayISO);
    if(filter==="Ongoing")return s!=="completed"&&new Date(t.start)<=new Date(todayISO)&&new Date(t.end)>=new Date(todayISO);
    return true;});
  const order=["southandaman","littleandaman","nicobar","narcondam","session","guided-half","custom"];
  const groups={};list.forEach(function(t){(groups[t.cat]=groups[t.cat]||[]).push(t);});
  const cats=Object.keys(groups).sort(function(a,b){var ia=order.indexOf(a),ib=order.indexOf(b);return (ia<0?99:ia)-(ib<0?99:ib);});
  grid.innerHTML=cats.map(function(cat){
    var items=groups[cat].slice().sort(function(a,b){return (a.start||"").localeCompare(b.start||"");});
    return "<div class='tour-col'><div class='tour-col-head'>"+(CATS[cat]||cat)+"<span class='ct'>"+items.length+"</span></div>"+
      items.map(tourCard).join("")+"</div>";
  }).join("")||"<div class='empty'>No tours in this view.</div>";
  persistData();
}
function deleteTour(id){if(!confirm("Delete this tour?"))return;tours=tours.filter(function(t){return t.id!==id;});renderTours();renderCalendar();}
function filterTours(f,el){curTab=f;document.querySelectorAll("#tourTabs .tab").forEach(t=>t.classList.remove("active"));el.classList.add("active");renderTours(f);}

const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const YEAR_MIN=2000, YEAR_MAX=2100; /* ~100-year selectable range */
function yearOptions(sel){var s="";for(var y=YEAR_MIN;y<=YEAR_MAX;y++){s+="<option value='"+y+"'"+(y===sel?" selected":"")+">"+y+"</option>";}return s;}
let calY=2026,calM=5;
function viewCalendar(){
  return "<section class='view' id='v-calendar'>"+
    "<div class='cal-bar'>"+
      "<div class='cal-nav'><button onclick='calStep(-1)' aria-label='Previous month'><svg viewBox='0 0 24 24' fill='none' stroke-width='2' stroke-linecap='round'><path d='M15 18l-6-6 6-6'/></svg></button>"+
        "<button onclick='calStep(1)' aria-label='Next month'><svg viewBox='0 0 24 24' fill='none' stroke-width='2' stroke-linecap='round'><path d='M9 18l6-6-6-6'/></svg></button></div>"+
      "<select class='cal-sel' id='calMonth' onchange='calM=+this.value;renderCalendar()'>"+MONTHS.map((m,i)=>"<option value='"+i+"'>"+m+"</option>").join("")+"</select>"+
      "<select class='cal-sel' id='calYear' onchange='calY=+this.value;renderCalendar()'>"+yearOptions(calY)+"</select>"+
      "<button class='btn btn-ghost btn-sm' onclick='calY=2026;calM=5;renderCalendar()' style='margin-left:auto'>Jump to June 2026</button>"+
    "</div>"+
    "<div class='card card-pad'><div class='cal-scroll'><div class='cal' id='calGrid'></div></div><div class='legend' id='calLegend'></div></div>"+
  "</section>";
}
function calStep(d){calM+=d;if(calM<0){calM=11;calY--}if(calM>11){calM=0;calY++}if(document.getElementById("accCalMonth"))renderAccCalendar();else renderCalendar();}
function renderCalendar(){
  const grid=document.getElementById("calGrid");if(!grid)return;
  document.getElementById("calMonth").value=calM;document.getElementById("calYear").value=calY;
  const first=new Date(calY,calM,1),startDow=(first.getDay()+6)%7,days=new Date(calY,calM+1,0).getDate();
  const iso=d=>calY+"-"+String(calM+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
  const monthTours=tours.filter(t=>t.start<=iso(days)&&t.end>=iso(1));
  let html=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d=>"<div class='dow'>"+d+"</div>").join("");
  for(let i=0;i<startDow;i++)html+="<div class='cell dim'></div>";
  for(let d=1;d<=days;d++){
    const date=iso(d);
    const spans=monthTours.filter(t=>date>=t.start&&date<=t.end).map(t=>{
      const isStart=date===t.start;
      return "<div class='span "+(isStart?"":"cont")+"' style='background:"+tourColor(t.id)+"' title='"+t.name+" ("+dShort(t.start)+"–"+dShort(t.end)+")' data-action='openTour' data-arg='"+t.id+"'>"+(isStart?shortName(t):"·")+"</div>";
    }).join("");
    html+="<div class='cell "+(date===todayISO?"today":"")+"'><div class='dn'>"+d+"</div>"+spans+"</div>";
  }
  grid.innerHTML=html;
  document.getElementById("calLegend").innerHTML=monthTours.length?monthTours.map(t=>"<div class='lg'><span class='sw' style='background:"+tourColor(t.id)+"'></span><span class='lg-name' data-action='openTour' data-arg='"+t.id+"' style='cursor:pointer'>"+shortName(t)+" · "+dShort(t.start)+"–"+dShort(t.end)+"</span><span class='lg-acts'><button class='edit-btn' data-action='editTour' data-arg='"+t.id+"' title='Edit'><svg width='13' height='13' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round'><path d='M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z'/></svg></button><button class='del-btn' data-action='deleteTour' data-arg='"+t.id+"' title='Delete'><svg width='13' height='13' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round'><path d='M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6'/></svg></button></span></div>").join(""):"<div class='lg'>No departures this month.</div>";
  persistData();
}

function renderBookings(){
  const b=document.getElementById("bkBody");if(!b)return;
  /* When a tour has a Point of Contact marked, only the POC shows here — the other
     team members who submitted forms stay in the Customer Database but drop off the
     bookings list (their names are listed under the POC instead). */
  var rows=bookings.filter(function(x){if(!x.tour)return true;var t=tours.find(function(y){return y.id===x.tour;});if(!t||!t.pocId)return true;return x.id===t.pocId;});
  b.innerHTML=rows.map(x=>{const t=tours.find(y=>y.id===x.tour);const lp=x.lastPendingDate?dShort(x.lastPendingDate):"—";
    var names=[];if(x.members)names=names.concat(String(x.members).split(/[,\n]/));
    if(t&&t.pocId===x.id)names=names.concat(bookings.filter(function(o){return o.tour===x.tour&&o.id!==x.id;}).map(function(o){return o.guest;}));
    names=names.map(function(s){return (s||"").trim();}).filter(Boolean);
    var mem=names.length?"<div class='s' style='font-size:11.5px;color:var(--ink-soft);font-weight:400;white-space:normal'>+ "+names.join(", ")+"</div>":"";
    return "<tr><td class='strong'>"+x.guest+mem+"</td><td class='nowrap'>"+(t?tourLabel(t)+"<div class='s' style='font-size:11px;color:var(--ink-soft);font-weight:400;font-family:var(--font-mono)'>"+tourCode(t)+"</div>":(x.customTour||"—"))+"</td><td class='nowrap'>"+(x.start?dShort(x.start)+" – "+dShort(x.end):"—")+"</td><td class='num mono'>"+x.party+"</td><td>"+x.country+"</td><td><span class='pill completed'>"+x.status+"</span></td><td class='num mono'>"+fmt(bookingTotalCost(x))+"</td><td class='num mono'>"+fmt(bookingDeposit(x))+"</td><td class='num mono' style='color:var(--coral)'>"+fmt(bookingPending(x))+"</td><td class='nowrap'>"+lp+"</td><td><span class='pill "+bookingPaymentStatusClass(x)+"'>"+bookingPaymentStatus(x)+"</span></td><td style='color:var(--ink-soft)'>"+(x.notes||"—")+"</td><td><div class='tbl-actions'><button class='edit-btn' data-action='editBooking' data-arg='"+x.id+"' title='Edit'><svg width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round'><path d='M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z'/></svg></button><button class='del-btn' data-action='deleteBooking' data-arg='"+x.id+"' title='Delete'><svg width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round'><path d='M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6'/></svg></button></div></td></tr>"}).join("");
  persistData();
}
function editBooking(id){
  const b=bookings.find(x=>x.id===id);if(!b)return;
  const tOpts=tours.map(t=>"<option value='"+t.id+"' "+(t.id===b.tour?"selected":"")+">"+t.name+"</option>").join("");
  /* Pre-fill the money fields from the tour that was set up at creation, so opening a
     participant that came in via a form already shows Total / Deposit / Pending / Due
     without re-typing. The booking's own values win once it has them. */
  var _lt=b.tour?tours.find(function(x){return x.id===b.tour;}):null;
  var _defTotal=(b.totalOverride!=null&&b.totalOverride!=="")?b.totalOverride:((_lt&&_lt.tourCost)?_lt.tourCost:"");
  var _defDeposit=(b.deposit)?b.deposit:((_lt&&_lt.tourDeposit)?_lt.tourDeposit:0);
  var _defDue=b.lastPendingDate||((_lt&&_lt.due)?_lt.due:"");
  var _totalNum=(_defTotal!==""?parseFloat(_defTotal)||0:bookingTotalCost(b));
  var _defPending=Math.max(_totalNum-(parseFloat(_defDeposit)||0),0);
  modalForm("Edit booking","Update booking","<div class='form-grid'>"+
    "<div class='field full'><label>Tour</label><select class='input' id='eb_tour'>"+tOpts+"</select></div>"+
    "<div class='field'><label>Start date</label><input class='input' type='date' id='eb_start' value='"+(b.start||"")+"'></div>"+
    "<div class='field'><label>End date</label><input class='input' type='date' id='eb_end' value='"+(b.end||"")+"'></div>"+
    "<div class='field'><label>Guest name (POC)</label><input class='input' id='eb_guest' value='"+b.guest+"'></div>"+
    "<div class='field'><label>Party size</label><input class='input mono' type='number' id='eb_party' value='"+b.party+"'></div>"+
    "<div class='field full'><label>Other party members <span style='color:var(--ink-soft);font-weight:400'>(names, comma-separated)</span></label><input class='input' id='eb_members' value='"+(b.members||"").replace(/'/g,"&#39;")+"'></div>"+
    "<div class='field'><label>Country</label><input class='input' id='eb_country' value='"+b.country+"'></div>"+
    "<div class='field'><label>Email</label><input class='input' type='email' id='eb_email' value='"+(b.email||"")+"'></div>"+
    "<div class='field'><label>Phone / WhatsApp</label><input class='input' id='eb_phone' value='"+(b.phone||"")+"'></div>"+
    "<div class='field'><label>Status</label><select class='input' id='eb_status'>"+["Confirmed","Pending","Cancelled","Completed"].map(function(s){return "<option "+(s===(b.status||"Confirmed")?"selected":"")+">"+s+"</option>";}).join("")+"</select></div>"+
    "<div class='field'><label>Payment</label><select class='input' id='eb_pay'>"+
      "<option value='Deposit' "+(b.pay==="Deposit"?"selected":"")+">Deposit</option>"+
      "<option value='Paid' "+(b.pay==="Paid"?"selected":"")+">Paid</option>"+
      "<option value='Balance due' "+(b.pay==="Balance due"?"selected":"")+">Balance due</option>"+
    "</select></div>"+
    "<div class='field'><label>Total Cost (₹) <span style='color:var(--ink-soft);font-weight:400'>blank = auto</span></label><input class='input mono' type='number' id='eb_total' value='"+_defTotal+"' placeholder='"+bookingTotalCost(b)+"' oninput='ebRecalc()'></div>"+
    "<div class='field'><label>Deposit / paid (₹)</label><input class='input mono' type='number' id='eb_deposit' value='"+_defDeposit+"' oninput='ebRecalc()'></div>"+
    "<div class='field'><label>Pending (₹)</label><input class='input mono' id='eb_pending' value='"+_defPending+"' readonly style='background:var(--surface-2)'></div>"+
    "<div class='field'><label>Due date</label><input class='input' type='date' id='eb_lastpend' value='"+_defDue+"'></div>"+
    "<div class='field full'><label>Notes</label><input class='input' id='eb_notes' value='"+(b.notes||"")+"'></div>"+
    "<div class='field full'><label>Quick actions</label><div style='display:flex;gap:8px;flex-wrap:wrap'>"+
      "<button type='button' class='btn btn-sea btn-sm' onclick=\"sendGuestForm('"+b.id+"')\">Guest form · WhatsApp</button>"+
      "<button type='button' class='btn btn-ghost btn-sm' onclick=\"sendGuestFormEmail('"+b.id+"')\">Guest form · Email</button>"+
      (bookingPending(b)>0?"<button type='button' class='btn btn-sea btn-sm' onclick=\"paymentReminder('"+b.id+"')\">Reminder · WhatsApp</button><button type='button' class='btn btn-ghost btn-sm' onclick=\"paymentReminderEmail('"+b.id+"')\">Reminder · Email</button>":"")+
    "</div></div>"+
  "</div>","saveEditBooking","Update booking");
  document.getElementById("modal").dataset.bid=id;
}
function saveEditBooking(){
  const id=document.getElementById("modal").dataset.bid;
  const b=bookings.find(x=>x.id===id);if(!b)return;
  var newStart=document.getElementById("eb_start").value;
  var newEnd=document.getElementById("eb_end").value;
  if(!newStart||!newEnd||newEnd<newStart){alert("Enter valid start and end dates.");return;}
  b.tour=document.getElementById("eb_tour").value;
  b.start=newStart;b.end=newEnd;
  b.guest=document.getElementById("eb_guest").value;
  b.members=document.getElementById("eb_members").value||"";
  b.party=Math.max(parseInt(document.getElementById("eb_party").value)||1,1);
  b.country=document.getElementById("eb_country").value;
  b.email=document.getElementById("eb_email").value;
  b.phone=document.getElementById("eb_phone").value;
  b.status=document.getElementById("eb_status").value;
  b.pay=document.getElementById("eb_pay").value;
  b.deposit=parseFloat(document.getElementById("eb_deposit").value)||0;
  var tv=document.getElementById("eb_total").value;
  b.totalOverride=(tv===""||tv==null)?"":(parseFloat(tv)||0);
  b.lastPendingDate=document.getElementById("eb_lastpend").value||"";
  b.notes=document.getElementById("eb_notes").value;
  syncBookingCustomers(b);
  closeModal();renderBookings();renderTours();renderCalendar();renderCustomers();pushBooking(b);
}
function ebRecalc(){
  var totalEl=document.getElementById("eb_total"),depEl=document.getElementById("eb_deposit"),penEl=document.getElementById("eb_pending");
  if(!penEl)return;
  var b=bookings.find(function(x){return x.id===document.getElementById("modal").dataset.bid;});
  var total=(totalEl.value!==""?parseFloat(totalEl.value)||0:(b?bookingTotalCost(Object.assign({},b,{totalOverride:""})):0));
  var dep=parseFloat(depEl.value)||0;
  penEl.value=Math.max(total-dep,0);
}
function deleteBooking(id){if(!confirm("Delete this booking?"))return;bookings=bookings.filter(b=>b.id!==id);renderBookings();renderTours();renderCalendar();}

function toggleQuoteEdit(){

/* Print/PDF must reuse the same light-green tabular design shown in the modal —
   so we clone the quotation div's outerHTML (id + its own scoped <style> + inline
   styles all travel with it), not just innerHTML which drops the id and background. */
function printQuotation() {
  const body = document.getElementById('quotationBody');
  if (!body) return;

  const printWindow = window.open('', '_blank');
  printWindow.document.write(`
    <!DOCTYPE html>
    <html>
    <head>
      <title>Quotation - Island Explorer</title>
      <meta charset="UTF-8">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Calistoga&family=Inter:wght@400;500;600;700&display=swap');
        *{box-sizing:border-box}
        html,body{margin:0;padding:0;background:#fff}
        body{font-family:'Inter',system-ui,sans-serif;display:flex;justify-content:center}
        #quotationBody{max-width:760px;width:100%}
        @media print{
          @page{margin:14mm}
          body{display:block}
          #quotationBody{max-width:none}
        }
      </style>
    </head>
    <body>
      ${body.outerHTML}
      <script>window.onload=function(){setTimeout(function(){window.print()},300)}<\/script>
    <\/body>
    <\/html>
  `);
  printWindow.document.close();
}
function calcSelection(){
  var key=document.getElementById("calcCategory")?document.getElementById("calcCategory").value:currentCalcTourId;
  if(key)currentCalcTourId=key;
  var pax=document.getElementById("calcGroupSize")?String(document.getElementById("calcGroupSize").value):"2";
  var type=(touristType==="foreigner")?"foreign":"indian";
  var src=SHEET_DATA[currentCalcTourId];
  var d=src&&src[type]?src[type][pax]:null;
  return {key:currentCalcTourId,pax:pax,type:type,d:d,label:CALC_LABELS[currentCalcTourId]||(src?src.title:"")};
}
const CALC_ITEMS=[["accommodation","Accommodation"],["vehicle","Vehicle transport"],["guide","Guide charges"],["ship","Ship / ferry tickets"],["entry","Entry fees / permits"],["food","Food (extra)"]];
function calc(){
  const r=document.getElementById("calcResult");if(!r)return;
  var sel=calcSelection();var d=sel.d;
  if(!d){r.innerHTML="<div style='padding:30px;text-align:center;color:var(--ink-soft)'>No costing data for this selection.</div>";return;}
  var rowEdit=function(key,lab){return "<div class='res-row edit'><span>"+lab+"</span><input class='calc-in mono' type='number' id='cb_"+key+"' value='"+(d[key]||0)+"' oninput='recalcCalc()'></div>";};
  r.innerHTML="<h3>"+sel.label+"</h3>"+
    "<div class='calc-sub'>"+
      "<input class='calc-mini mono' type='number' id='cb_nights' value='"+(d.nights||0)+"' oninput='recalcCalc()'> nights · "+
      "<input class='calc-mini mono' type='number' id='cb_rooms' value='"+(d.rooms||0)+"' oninput='recalcCalc()'> room(s) · "+sel.pax+" pax · "+(sel.type==="foreign"?"Foreigner":"Indian")+
    "</div>"+
    CALC_ITEMS.map(function(it){return rowEdit(it[0],it[1]);}).join("")+
    "<div class='res-row big'><span>Total tour cost</span><b class='mono' id='c_total'>"+fmt(d.total)+"</b></div>"+
    "<div class='res-row big'><span>Per person</span><b class='mono' id='c_per'>"+fmt(d.perPerson)+"</b></div>"+
    "<div style='display:flex;gap:8px;margin-top:14px'>"+
      "<button class='btn btn-sea' onclick='saveCalcRates()' style='flex:1'>Save rates</button>"+
      "<button class='btn btn-primary' onclick='generateQuotation()' style='flex:1'>"+
        "<svg viewBox='0 0 24 24' fill='none' stroke-width='2' stroke-linecap='round'><path d='M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z'/><path d='M14 2v6h6'/><path d='M16 13H8M16 17H8M10 9H8'/></svg>Quotation</button>"+
    "</div>"+
    "<p style='font-size:11px;color:var(--ink-soft);margin-top:8px'>Edit any line to update the total live. <b>Save rates</b> stores it for this tour · "+sel.pax+" pax · "+(sel.type==="foreign"?"Foreigner":"Indian")+" (synced).</p>";
}
function readCalcInputs(){
  var g=function(id){var el=document.getElementById(id);return el?(parseFloat(el.value)||0):0;};
  var o={nights:g("cb_nights"),rooms:g("cb_rooms")};
  var total=0;
  CALC_ITEMS.forEach(function(it){o[it[0]]=g("cb_"+it[0]);total+=o[it[0]];});
  var sel=calcSelection();var pax=Math.max(parseInt(sel.pax)||1,1);
  o.total=total;o.perPerson=Math.round(total/pax);
  return o;
}
function recalcCalc(){
  var o=readCalcInputs();
  var t=document.getElementById("c_total"),p=document.getElementById("c_per");
  if(t)t.textContent=fmt(o.total);if(p)p.textContent=fmt(o.perPerson);
}
function saveCalcRates(){
  var sel=calcSelection();if(!sel.d)return;
  var o=readCalcInputs();
  SHEET_DATA[sel.key][sel.type][sel.pax]=o;
  persistData();calc();
  var btn=event&&event.target;if(btn){var old=btn.textContent;btn.textContent="Saved ✓";setTimeout(function(){btn.textContent=old;},1200);}
}

function opFilter(f,el){_opFilter=f;document.querySelectorAll("#opTabs .tab").forEach(x=>x.classList.remove("active"));if(el)el.classList.add("active");renderOperations();}
function opMatchesFilter(o,f){
  var s=(o.status||"").toLowerCase();
  if(f==="Completed")return s==="completed";
  if(f==="Upcoming")return s!=="completed"&&s!=="cancelled"&&s!=="transferred"&&(o.startISO||"")>=todayISO;
  if(f==="Ongoing")return s==="in progress"||((o.startISO||"")<=todayISO&&(o.endISO||o.startISO||"")>=todayISO&&s!=="completed"&&s!=="cancelled"&&s!=="transferred");
  return true;
}
function renderOperations(){
  var g=document.getElementById("opGrid");if(!g)return;
  var list=(ops||[]).filter(function(o){return opMatchesFilter(o,_opFilter);}).sort(function(a,b){return (a.startISO||"").localeCompare(b.startISO||"");});
  g.innerHTML=list.length?list.map(opCard).join(""):"<div class='empty'>No operations in this view.</div>";
}

/* Locally-persisted guard so a submission is auto-processed exactly once on this
   device, even for legacy rows that can't write their status back to the cloud.
   Without this, legacy submissions (no _rowid) were re-converted on every load,
   inflating customer.tours and spawning duplicate bookings/leads. */
function _procSet(){try{return JSON.parse(localStorage.getItem("ieo_processed")||"[]");}catch(e){return [];}}
function subProcessed(id){if(!id)return false;return _procSet().indexOf(id)>-1;}
function markSubProcessed(id){if(!id)return;var a=_procSet();if(a.indexOf(id)===-1){a.push(id);try{localStorage.setItem("ieo_processed",JSON.stringify(a));}catch(e){}}}
/* Deleted-submissions guard: a submission the user removed stays gone, even if its
   cloud row can't be deleted (legacy rows live inside a shared blob). */
function _delSet(){try{return JSON.parse(localStorage.getItem("ieo_deleted_subs")||"[]");}catch(e){return [];}}
function subDeleted(id){if(!id)return false;return _delSet().indexOf(id)>-1;}
function markSubDeleted(id){if(!id)return;var a=_delSet();if(a.indexOf(id)===-1){a.push(id);try{localStorage.setItem("ieo_deleted_subs",JSON.stringify(a));}catch(e){}}}
function loadSubmissions(force){
  var cl=(typeof sbClient==="function")?sbClient():null;
  var body=document.getElementById("reqBody");
  if(!cl){if(body)body.innerHTML="<div class='empty'>Cloud not connected — set up Supabase in Settings to receive form submissions.</div>";return;}
  if(body&&force)body.innerHTML="<div class='empty'>Loading…</div>";
  /* one row per submission (id like sub_%) + legacy single-row list, merged */
  Promise.all([
    cl.from("workspaces").select("id,data").like("id","sub_%"),
    cl.from("workspaces").select("data").eq("id","ieo_submissions").maybeSingle()
  ]).then(function(r){
    var rows=(r[0]&&r[0].data)||[];
    var list=rows.map(function(row){var o=Object.assign({},row.data);o._rowid=row.id;return o;});
    var legacy=(r[1]&&r[1].data&&r[1].data.data&&r[1].data.data.list)||[];
    _submissions=list.concat(legacy).filter(function(s){return !subDeleted(s.id);}).sort(function(a,b){return (b.created_at||"").localeCompare(a.created_at||"");});
    applyReservationResponses();
    applyOpStatusUpdates();
    applyDriverTripLogs();
    applyDriverTripDeletes();
    autoProcessSubmissions();
    renderRequests();
  }).catch(function(e){if(body)body.innerHTML="<div class='empty'>Network error loading submissions.</div>";});
}
function renderRequests(){
  var body=document.getElementById("reqBody");if(!body)return;
  var subs=(_submissions||[]).filter(function(s){return s.type!=="reservation_response"&&s.type!=="op_status_update"&&s.type!=="driver_trip_log"&&s.type!=="driver_trip_delete";});
  if(!subs.length){body.innerHTML="<div class='empty'>No submissions yet. Share a form link above — entries appear here automatically.</div>";return;}
  var TYPEN={interest:"Tour interest",client:"Guest details",guide:"Guide request",guidedir:"Guide registration",driver:"Driver registration"};
  body.innerHTML=subs.map(function(s){
    var d=s.data||{};
    var rows="";
    var LBL={idNo:"ID number",licenseDoc:"Document",idDoc:"ID document",vehicles:"Vehicles",vehicle:"Vehicle",reg:"Reg. no.",seats:"Seats",license:"Licence no.",address:"Address",expertise:"Expertise",clientType:"Client type",organisation:"Organisation",notes:"Notes",message:"Message",tourCode:"Tour ID",tourId:"Tour ID"};
    Object.keys(d).forEach(function(k){
      var v=d[k];
      if(k==="documents"||v===null||v===undefined||v==="")return;
      var html;
      if(k==="licenseDoc"||k==="idDoc"||(typeof v==="string"&&/^(data:|https?:\/\/)/.test(v))){
        html="<a href='#' onclick=\"event.preventDefault();openSubDocKey('"+s.id+"','"+k+"')\">View document ↗</a>"; /* opened via blob URL — data: URIs are blocked as direct links */
      }else if(Array.isArray(v)){
        if(k==="vehicles")html=v.map(function(x){return x&&(x.name||"")+(x.reg?" ("+x.reg+")":"")+(x.seats?" · "+x.seats+" seats":"");}).filter(Boolean).join(", ")||"—";
        else html=v.map(function(x){return (x&&typeof x==="object")?(x.name||"item"):String(x);}).join(", ");
      }else if(typeof v==="object"){
        html=(v.name||JSON.stringify(v));
      }else{
        html=String(v);if(html.length>140)html=html.slice(0,140)+"…";
      }
      rows+="<div class='kv'><span>"+(LBL[k]||k)+"</span><b>"+html+"</b></div>";
    });
    if(d.documents&&d.documents.length){
      rows+="<div class='kv' style='grid-column:1/-1'><span>documents</span><b>"+d.documents.map(function(doc,di){
        var nm=(typeof doc==="string")?"file":(doc.name||"file");
        var has=(typeof doc==="string")?doc:doc.url;
        if(has)return "<a href='#' onclick=\"event.preventDefault();openSubDocIdx('"+s.id+"',"+di+")\">"+nm+"</a>";
        return nm+(doc.note?" ("+doc.note+")":"");
      }).join(" · ")+"</b></div>";
    }
    var dates=(s.start_date?dShort(s.start_date)+(s.end_date?" – "+dShort(s.end_date):""):"");
    var statusPill="<span class='pill "+(s.status==="accepted"?"completed":s.status==="declined"?"full":"open")+"'>"+(s.status||"new")+"</span>";
    var acts="";
    if(s.type==="interest")acts="<button class='btn btn-primary btn-sm' onclick=\"convertToLead('"+s.id+"')\">Add as lead</button><button class='btn btn-sea btn-sm' onclick=\"convertToBooking('"+s.id+"')\">Create booking</button>";
    else if(s.type==="client")acts="<button class='btn btn-primary btn-sm' onclick=\"convertToBooking('"+s.id+"')\">Create / update booking</button>";
    else if(s.type==="guide")acts="<button class='btn btn-sea btn-sm' onclick=\"setSubStatus('"+s.id+"','accepted')\">Accept</button><button class='btn btn-ghost btn-sm' onclick=\"setSubStatus('"+s.id+"','declined')\">Decline</button>";
    if(s.phone)acts+="<button class='btn btn-ghost btn-sm' onclick=\"replySub('"+s.id+"','wa')\">WhatsApp</button>";
    if(s.email)acts+="<button class='btn btn-ghost btn-sm' onclick=\"replySub('"+s.id+"','email')\">Email</button>";
    return "<div class='card req-card'><div class='req-top'><div><span class='req-type'>"+(TYPEN[s.type]||s.type)+"</span> "+statusPill+"<div class='req-name'>"+(s.name||"—")+"</div>"+
      "<div class='req-sub'>"+[s.phone,s.email,s.country].filter(Boolean).join(" · ")+"</div></div>"+
      "<div class='req-meta'>"+(s.tour?"<div><b>"+s.tour+"</b></div>":"")+(dates?"<div>"+dates+"</div>":"")+(s.party?"<div>"+s.party+" pax</div>":"")+"</div></div>"+
      (rows?"<div class='req-kv'>"+rows+"</div>":"")+
      "<div class='req-acts'>"+acts+"<button class='btn btn-ghost btn-sm' onclick=\"deleteSub('"+s.id+"')\" style='color:var(--coral)'>Delete</button></div></div>";
  }).join("");
}

/* Match an existing customer by name OR email OR phone, so the same person isn't
   duplicated when they book again with slightly different details. */
function findCustomer(name,email,phone){
  name=(name||"").toLowerCase().trim();email=(email||"").toLowerCase().trim();phone=(""+(phone||"")).replace(/\D/g,"");
  return customers.find(function(x){var d=x.details||{};
    if(name&&(x.name||"").toLowerCase().trim()===name)return true;
    if(email&&(x.email||d.email||"").toLowerCase().trim()===email)return true;
    if(phone&&phone.length>=7&&(""+(x.phone||d.phone||"")).replace(/\D/g,"")===phone)return true;
    return false;});
}
function addOrUpdateCustomer(s){
  if(!s.name)return;
  var d=s.data||{};
  var c=findCustomer(s.name,s.email,s.phone);
  if(!c){c={name:s.name,tours:0,repeat:false,pay:"Deposit"};ensureClientId(c);customers.unshift(c);}
  ensureClientId(c);
  c.type=(s.type==="interest"?"Lead":"Client");
  c.tours=(c.tours||0)+1;c.repeat=(c.tours>1);
  if(s.country)c.country=s.country;
  if(s.email)c.email=s.email;
  if(s.phone)c.phone=s.phone;
  c.pref=d.diet||d.message||c.pref||"—";
  c.details=Object.assign({},c.details||{},{
    email:s.email||(c.details&&c.details.email),phone:s.phone||(c.details&&c.details.phone),nationality:s.country||(c.details&&c.details.nationality),
    address:d.address||(c.details&&c.details.address)||"",gender:d.gender,dob:d.dob,idType:d.idType,idNo:d.idNo,idExpiry:d.idExpiry,arrival:d.arrival,departure:d.departure,
    diet:d.diet,room:d.room,emergencyName:d.emergencyName,emergencyPhone:d.emergencyPhone,medical:d.medical,
    documents:d.documents,tourId:d.tourId||(c.details&&c.details.tourId)||"",tourCode:d.tourCode||(c.details&&c.details.tourCode)||"",lastTour:s.tour||"",startDate:s.start_date||(c.details&&c.details.startDate)||"",endDate:s.end_date||(c.details&&c.details.endDate)||"",lastDates:(s.start_date?dShort(s.start_date)+(s.end_date?" – "+dShort(s.end_date):""):"")
  });
  pushCustomer(c);
}
/* Make sure a person exists in the Customer Database (by name), filling in any
   details we have. Used for booking POCs and every listed party member. */
function ensureCustomer(name,opts){
  name=(name||"").trim();if(!name||name==="—")return null;
  opts=opts||{};
  var c=findCustomer(name,opts.email,opts.phone);
  if(!c){c={name:name,tours:1,repeat:false,pay:"Deposit",type:"Client"};ensureClientId(c);customers.unshift(c);}
  ensureClientId(c);if(!c.type)c.type="Client";
  if(opts.country)c.country=opts.country;
  if(opts.email)c.email=opts.email;
  if(opts.phone)c.phone=opts.phone;
  if(opts.pay)c.pay=opts.pay;
  c.details=Object.assign({},c.details||{},{
    email:opts.email||(c.details&&c.details.email),phone:opts.phone||(c.details&&c.details.phone),
    nationality:opts.country||(c.details&&c.details.nationality),
    tourId:opts.tourId||(c.details&&c.details.tourId)||"",
    lastTour:opts.tour||(c.details&&c.details.lastTour),
    startDate:opts.start||(c.details&&c.details.startDate)||"",endDate:opts.end||(c.details&&c.details.endDate)||"",
    lastDates:opts.start?dShort(opts.start)+(opts.end?" – "+dShort(opts.end):""):(c.details&&c.details.lastDates)
  });
  pushCustomer(c);
  return c;
}
/* Add the booking's POC and all listed members to the Customer Database. */
function syncBookingCustomers(b){
  if(!b)return;
  var t=b.tour?tours.find(function(x){return x.id===b.tour;}):null;
  var tourName=t?tourLabel(t):(b.customTour||"");
  /* mirror the booking's payment status onto the POC customer record */
  var payMap={"Fully Paid":"Paid","Partial":"Deposit","Unpaid":"Balance due"};
  var pocPay=payMap[bookingPaymentStatus(b)]||"Deposit";
  ensureCustomer(b.guest,{country:b.country,email:b.email,phone:b.phone,tourId:b.tour||"",tour:tourName,start:b.start,end:b.end,pay:pocPay});
  /* every other member of the party inherits the POC's payment status — and because
     ensureCustomer updates pay when it's passed, changing the POC/tour status later
     re-runs this and updates all members too. */
  if(b.members)String(b.members).split(/[,\n]/).forEach(function(nm){ensureCustomer(nm,{tourId:b.tour||"",tour:tourName,start:b.start,end:b.end,pay:pocPay});});
}
