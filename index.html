/* ===== DRIVER LOG ===== */
function openDriverLog(){
  const vehOpts=vehicles.map(v=>"<option value='"+v.name+"' data-d='"+v.driver+"'>"+v.name+"</option>").join("");
  document.getElementById("modal").innerHTML=
    "<div class='modal-head'><div><span class='eyebrow'>Driver entry</span><h2 class='display' style='font-size:21px;margin-top:6px'>Log today's trip</h2></div>"+XBTN+"</div>"+
    "<div class='modal-body'>"+
      "<div class='driver-note'><svg viewBox='0 0 24 24' fill='none' stroke-width='2' stroke-linecap='round'><path d='M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z'/></svg>This is the owner's entry screen. On save, the trip appears under Daily Activity.</div>"+
      "<div class='form-grid'>"+
        "<div class='field'><label>Date</label><input class='input' type='date' id='dl_date' value='"+todayISO+"'></div>"+
        "<div class='field'><label>Vehicle</label><select class='input' id='dl_veh' onchange='syncDriver()'>"+vehOpts+"</select></div>"+
        "<div class='field'><label>Driver</label><input class='input' id='dl_driver' placeholder='Driver name'></div>"+
        "<div class='field'><label>Start time</label><div class='time-row'><input class='input' type='time' id='dl_start_t' oninput='updateTripTime()'><button class='now-btn' data-action='setNow' data-arg='dl_start_t'>NOW</button></div></div>"+
        "<div class='field'><label>End time</label><div class='time-row'><input class='input' type='time' id='dl_end_t' oninput='updateTripTime()'><button class='now-btn' data-action='setNow' data-arg='dl_end_t'>NOW</button></div></div>"+
        "<div class='field'><label>Start km</label><input class='input mono' type='number' id='dl_start' placeholder='0' oninput='recalcKm()'></div>"+
        "<div class='field'><label>End km</label><input class='input mono' type='number' id='dl_end' placeholder='0' oninput='recalcKm()'></div>"+
        "<div class='field full'><label>Location / route</label><input class='input' id='dl_loc' placeholder='e.g. Port Blair → Chidiya Tapu → Port Blair'></div>"+
      "</div>"+
      "<div class='time-chip'><svg width='15' height='15' viewBox='0 0 24 24' fill='none' stroke='#3f5249' stroke-width='2'><circle cx='12' cy='12' r='9'/><path d='M12 7v5l3 2' stroke-linecap='round'/></svg>Duration<b id='dl_dur'>—</b></div>"+
      "<div class='kmline'><span class='lab'>Total distance</span><span class='big' id='dl_total'>0 km</span></div>"+
    "</div>"+
    "<div class='modal-foot'><button class='btn btn-ghost' onclick='closeModal()'>Cancel</button><button class='btn btn-primary' onclick='saveDriverLog()'>Save trip</button></div>";
  openScrim();
}
function syncDriver(){const sel=document.getElementById("dl_veh");const d=sel.options[sel.selectedIndex].dataset.d;const f=document.getElementById("dl_driver");if(f&&d)f.value=d;}
function setNow(id){const d=new Date();document.getElementById(id).value=String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");updateTripTime();}
function updateTripTime(){
  const s=document.getElementById("dl_start_t")?.value,e=document.getElementById("dl_end_t")?.value,el=document.getElementById("dl_dur");if(!el)return;
  if(s&&e){let[sh,sm]=s.split(":").map(Number),[eh,em]=e.split(":").map(Number);let mins=(eh*60+em)-(sh*60+sm);if(mins<0)mins+=1440;el.textContent=Math.floor(mins/60)+"h "+String(mins%60).padStart(2,"0")+"m";}
  else el.textContent="—";
}
function recalcKm(){const s=parseFloat(document.getElementById("dl_start")?.value||0),e=parseFloat(document.getElementById("dl_end")?.value||0);const el=document.getElementById("dl_total");if(el)el.textContent=Math.max(e-s,0).toLocaleString("en-IN")+" km";}
function saveDriverLog(){
  const start=parseFloat(document.getElementById("dl_start").value||0),end=parseFloat(document.getElementById("dl_end").value||0),veh=document.getElementById("dl_veh").value;
  if(!veh||end<=start){alert("Choose a vehicle and enter an end km greater than start km.");return;}
  const dur=document.getElementById("dl_dur").textContent.replace("—","").trim();
  tripLogs.push({id:"TR"+Date.now(),date:document.getElementById("dl_date").value||todayISO,veh,driver:document.getElementById("dl_driver").value||"—",startKm:start,endKm:end,totalKm:end-start,loc:document.getElementById("dl_loc").value||"—",time:dur||"—",startT:document.getElementById("dl_start_t").value||"",endT:document.getElementById("dl_end_t").value||""});
  saveLogs();closeModal();go("logistics");logTab("Daily Activity");
}
function editTrip(id){
  var tr=tripLogs.find(function(x){return x.id===id;});if(!tr)return;
  var vehOpts=vehicles.map(function(v){return"<option value='"+v.name+"' "+(v.name===tr.veh?"selected":"")+">"+v.name+"</option>";}).join("");
  modalForm("Edit trip","Update trip record","<div class='form-grid'><div class='field'><label>Date</label><input class='input' type='date' id='et_date' value='"+tr.date+"'></div><div class='field'><label>Vehicle</label><select class='input' id='et_veh'>"+vehOpts+"</select></div><div class='field'><label>Driver</label><input class='input' id='et_driver' value='"+tr.driver+"'></div><div class='field'><label>Start km</label><input class='input mono' type='number' id='et_startKm' value='"+tr.startKm+"'></div><div class='field'><label>End km</label><input class='input mono' type='number' id='et_endKm' value='"+tr.endKm+"'></div><div class='field'><label>Total km</label><input class='input mono' type='number' id='et_totalKm' value='"+tr.totalKm+"'></div><div class='field full'><label>Location</label><input class='input' id='et_loc' value='"+tr.loc+"'></div><div class='field'><label>Time</label><input class='input' id='et_time' value='"+tr.time+"'></div></div>","saveEditTrip","Update");
  document.getElementById("modal").dataset.trid=id;
}
function saveEditTrip(){
  var id=document.getElementById("modal").dataset.trid;
  var tr=tripLogs.find(function(x){return x.id===id;});if(!tr)return;
  tr.date=document.getElementById("et_date").value;
  tr.veh=document.getElementById("et_veh").value;
  tr.driver=document.getElementById("et_driver").value;
  tr.startKm=parseFloat(document.getElementById("et_startKm").value)||0;
  tr.endKm=parseFloat(document.getElementById("et_endKm").value)||0;
  tr.totalKm=parseFloat(document.getElementById("et_totalKm").value)||0;
  tr.loc=document.getElementById("et_loc").value;
  tr.time=document.getElementById("et_time").value;
  saveLogs();closeModal();renderLog("Daily Activity");
}
function deleteTrip(id){if(!confirm("Delete this trip record?"))return;tripLogs=tripLogs.filter(function(x){return x.id!==id;});saveLogs();renderLog("Daily Activity");}

/* ===== OPERATOR LOGIN ===== */
function normPhone(p){return String(p||"").replace(/\D/g,"").slice(-10);}
function currentOperator(){try{return JSON.parse(sessionStorage.getItem("ieo_op")||"null");}catch(e){return null;}}
function requireLogin(){
  var ov=document.getElementById("loginOverlay");if(!ov)return;
  if(!operators||!operators.length){ov.classList.remove("show");return;} /* fail open if no operators set */
  var op=currentOperator();
  if(op){applyOperator(op);ov.classList.remove("show");}
  else{ov.classList.add("show");setTimeout(function(){var f=document.getElementById("lg_phone");if(f)f.focus();},80);}
}
function applyOperator(op){
  var who=document.querySelector(".nav-foot .who");if(who)who.textContent=op.name;
  var role=document.querySelector(".nav-foot .role");if(role)role.textContent=(op.role||"Operator")+" · "+op.code;
  var av=document.querySelector(".nav-foot .av");if(av)av.textContent=(op.name||"OP").split(" ").map(function(w){return w[0];}).join("").slice(0,2).toUpperCase();
}
function doLogin(){
  var phone=normPhone(document.getElementById("lg_phone").value);
  var code=String(document.getElementById("lg_code").value||"").trim();
  var err=document.getElementById("lgErr");
  var op=operators.find(function(o){return normPhone(o.phone)===phone&&String(o.code)===code;});
  if(!op){if(err){err.textContent="Phone number or code not recognised.";err.classList.add("show");}return;}
  try{sessionStorage.setItem("ieo_op",JSON.stringify(op));}catch(e){}
  if(err)err.classList.remove("show");
  applyOperator(op);
  document.getElementById("loginOverlay").classList.remove("show");
}
function logout(){try{sessionStorage.removeItem("ieo_op");}catch(e){}requireLogin();}
