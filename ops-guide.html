<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Island Explorer — My Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Calistoga&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#1b2a4a;--soft:#5a6a86;--forest:#143a2e;--blue:#0a6ed1;--paper:#eef1f6;--surface:#fff;--line:#e2e8f1;--ok:#1b7a4d;--err:#c0392b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;padding:18px}
.wrap{max-width:640px;margin:0 auto}
.head{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px 22px 16px;text-align:center;margin-bottom:16px}
.head img{max-width:200px;max-height:80px;object-fit:contain;display:block;margin:0 auto}
.head .brand{font-family:'Calistoga',serif;font-size:20px}.head .brand .ex{color:#1976d2}
.head h1{font-size:15px;font-weight:600;margin-top:10px;color:var(--soft)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 8px 24px -14px rgba(20,40,80,.2)}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.top b{font-size:15px}
.pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;background:#e7f1fb;color:var(--blue);white-space:nowrap}
.pill.warn{background:#fbe7e4;color:var(--err)}
.pill.ok{background:#e4f3ea;color:var(--ok)}
.dates{font-size:12.5px;color:var(--soft);margin-bottom:10px}
.rows{display:grid;grid-template-columns:auto 1fr;gap:5px 10px;font-size:13px}
.rows span.k{color:var(--soft)}.rows span.v{font-weight:600;text-align:right}
.remarks{margin-top:10px;padding:10px 12px;background:var(--paper);border-radius:10px;font-size:13px}
.fb{margin-top:8px;padding:10px 12px;background:#fbe7e4;border-radius:10px;font-size:12.5px;color:var(--err)}
.acts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.acts button{padding:11px 8px;border-radius:10px;border:1px solid var(--line);background:var(--surface);font-size:12.5px;font-weight:700;cursor:pointer;color:var(--ink)}
.acts button.on{border-color:var(--blue);background:#e7f1fb;color:var(--blue)}
.reasonbox{display:none;margin-top:10px}
.reasonbox textarea{width:100%;font:inherit;font-size:14px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;min-height:70px}
.reasonbox button{margin-top:8px;width:100%;padding:11px;border:none;border-radius:10px;background:var(--forest);color:#fff;font-weight:700;cursor:pointer}
.empty{text-align:center;color:var(--soft);padding:40px 20px;font-size:14px}
.err{background:#fbe7e4;color:var(--err);border:1px solid #f0c2bb;border-radius:12px;padding:14px;font-size:14px;margin-bottom:14px}
.ok-box{background:#e4f3ea;color:var(--ok);border:1px solid #b6e0c6;border-radius:12px;padding:14px;font-size:14px;margin-bottom:14px;display:none}
.foot{text-align:center;font-size:11px;color:var(--soft);padding:16px 0}
label{display:block;font-size:12.5px;font-weight:600;margin:10px 0 5px}
input{width:100%;font:inherit;font-size:15px;padding:11px 13px;border:1px solid var(--line);border-radius:11px}
.btn{width:100%;margin-top:14px;padding:14px;border:none;border-radius:12px;background:var(--forest);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <img src="assets/logo.png" alt="Island Explorer Birding Tours" onerror="if(this.src.indexOf('logo.png')>-1){this.src='assets/logo.jpg';}else{this.style.display='none';var f=document.getElementById('brandtext');if(f)f.style.display='block';}">
    <div id="brandtext" style="display:none" class="brand">Island <span class="ex">Explorer</span></div>
    <h1 id="who">Sign in to see your operations</h1>
  </div>
  <div id="err" class="err" style="display:none"></div>
  <div class="card" id="gate">
    <label>Phone number</label><input id="gatePhone" type="tel" placeholder="Registered WhatsApp / phone number">
    <label>Login code</label><input id="gateCode" inputmode="numeric" placeholder="4-digit code from Island Explorer">
    <button class="btn" onclick="doLogin()">View my operations</button>
  </div>
  <div id="list" style="display:none"></div>
</div>
<div class="foot">Island Explorer Birding Tours · +91 99332 02175</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL="https://tbxzxfjumlnciczizols.supabase.co";
const SB_KEY="sb_publishable_IyJJjmOHgA-dbCMH19oY3Q_GzLoZ2ss";
const presetGuide=(new URLSearchParams(location.search).get("guide")||"").trim();
var sb=null;try{sb=window.supabase.createClient(SB_URL,SB_KEY);}catch(e){}
var myGuide=null,allOps=[],allVehicles=[],allDrivers=[];
function showErr(m){var b=document.getElementById("err");b.textContent=m;b.style.display=m?"block":"none";}
function dmy(s){if(!s)return "—";if(/^\d{2}\/\d{2}\/\d{4}/.test(s))return s;var d=new Date(s);if(isNaN(d))return s;function p(n){return(n<10?"0":"")+n;}return p(d.getDate())+"/"+p(d.getMonth()+1)+"/"+d.getFullYear();}
function row(k,v){return "<span class='k'>"+k+"</span><span class='v'>"+(v||"—")+"</span>";}
function normPhone(p){return String(p||"").replace(/\D/g,"");}

async function doLogin(){
  showErr("");
  var phone=normPhone(document.getElementById("gatePhone").value);
  var code=document.getElementById("gateCode").value.trim();
  if(!phone||!code){showErr("Enter your phone number and login code.");return;}
  if(!sb){showErr("Service unavailable right now. Please try again shortly.");return;}
  try{
    /* Server-side login check (RPC, security definer) — the guide/driver directory
       and full ops table are never sent to the browser; only this guide's own
       record and their own assigned ops come back. */
    var res=await sb.rpc("guide_login",{p_phone:phone,p_code:code});
    if(res.error||!res.data||res.data.error){showErr("Phone number or code didn't match. Ask Island Explorer to confirm your login code.");return;}
    myGuide=res.data.guide;
    allOps=res.data.ops||[];
    allVehicles=res.data.vehicles||[];
    allDrivers=res.data.drivers||[];
    document.getElementById("gate").style.display="none";
    document.getElementById("who").textContent="Operations for "+myGuide.name;
    renderList();
  }catch(e){showErr("Couldn't sign you in. Please try again.");}
}

function myOps(){return allOps.filter(function(o){return (o.guide||"").trim().toLowerCase()===myGuide.name.trim().toLowerCase();}).sort(function(a,b){return (a.startISO||"").localeCompare(b.startISO||"");});}

function renderList(){
  var list=document.getElementById("list");list.style.display="block";
  var mine=myOps();
  if(!mine.length){list.innerHTML="<div class='empty'>No operations assigned to you yet.</div>";return;}
  list.innerHTML=mine.map(function(o){
    var cls=o.status==="Withdrawn"||o.status==="Declined"?"warn":(o.status==="Completed"?"ok":"");
    var v=allVehicles.find(function(x){return x.name===o.veh;})||{};
    var d=allDrivers.find(function(x){return x.name===o.driver;})||{};
    return "<div class='card' id='card_"+o.id+"'><div class='top'><b>"+(o.tour||"Tour")+"</b><span class='pill "+cls+"' id='statuspill_"+o.id+"'>"+(o.status||"Scheduled")+"</span></div>"+
      (o.tourId?"<div class='dates mono'>"+o.tourId+"</div>":"")+
      "<div class='dates'>"+dmy(o.startISO||o.start)+(o.endISO||o.end?" – "+dmy(o.endISO||o.end):"")+"</div>"+
      "<div class='rows'>"+row("Pax",o.pax)+row("Vehicle",o.veh)+row("Reg. No.",v.reg)+row("Driver",o.driver)+row("Driver No.",d.phone)+row("Pickup Date",dmy(o.pickupDate))+row("Pickup Location",o.pickupLoc||o.pickup)+row("Drop Date",dmy(o.dropDate))+row("Drop Location",o.dropLoc)+row("Stay",o.stay)+"</div>"+
      (o.remarks?"<div class='remarks'><b>Remarks:</b> "+o.remarks+"</div>":"")+
      (o.guideFeedback?"<div class='fb'><b>Your note ("+dmy(o.guideFeedbackAt)+"):</b> "+o.guideFeedback+"</div>":"")+
      "<div class='acts' id='acts_"+o.id+"'>"+
        "<button onclick=\"setOpStatus('"+o.id+"','In progress')\">In Progress</button>"+
        "<button onclick=\"setOpStatus('"+o.id+"','Completed')\">Completed</button>"+
        "<button onclick=\"toggleReason('"+o.id+"','Withdrawn')\">Withdrawn</button>"+
        "<button onclick=\"toggleReason('"+o.id+"','Declined')\">Declined</button>"+
      "</div>"+
      "<div class='reasonbox' id='reason_"+o.id+"'><label>Reason / feedback</label><textarea id='reasontext_"+o.id+"' placeholder='Let Island Explorer know why…'></textarea><button onclick=\"submitReason('"+o.id+"')\">Submit</button></div>"+
    "</div>";
  }).join("");
}
function setBusy(opId,busy,label){
  var box=document.getElementById("acts_"+opId);if(!box)return;
  box.querySelectorAll("button").forEach(function(b){b.disabled=busy;b.style.opacity=busy?"0.5":"1";});
  if(busy&&label){var p=document.getElementById("statuspill_"+opId);if(p)p.textContent=label;}
}
function toggleReason(opId,status){
  document.querySelectorAll(".reasonbox").forEach(function(b){if(b.id!=="reason_"+opId)b.style.display="none";});
  var box=document.getElementById("reason_"+opId);
  box.dataset.status=status;
  box.style.display=(box.style.display==="block")?"none":"block";
}
async function submitReason(opId){
  var box=document.getElementById("reason_"+opId);
  var text=document.getElementById("reasontext_"+opId).value.trim();
  if(!text){alert("Please add a short reason before submitting.");return;}
  await postStatus(opId,box.dataset.status,text);
}
async function setOpStatus(opId,status){await postStatus(opId,status,"");}
async function postStatus(opId,status,reason){
  if(!sb){showErr("Service unavailable right now.");return;}
  showErr("");
  setBusy(opId,true,"Saving…");
  var rec={id:"S"+Date.now()+Math.floor(Math.random()*100000),type:"op_status_update",status:"new",name:myGuide.name,created_at:new Date().toISOString(),
    data:{opId:opId,newStatus:status,reason:reason,guide:myGuide.name}};
  try{
    var up=await sb.from("workspaces").insert({id:"sub_"+rec.id,data:rec,updated_at:rec.created_at});
    if(up.error){setBusy(opId,false);showErr("Could not update: "+up.error.message);return;}
    var o=allOps.find(function(x){return x.id===opId;});
    if(o){o.status=status;if(reason){o.guideFeedback=reason;o.guideFeedbackAt=rec.created_at;}}
    renderList();
  }catch(e){setBusy(opId,false);showErr("Network error. Please try again.");}
}
</script>
</body>
</html>
