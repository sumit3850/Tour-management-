function makeBookingFromSub(s){
  var t=null;
  if(s.data&&s.data.tourId)t=tours.find(function(x){return x.id===s.data.tourId;});
  if(!t&&s.tour)t=tours.find(function(x){return shortName(x)===s.tour||x.name===s.tour;});
  /* avoid duplicate booking for the same guest+tour */
  var dup=bookings.find(function(b){return (b.guest||"").toLowerCase()===(s.name||"").toLowerCase()&&b.tour===(t?t.id:"")&&b.start===(s.start_date||(t?t.start:""));});
  if(!dup){
    var start=s.start_date||(t?t.start:"");var end=s.end_date||(t?t.end:start);
    bookings.unshift({id:"B"+Date.now()+Math.floor(Math.random()*100),tour:t?t.id:"",guest:s.name||"—",party:s.party||1,country:s.country||"—",email:s.email||"",phone:s.phone||"",status:"Confirmed",pay:"Deposit",notes:(s.data&&(s.data.message||s.data.medical))||"",start:start,end:end,deposit:0,lastPendingDate:""});
    addOrUpdateCustomer(s);
    var dd=s.data||{};
    var docs=(dd.documents||[]).map(function(x){return (typeof x==="string")?x:(x.url||x.name||"");}).filter(Boolean).join(" | ");
    postToSheet("booking",{key:(s.email||s.phone||s.name||""),bookingDate:dShort(new Date()),guestPOC:s.name||"",tour:t?shortName(t):(s.tour||""),customTour:"",start:start,end:end,party:s.party||1,country:s.country||"",nationality:dd.nationality||s.country||"",email:s.email||"",phone:s.phone||"",dob:dd.dob||"",idType:dd.idType||"",idNo:dd.idNo||"",idExpiry:dd.idExpiry||"",arrival:dd.arrival||"",departure:dd.departure||"",dietary:dd.diet||"",room:dd.room||"",emergencyName:dd.emergencyName||"",emergencyPhone:dd.emergencyPhone||"",medical:dd.medical||"",documents:docs,status:"Confirmed",payment:"Deposit"});
  }
  return t;
}
function convertToBooking(id){
  var s=_submissions.find(function(x){return x.id===id;});if(!s)return;
  var t=makeBookingFromSub(s);
  renderBookings();renderTours();renderCalendar();renderCustomers();setSubStatus(id,"booked",true);persistData();
  alert("Booking + customer created for "+(s.name||"guest")+(t?" on "+shortName(t):"")+". It now shows in Bookings, the tour, Calendar occupancy and Customers.");
}
/* Guest-detail submissions auto-create a booking + customer; interest submissions auto-create a lead.
   Idempotent via status, and the snapshot-clear stops phantom sample data. */
function autoProcessSubmissions(){
  var changed=false;
  (_submissions||[]).forEach(function(s){
    if(s.status==="booked"||s.status==="lead-added"||s.type==="reservation_response")return;
    if(s.type==="client"){makeBookingFromSub(s);s.status="booked";changed=true;saveSubmissionRow(s);}
    else if(s.type==="interest"){
      addOrUpdateCustomer(s);
      if(!leads.find(function(l){return (l.name||"").toLowerCase()===(s.name||"").toLowerCase()&&l.tour===(s.tour||"—");}))
        leads.unshift({id:"L"+Date.now()+Math.floor(Math.random()*100),name:s.name||"—",country:s.country||"—",tour:s.tour||"—",date:(s.start_date||"").slice(0,7)||"—",stage:"New",src:"Web form"});
      s.status="lead-added";changed=true;saveSubmissionRow(s);
    }
  });
  if(changed){renderBookings();renderTours();renderCalendar();renderCustomers();renderCRM();persistData();}
}
function setSubStatus(id,status,silent){
  var s=_submissions.find(function(x){return x.id===id;});if(s){s.status=status;saveSubmissionRow(s);}
  renderRequests();
}
function deleteSub(id){
  if(!confirm("Delete this submission?"))return;
  var s=_submissions.find(function(x){return x.id===id;});var cl=sbClient();
  _submissions=_submissions.filter(function(x){return x.id!==id;});renderRequests();
  if(cl&&s&&s._rowid)cl.from("workspaces").delete().eq("id",s._rowid).then(function(){});
}

function avgDays(field){
  var diffs=reservations.map(function(r){if(r.createdAt&&r[field])return (new Date(r[field])-new Date(r.createdAt))/864e5;return null;}).filter(function(v){return v!=null&&v>=0;});
  if(!diffs.length)return null;
  return Math.round(diffs.reduce(function(a,b){return a+b;},0)/diffs.length*10)/10;
}

      kpi("Open requests",reservations.filter(function(r){return r.stage!=="confirmed";}).length,"in pipeline","","M9 11l3 3 8-8")+
      kpi("Confirmed",reservations.filter(function(r){return r.stage==="confirmed";}).length,"accepted","up","M20 6 9 17l-5-5")+
      kpi("Avg time to review",aR==null?"—":aR+"d","proposed to review","","M12 6v6l4 2M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z")+
      kpi("Avg time to accept",aA==null?"—":aA+"d","proposed to accepted","","M12 6v6l4 2M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z")+
    "</div></div>";
}
function applyReservationResponses(){
  var changed=false;
  (_submissions||[]).filter(function(s){return s.type==="reservation_response";}).forEach(function(s){
    var d=s.data||{};var r=reservations.find(function(x){return x.id===d.rid;});if(!r)return;
    if(d.by)r.respondedBy=d.by;
    if(d.response==="review"&&r.stage==="proposed"){r.stage="review";r.reviewedAt=r.reviewedAt||s.created_at;changed=true;}
    else if(d.response==="accepted"&&r.stage!=="confirmed"){r.stage="confirmed";r.acceptedAt=r.acceptedAt||s.created_at;if(!r.reviewedAt)r.reviewedAt=s.created_at;updateTourGuideFromReservation(r);changed=true;}
    else if(d.response==="declined"&&r.stage!=="declined"){r.stage="declined";r.declined=true;r.declinedAt=s.created_at;changed=true;}
  });
  if(changed){persistData();if(document.getElementById("resKanban"))renderReservations();renderTours&&renderTours();renderCalendar&&renderCalendar();}
}

function updateTourGuideFromReservation(r){

  "</div>","savePost","Schedule");

function savePost(){

/* ===== TOUR DETAIL ===== */
function markPoc(tid,bid){var t=tours.find(function(x){return x.id===tid;});if(!t)return;t.pocId=(t.pocId===bid?"":bid);persistData();openTour(tid);}
function openTour(id){
  const t=tours.find(x=>x.id===id);if(!t)return;const b=booked(id),bs=bookings.filter(x=>x.tour===id),wl=waitlist[id]||[];
  var poc=bs.find(function(x){return x.id===t.pocId;});
  document.getElementById("modal").innerHTML=
    "<div class='modal-head'><div><span class='cat "+t.cat+"'>"+CATS[t.cat]+"</span><h2 style='font-size:20px;font-weight:700;margin-top:8px'>"+shortName(t)+"</h2><div style='color:var(--ink-soft);font-size:13px;margin-top:2px'>"+t.name+" · "+dShort(t.start)+" – "+dShort(t.end)+" · "+durNights(t)+" nights</div></div>"+XBTN+"</div>"+
    "<div class='modal-body'>"+
      "<div class='team-card'><div class='tc-av'>"+(poc?String(poc.guest||"P").split(" ").map(function(w){return w[0];}).join("").slice(0,2).toUpperCase():"—")+"</div><div class='tc-meta'><div class='tc-role'>Point of contact</div><div class='tc-name'>"+(poc?poc.guest:"Not set — tap the ☆ next to a participant below")+"</div>"+(poc?"<div class='tc-contact'>"+[poc.phone,poc.email].filter(Boolean).join(" · ")+"</div>":"")+"<div class='tc-contact' style='margin-top:2px'>Guide: "+(t.guide||"—")+"</div></div></div>"+
      "<div class='stat-strip'><div class='s'><div class='v mono'>"+t.cap+"</div><div class='l'>Capacity</div></div><div class='s'><div class='v mono'>"+b+"</div><div class='l'>Seats sold</div></div><div class='s'><div class='v mono' style='color:var("+"sea)'>"+(t.cap-b)+"</div><div class='l'>Remaining</div></div><div class='s'><div class='v mono'>"+wl.length+"</div><div class='l'>Waitlist</div></div></div>"+
      "<div class='bar "+(b/t.cap>=.8?"warn":"")+"' style='margin-bottom:18px'><span style='width:"+Math.min(b/t.cap*100,100)+"%'></span></div>"+
      "<div style='display:grid;grid-template-columns:1fr 1fr;gap:8px 18px;font-size:13px;margin-bottom:18px'>"+
        "<div><span style='color:var("+"ink-soft)'>Pickup</span><br><b>"+t.pickup+"</b></div><div><span style='color:var("+"ink-soft)'>Birding start</span><br><b>"+t.startLoc+"</b></div>"+
        "<div><span style='color:var("+"ink-soft)'>Accommodation</span><br><b>"+t.stay+"</b></div><div><span style='color:var("+"ink-soft)'>Status</span><br>"+pill(status(t))+"</div>"+
      "</div>"+
      "<div style='display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px'>"+
        "<button class='btn btn-sea btn-sm' onclick=\"shareTourForm('"+id+"','interest')\">Share interest form</button>"+
        "<button class='btn btn-ghost btn-sm' onclick=\"shareTourForm('"+id+"','client')\">Send guest form (after advance)</button>"+
      "</div>"+
      "<div class='section-head' style='margin-bottom:8px'><div class='h-sec' style='font-size:15px'>Bookings</div><button class='btn btn-primary btn-sm' data-action='openAddBooking' data-arg='"+id+"'><svg viewBox='0 0 24 24' fill='none' stroke-width='2' stroke-linecap='round'><path d='M12 5v14M5 12h14'/></svg>Add booking</button></div>"+
      "<div class='tbl-wrap'><table><thead><tr><th>PoC</th><th>Guest</th><th>Dates</th><th>Country</th><th class='num'>Pax</th><th>Payment</th><th></th></tr></thead><tbody>"+(bs.map(x=>"<tr><td><button class='poc-star "+(t.pocId===x.id?"on":"")+"' title='Mark as point of contact' onclick=\"markPoc('"+id+"','"+x.id+"')\">"+(t.pocId===x.id?"★":"☆")+"</button></td><td class='strong nowrap'>"+x.guest+"</td><td class='nowrap'>"+(x.start?dShort(x.start)+" – "+dShort(x.end):"—")+"</td><td>"+x.country+"</td><td class='num mono'>"+x.party+"</td><td><span class='pill "+(x.pay==="Paid"?"completed":"plain")+"'>"+x.pay+"</span></td><td><div class='tbl-actions'><button class='edit-btn' data-action='editBooking' data-arg='"+x.id+"' title='Modify booking'><svg width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round'><path d='M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z'/></svg></button><button class='del-btn' data-action='deleteBooking' data-arg='"+x.id+"' title='Delete'><svg width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round'><path d='M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6'/></svg></button></div></td></tr>").join("")||"<tr><td colspan='7' class='empty'>No bookings yet.</td></tr>")+"</tbody></table></div>"+
      (wl.length?"<div class='h-sec' style='font-size:14px;margin:16px 0 6px'>Waitlist</div>"+wl.map(w=>"<div class='list-row'><div class='meta'><div class='t'>"+w.guest+"</div></div><span class='pill plain'>"+w.party+" pax</span></div>").join(""):
"")+
    "</div>";
  openScrim();
}

/* ===== DRIVER LOG ===== */
function openDriverLog(){
  const vehOpts=vehicles.map(v=>"<option value='"+v.name+"' data-d='"+v.driver+"'>"+v.name+"</option>").join("");
  document.getElementById("modal").innerHTML=
    "<div class='modal-head'><div><span class='eyebrow'>Driver entry</span><h2 class='display' style='font-size:21px;margin-top:6px'>Log today's trip</h2></div>"+XBTN+"</div>"+
    "<div class='modal-body'>"+
      "<div class='driver-note'><svg viewBox='0 0 24 24' fill='none' stroke-width='2' stroke-linecap='round'><path d='M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z'/></svg>This is the owner's entry screen. On save, the trip appears under Daily Activity.</div>"+
      "<div class='form-grid'>"+
        "<div class='field'><label>Date</label><input class='input' type='date' id='dl_date' value='"+todayISO+"'></div>"+
        "<div class='field'><label>Vehicle</label><select class='input' id='dl_veh' onchange='syncDriver()'>"+vehOpts+"</select></div>"+
        "<div class='field'><label>Driver</label><input class='input' id='dl_driver' placeholder='Driver name'></div>"+
        "<div class='field'><label>Start time</label><div class='time-row'><input class='input' type='time' id='dl_start_t' oninput='updateTripTime()'><button class='now-btn' data-action='setNow' data-arg='dl_start_t'>NOW</button></div></div>"+
        "<div class='field'><label>End time</label><div class='time-row'><input class='input' type='time' id='dl_end_t' oninput='updateTripTime()'><button class='now-btn' data-action='setNow' data-arg='dl_end_t'>NOW</button></div></div>"+
        "<div class='field'><label>Start km</label><input class='input mono' type='number' id='dl_start' placeholder='0' oninput='recalcKm()'></div>"+
        "<div class='field'><label>End km</label><input class='input mono' type='number' id='dl_end' placeholder='0' oninput='recalcKm()'></div>"+
        "<div class='field full'><label>Location / route</label><input class='input' id='dl_loc' placeholder='e.g. Port Blair → Chidiya Tapu → Port Blair'></div>"+
      "</div>"+
      "<div class='time-chip'><svg width='15' height='15' viewBox='0 0 24 24' fill='none' stroke='#3f5249' stroke-width='2'><circle cx='12' cy='12' r='9'/><path d='M12 7v5l3 2' stroke-linecap='round'/></svg>Duration<b id='dl_dur'>—</b></div>"+
      "<div class='kmline'><span class='lab'>Total distance</span><span class='big' id='dl_total'>0 km</span></div>"+
    "</div>"+
    "<div class='modal-foot'><button class='btn btn-ghost' onclick='closeModal()'>Cancel</button><button class='btn btn-primary' onclick='saveDriverLog()'>Save trip</button></div>";
  openScrim();
}
function syncDriver(){const sel=document.getElementById("dl_veh");const d=sel.options[sel.selectedIndex].dataset.d;const f=document.getElementById("dl_driver");if(f&&d)f.value=d;}
function setNow(id){const d=new Date();document.getElementById(id).value=String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");updateTripTime();}
function updateTripTime(){
  const s=document.getElementById("dl_start_t")?.value,e=document.getElementById("dl_end_t")?.value,el=document.getElementById("dl_dur");if(!el)return;
  if(s&&e){let[sh,sm]=s.split(":").map(Number),[eh,em]=e.split(":").map(Number);let mins=(eh*60+em)-(sh*60+sm);if(mins<0)mins+=1440;el.textContent=Math.floor(mins/60)+"h "+String(mins%60).padStart(2,"0")+"m";}
  else el.textContent="—";
}
function recalcKm(){const s=parseFloat(document.getElementById("dl_start")?.value||0),e=parseFloat(document.getElementById("dl_end")?.value||0);const el=document.getElementById("dl_total");if(el)el.textContent=Math.max(e-s,0).toLocaleString("en-IN")+" km";}
function saveDriverLog(){
  const start=parseFloat(document.getElementById("dl_start").value||0),end=parseFloat(document.getElementById("dl_end").value||0),veh=document.getElementById("dl_veh").value;
  if(!veh||end<=start){alert("Choose a vehicle and enter an end km greater than start km.");return;}
  const dur=document.getElementById("dl_dur").textContent.replace("—","").trim();
  tripLogs.push({id:"TR"+Date.now(),date:document.getElementById("dl_date").value||todayISO,veh,driver:document.getElementById("dl_driver").value||"—",startKm:start,endKm:end,totalKm:end-start,loc:document.getElementById("dl_loc").value||"—",time:dur||"—",startT:document.getElementById("dl_start_t").value||"",endT:document.getElementById("dl_end_t").value||""});
  saveLogs();closeModal();go("logistics");logTab("Daily Activity");
}
function editTrip(id){
  var tr=tripLogs.find(function(x){return x.id===id;});if(!tr)return;
  var vehOpts=vehicles.map(function(v){return"<option value='"+v.name+"' "+(v.name===tr.veh?"selected":"")+">"+v.name+"</option>";}).join("");
  modalForm("Edit trip","Update trip record","<div class='form-grid'><div class='field'><label>Date</label><input class='input' type='date' id='et_date' value='"+tr.date+"'></div><div class='field'><label>Vehicle</label><select class='input' id='et_veh'>"+vehOpts+"</select></div><div class='field'><label>Driver</label><input class='input' id='et_driver' value='"+tr.driver+"'></div><div class='field'><label>Start km</label><input class='input mono' type='number' id='et_startKm' value='"+tr.startKm+"'></div><div class='field'><label>End km</label><input class='input mono' type='number' id='et_endKm' value='"+tr.endKm+"'></div><div class='field'><label>Total km</label><input class='input mono' type='number' id='et_totalKm' value='"+tr.totalKm+"'></div><div class='field full'><label>Location</label><input class='input' id='et_loc' value='"+tr.loc+"'></div><div class='field'><label>Time</label><input class='input' id='et_time' value='"+tr.time+"'></div></div>","saveEditTrip","Update");
  document.getElementById("modal").dataset.trid=id;
}
function saveEditTrip(){
  var id=document.getElementById("modal").dataset.trid;
  var tr=tripLogs.find(function(x){return x.id===id;});if(!tr)return;
  tr.date=document.getElementById("et_date").value;
  tr.veh=document.getElementById("et_veh").value;
  tr.driver=document.getElementById("et_driver").value;
  tr.startKm=parseFloat(document.getElementById("et_startKm").value)||0;
  tr.endKm=parseFloat(document.getElementById("et_endKm").value)||0;
  tr.totalKm=parseFloat(document.getElementById("et_totalKm").value)||0;
  tr.loc=document.getElementById("et_loc").value;
  tr.time=document.getElementById("et_time").value;
  saveLogs();closeModal();renderLog("Daily Activity");
}
function deleteTrip(id){if(!confirm("Delete this trip record?"))return;tripLogs=tripLogs.filter(function(x){return x.id!==id;});saveLogs();renderLog("Daily Activity");}

}
boot();

/* ===== AUTHENTICATION (Supabase email/password) ===== */
var _authMode="signin"; /* signin | signup */
function authClient(){return (typeof sbClient==="function")?sbClient():null;}
function lgEl(id){return document.getElementById(id);}
function lgMsg(box,msg){var e=lgEl(box==="ok"?"lgOk":"lgErr"),o=lgEl(box==="ok"?"lgErr":"lgOk");if(e){e.textContent=msg;e.classList.add("show");}if(o)o.classList.remove("show");}
function lgClearMsg(){["lgErr","lgOk"].forEach(function(i){var e=lgEl(i);if(e)e.classList.remove("show");});}
function showLogin(){var ov=lgEl("loginOverlay");if(ov){ov.classList.add("show");setTimeout(function(){var f=lgEl("lg_email");if(f)f.focus();},80);}}
function hideLogin(){var ov=lgEl("loginOverlay");if(ov)ov.classList.remove("show");}
function applyUser(user){
  var name=(user&&(user.user_metadata&&user.user_metadata.name))||(user&&user.email)||"Operator";
  var who=document.querySelector(".nav-foot .who");if(who)who.textContent=name;
  var role=document.querySelector(".nav-foot .role");if(role)role.textContent=(user&&user.email)||"Signed in";
  var av=document.querySelector(".nav-foot .av");if(av)av.textContent=String(name).split(/[ @.]/).filter(Boolean).map(function(w){return w[0];}).join("").slice(0,2).toUpperCase();
}
function initAuth(){
  var cl=authClient();
  if(!cl){hideLogin();return;} /* fail open if Supabase unavailable, so you're never locked out */
  cl.auth.getSession().then(function(res){
    var s=res&&res.data&&res.data.session;
    if(s&&s.user){applyUser(s.user);hideLogin();}else{showLogin();}
  }).catch(function(){showLogin();});
  cl.auth.onAuthStateChange(function(_e,session){if(session&&session.user){applyUser(session.user);hideLogin();}});
}
function authToggleMode(){
  _authMode=(_authMode==="signin")?"signup":"signin";
  lgClearMsg();
  lgEl("lgTitle").textContent=_authMode==="signup"?"Create account":"Sign in";
  lgEl("lgSub").textContent=_authMode==="signup"?"Register a new operator login.":"Welcome back. Sign in to your console.";
  lgEl("lgBtn").textContent=_authMode==="signup"?"Create account":"Sign in";
  lgEl("lgToggle").textContent=_authMode==="signup"?"Back to sign in":"Create new account";
}
function authPrimary(){if(_authMode==="signup")authSignUp();else authSignIn();}
function authSignIn(){
  var cl=authClient();if(!cl){lgMsg("err","Auth service unavailable.");return;}
  var email=lgEl("lg_email").value.trim(),pw=lgEl("lg_pw").value;
  if(!email||!pw){lgMsg("err","Enter your email and password.");return;}
  var remember=lgEl("lg_remember")?lgEl("lg_remember").checked:true;
  try{localStorage.setItem("ieo_remember",remember?"1":"0");}catch(e){}
  lgEl("lgBtn").disabled=true;
  cl.auth.signInWithPassword({email:email,password:pw}).then(function(res){
    lgEl("lgBtn").disabled=false;
    if(res.error){lgMsg("err",res.error.message);return;}
    lgClearMsg();applyUser(res.data.user);hideLogin();
  }).catch(function(e){lgEl("lgBtn").disabled=false;authNetErr(e);});
}
function authNetErr(e){
  lgMsg("err","Couldn't reach the sign-in server. Your Supabase project may be paused, or email auth may be disabled. Check the Supabase dashboard and try again.");
}
function authSignUp(){
  var cl=authClient();if(!cl){lgMsg("err","Auth service unavailable.");return;}
  var email=lgEl("lg_email").value.trim(),pw=lgEl("lg_pw").value;
  if(!email||pw.length<6){lgMsg("err","Enter an email and a password of at least 6 characters.");return;}
  lgEl("lgBtn").disabled=true;
  cl.auth.signUp({email:email,password:pw}).then(function(res){
    lgEl("lgBtn").disabled=false;
    if(res.error){lgMsg("err",res.error.message);return;}
    if(res.data&&res.data.session){applyUser(res.data.user);hideLogin();}
    else{lgMsg("ok","Account created. Check your email to confirm, then sign in.");authToggleMode();}
  }).catch(function(e){lgEl("lgBtn").disabled=false;authNetErr(e);});
}
function authForgot(){
  var cl=authClient();if(!cl){lgMsg("err","Auth service unavailable.");return;}
  var email=lgEl("lg_email").value.trim();
  if(!email){lgMsg("err","Enter your email above first, then tap Forgot password.");return;}
  cl.auth.resetPasswordForEmail(email,{redirectTo:location.href.split("#")[0]}).then(function(res){
    if(res.error){lgMsg("err",res.error.message);return;}
    lgMsg("ok","Password reset link sent to "+email+".");
  }).catch(function(e){authNetErr(e);});
}
/* bypass removed per request */
function logout(){
  var cl=authClient();
  if(cl)cl.auth.signOut().then(function(){showLogin();});
  else showLogin();
}
/* If "remember me" was unchecked, end the session when the tab closes */
window.addEventListener("beforeunload",function(){
  try{if(localStorage.getItem("ieo_remember")==="0"){var cl=authClient();if(cl)cl.auth.signOut();}}catch(e){}
});
</script>
