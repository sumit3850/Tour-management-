<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Island Explorer — Driver App</title>
<link rel="manifest" href="manifest-driver.json">
<meta name="theme-color" content="#143a2e">
<link rel="apple-touch-icon" href="assets/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Calistoga&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#1b2a4a;--soft:#5a6a86;--forest:#143a2e;--blue:#0a6ed1;--paper:#eef1f6;--surface:#fff;--line:#e2e8f1;--ok:#1b7a4d;--err:#c0392b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;padding:18px}
.wrap{max-width:640px;margin:0 auto}
.head{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px 22px 16px;text-align:center;margin-bottom:16px}
.head img{max-width:200px;max-height:80px;object-fit:contain;display:block;margin:0 auto}
.head .brand{font-family:'Calistoga',serif;font-size:20px}.head .brand .ex{color:#1976d2}
.head h1{font-size:15px;font-weight:600;margin-top:10px;color:var(--soft)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 8px 24px -14px rgba(20,40,80,.2)}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.top b{font-size:15px}
.pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;background:#e7f1fb;color:var(--blue);white-space:nowrap}
.dates{font-size:12.5px;color:var(--soft);margin-bottom:10px}
.dates.mono{font-family:monospace}
.rows{display:grid;grid-template-columns:auto 1fr;gap:5px 10px;font-size:13px}
.rows span.k{color:var(--soft)}.rows span.v{font-weight:600;text-align:right}
.empty{text-align:center;color:var(--soft);padding:40px 20px;font-size:14px}
.err{background:#fbe7e4;color:var(--err);border:1px solid #f0c2bb;border-radius:12px;padding:14px;font-size:14px;margin-bottom:14px}
.ok-box{background:#e4f3ea;color:var(--ok);border:1px solid #b6e0c6;border-radius:12px;padding:14px;font-size:14px;margin-bottom:14px;display:none}
.foot{text-align:center;font-size:11px;color:var(--soft);padding:16px 0}
label{display:block;font-size:12.5px;font-weight:600;margin:10px 0 5px}
input,select{width:100%;font:inherit;font-size:15px;padding:11px 13px;border:1px solid var(--line);border-radius:11px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;margin-top:14px;padding:14px;border:none;border-radius:12px;background:var(--forest);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.btn:disabled{opacity:.6}
.sec-h{font-size:15px;font-weight:700;margin-bottom:10px}
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tab{flex:1;padding:10px;border-radius:10px;border:1px solid var(--line);background:var(--surface);font-weight:700;font-size:13px;cursor:pointer;color:var(--ink)}
.tab.on{border-color:var(--blue);background:#e7f1fb;color:var(--blue)}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <img src="assets/logo.png" alt="Island Explorer Birding Tours" onerror="if(this.src.indexOf('logo.png')>-1){this.src='assets/logo.jpg';}else{this.style.display='none';var f=document.getElementById('brandtext');if(f)f.style.display='block';}">
    <div id="brandtext" style="display:none" class="brand">Island <span class="ex">Explorer</span></div>
    <h1 id="who">Sign in to log your trips</h1>
    <button id="installBtn" onclick="installApp()" style="display:flex;align-items:center;gap:7px;width:fit-content;margin:12px auto 0;padding:9px 15px;background:var(--surface);color:var(--forest);border:1.5px solid var(--forest);border-radius:10px;font-size:13px;font-weight:700;cursor:pointer">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Install app
    </button>
  </div>
  <div id="err" class="err" style="display:none"></div>
  <div class="ok-box" id="okbox"></div>
  <div class="card" id="gate">
    <label>Phone number</label><input id="gatePhone" type="tel" placeholder="Registered phone number">
    <label>Login code</label><input id="gateCode" inputmode="numeric" placeholder="4-digit code from Island Explorer">
    <button class="btn" onclick="doLogin()">Sign in</button>
  </div>
  <div id="app" style="display:none">
    <div class="tabs">
      <button class="tab on" id="tab_trips" onclick="switchTab('trips')">My Trips</button>
      <button class="tab" id="tab_log" onclick="switchTab('log')">Log a Trip</button>
    </div>
    <div id="tripsView"></div>
    <div id="logView" style="display:none"></div>
  </div>
</div>
<div class="foot">Island Explorer Birding Tours · +91 99332 02175</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL="https://tbxzxfjumlnciczizols.supabase.co";
const SB_KEY="sb_publishable_IyJJjmOHgA-dbCMH19oY3Q_GzLoZ2ss";
var sb=null;try{sb=window.supabase.createClient(SB_URL,SB_KEY);}catch(e){}
/* ===== Install as an app (PWA) — always-visible button, instructions fallback ===== */
var _deferredInstallPrompt=null;
function isStandaloneApp(){return (window.matchMedia&&window.matchMedia("(display-mode: standalone)").matches)||window.navigator.standalone===true;}
if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){});});}
window.addEventListener("beforeinstallprompt",function(e){e.preventDefault();_deferredInstallPrompt=e;});
window.addEventListener("appinstalled",function(){_deferredInstallPrompt=null;var b=document.getElementById("installBtn");if(b){b.lastChild.textContent="App installed ✓";b.style.opacity="0.7";}});
function installApp(){
  if(_deferredInstallPrompt){_deferredInstallPrompt.prompt();_deferredInstallPrompt.userChoice.then(function(){_deferredInstallPrompt=null;});return;}
  if(isStandaloneApp()){alert("The app is already installed on this device — open it from your home screen.");return;}
  var ua=navigator.userAgent||"";
  var isIOS=/iPad|iPhone|iPod/.test(ua)||(navigator.platform==="MacIntel"&&navigator.maxTouchPoints>1);
  if(isIOS){alert("To install on iPhone/iPad:\n\n1. Tap the Share button (square with an up-arrow) at the bottom of Safari.\n2. Choose \"Add to Home Screen\".");return;}
  alert("To install:\n\nOpen your browser menu (⋮ or ⋯) and choose \"Install app\" or \"Add to Home screen\".\n\nIf you don't see it, the app may already be installed, or try opening this site in Chrome.");
}
var myDriver=null,allOps=[];
var todayISO=new Date().toISOString().slice(0,10);
function showErr(m){var b=document.getElementById("err");b.textContent=m;b.style.display=m?"block":"none";}
function showOk(m){var b=document.getElementById("okbox");b.textContent=m;b.style.display=m?"block":"none";}
function dmy(s){if(!s)return "—";if(/^\d{2}\/\d{2}\/\d{4}/.test(s))return s;var d=new Date(s);if(isNaN(d))return s;function p(n){return(n<10?"0":"")+n;}return p(d.getDate())+"/"+p(d.getMonth()+1)+"/"+d.getFullYear();}
function row(k,v){return "<span class='k'>"+k+"</span><span class='v'>"+(v||"—")+"</span>";}
function normPhone(p){return String(p||"").replace(/\D/g,"");}

async function doLogin(){
  showErr("");
  var phone=normPhone(document.getElementById("gatePhone").value);
  var code=document.getElementById("gateCode").value.trim();
  if(!phone||!code){showErr("Enter your phone number and login code.");return;}
  if(!sb){showErr("Service unavailable right now. Please try again shortly.");return;}
  try{
    /* Server-side login check (RPC, security definer) — the driver directory and
       full ops table are never sent to the browser; only this driver's own record
       and their own assigned ops come back. */
    var res=await sb.rpc("driver_login",{p_phone:phone,p_code:code});
    if(res.error||!res.data||res.data.error){showErr("Phone number or code didn't match. Ask Island Explorer to confirm your login code.");return;}
    myDriver=res.data.driver;
    allOps=res.data.ops||[];
    document.getElementById("gate").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("who").textContent="Welcome, "+myDriver.name;
    renderTrips();renderLogForm();
  }catch(e){showErr("Couldn't sign you in. Please try again.");}
}
function switchTab(t){
  document.getElementById("tab_trips").classList.toggle("on",t==="trips");
  document.getElementById("tab_log").classList.toggle("on",t==="log");
  document.getElementById("tripsView").style.display=(t==="trips")?"block":"none";
  document.getElementById("logView").style.display=(t==="log")?"block":"none";
}
function myOps(){return allOps.filter(function(o){return (o.driver||"").trim().toLowerCase()===myDriver.name.trim().toLowerCase();}).sort(function(a,b){return (a.startISO||"").localeCompare(b.startISO||"");});}
function renderTrips(){
  var mine=myOps();
  var el=document.getElementById("tripsView");
  if(!mine.length){el.innerHTML="<div class='empty'>No trips assigned to you yet.</div>";return;}
  el.innerHTML=mine.map(function(o){
    return "<div class='card'><div class='top'><b>"+(o.tour||"Trip")+"</b><span class='pill'>"+(o.status||"Scheduled")+"</span></div>"+
      "<div class='dates'>"+dmy(o.startISO||o.start)+(o.endISO||o.end?" – "+dmy(o.endISO||o.end):"")+"</div>"+
      "<div class='rows'>"+row("Vehicle",o.veh)+row("Pax",o.pax)+row("Pickup Date",dmy(o.pickupDate))+row("Pickup Location",o.pickupLoc||o.pickup)+row("Drop Date",dmy(o.dropDate))+row("Drop Location",o.dropLoc)+"</div>"+
      (o.remarks?"<div class='rows' style='margin-top:8px'><span class='k'>Remarks</span><span class='v' style='text-align:left'>"+o.remarks+"</span></div>":"")+
    "</div>";
  }).join("");
}
function renderLogForm(){
  var el=document.getElementById("logView");
  el.innerHTML="<div class='card'>"+
    "<div class='sec-h'>Log today's trip</div>"+
    "<label>Date</label><input type='date' id='dl_date' value='"+todayISO+"'>"+
    "<label>Vehicle</label><input id='dl_veh' value='"+(myDriver.veh||"")+"' placeholder='e.g. Innova'>"+
    "<div class='row2'><div><label>Start time</label><input type='time' id='dl_startt'></div><div><label>End time</label><input type='time' id='dl_endt'></div></div>"+
    "<div class='row2'><div><label>Start km</label><input type='number' id='dl_startkm' placeholder='0'></div><div><label>End km</label><input type='number' id='dl_endkm' placeholder='0'></div></div>"+
    "<label>Location / route</label><input id='dl_loc' placeholder='e.g. Port Blair → Chidiya Tapu → Port Blair'>"+
    "<button class='btn' id='dl_submit' onclick='submitTrip()'>Save trip</button>"+
  "</div>";
}
async function submitTrip(){
  showErr("");showOk("");
  var date=document.getElementById("dl_date").value;
  var veh=document.getElementById("dl_veh").value.trim();
  var sKm=document.getElementById("dl_startkm").value,eKm=document.getElementById("dl_endkm").value;
  if(!date||!veh){showErr("Enter the date and vehicle.");return;}
  if(eKm!==""&&sKm!==""&&(+eKm)<(+sKm)){showErr("End km must be greater than start km.");return;}
  var sT=document.getElementById("dl_startt").value,eT=document.getElementById("dl_endt").value;
  var time="—";
  if(sT&&eT){var sh=+sT.split(":")[0],sm=+sT.split(":")[1],eh=+eT.split(":")[0],em=+eT.split(":")[1];var mins=(eh*60+em)-(sh*60+sm);if(mins<0)mins+=1440;time=Math.floor(mins/60)+"h "+String(mins%60).padStart(2,"0")+"m";}
  var btn=document.getElementById("dl_submit");btn.disabled=true;btn.textContent="Saving…";
  var rec={id:"S"+Date.now()+Math.floor(Math.random()*100000),type:"driver_trip_log",status:"new",name:myDriver.name,created_at:new Date().toISOString(),
    data:{date:date,veh:veh,startKm:sKm,endKm:eKm,loc:document.getElementById("dl_loc").value,startT:sT,endT:eT,time:time}};
  try{
    var up=await sb.from("workspaces").insert({id:"sub_"+rec.id,data:rec,updated_at:rec.created_at});
    btn.disabled=false;btn.textContent="Save trip";
    if(up.error){showErr("Could not save: "+up.error.message);return;}
    showOk("Trip saved — it will appear in Island Explorer's Daily Activity shortly.");
    renderLogForm();
  }catch(e){btn.disabled=false;btn.textContent="Save trip";showErr("Network error. Please try again.");}
}
</script>
</body>
</html>
