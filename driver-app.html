<style>
:root{--ink:#1b2a4a;--soft:#5a6a86;--forest:#143a2e;--blue:#0a6ed1;--paper:#eef1f6;--surface:#fff;--line:#e2e8f1;--ok:#1b7a4d;--err:#c0392b;--amber:#b8860b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;padding:18px}
.wrap{max-width:640px;margin:0 auto}
.head{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px 22px 16px;text-align:center;margin-bottom:16px}
.head img{max-width:200px;max-height:80px;object-fit:contain;display:block;margin:0 auto}
.head .brand{font-family:'Calistoga',serif;font-size:20px}.head .brand .ex{color:#1976d2}
.head h1{font-size:15px;font-weight:600;margin-top:10px;color:var(--soft)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 8px 24px -14px rgba(20,40,80,.2)}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.top b{font-size:15px}
.pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;background:#e7f1fb;color:var(--blue);white-space:nowrap}
.pill.warn{background:#fbe7e4;color:var(--err)}
.pill.ok{background:#e4f3ea;color:var(--ok)}
.pill.mid{background:#fff4e0;color:var(--amber)}
.dates{font-size:12.5px;color:var(--soft);margin-bottom:10px}
.dates.mono{font-family:monospace}
.rows{display:grid;grid-template-columns:auto 1fr;gap:5px 10px;font-size:13px}
.rows span.k{color:var(--soft)}.rows span.v{font-weight:600;text-align:right}
.empty{text-align:center;color:var(--soft);padding:40px 20px;font-size:14px}
.err{background:#fbe7e4;color:var(--err);border:1px solid #f0c2bb;border-radius:12px;padding:14px;font-size:14px;margin-bottom:14px}

.foot{text-align:center;font-size:11px;color:var(--soft);padding:16px 0}
label{display:block;font-size:12.5px;font-weight:600;margin:10px 0 5px}
input,select{width:100%;font:inherit;font-size:15px;padding:11px 13px;border:1px solid var(--line);border-radius:11px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;margin-top:14px;padding:14px;border:none;border-radius:12px;background:var(--forest);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.btn:disabled{opacity:.6}
.btn-sm{width:auto;margin-top:0;padding:9px 14px;font-size:13px;border-radius:10px}
.btn-ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line)}
.sec-h{font-size:15px;font-weight:700;margin-bottom:10px}
.hint{font-size:11.5px;color:var(--soft);margin-top:4px}
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tab{flex:1;padding:10px 6px;border-radius:10px;border:1px solid var(--line);background:var(--surface);font-weight:700;font-size:12.5px;cursor:pointer;color:var(--ink)}
.tab.on{border-color:var(--blue);background:#e7f1fb;color:var(--blue)}
.acts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.acts button{padding:11px 8px;border-radius:10px;border:1px solid var(--line);background:var(--surface);font-size:12.5px;font-weight:700;cursor:pointer;color:var(--ink)}
.acts button.on{border-color:var(--blue);background:#e7f1fb;color:var(--blue)}
.reasonbox{display:none;margin-top:10px}
.reasonbox textarea{width:100%;font:inherit;font-size:14px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;min-height:70px}
.reasonbox button{margin-top:8px;width:100%;padding:11px;border:none;border-radius:10px;background:var(--forest);color:#fff;font-weight:700;cursor:pointer}
.fb{margin-top:8px;padding:10px 12px;background:#fff4e0;border-radius:10px;font-size:12.5px;color:#7a5a00}
.trip-actions{display:flex;gap:8px;margin-top:10px}
.trip-actions button{flex:1}
.head{position:relative}
.logout-btn{position:absolute;top:16px;right:16px;border:1px solid var(--line);background:var(--surface);border-radius:9px;padding:7px 12px;font-size:12px;font-weight:700;color:var(--soft);cursor:pointer}
.install-btn{width:100%;margin-top:10px;padding:11px;border:1px dashed var(--blue);border-radius:11px;background:#e7f1fb;color:var(--blue);font-size:13px;font-weight:700;cursor:pointer}
</style>
</head>

<div class="wrap">
  <div class="head">
    <button class="logout-btn" id="logoutBtn" style="display:none" onclick="doLogout()">Log out</button>

<script>

function dmy(s){if(!s)return "—";if(/^\d{2}\/\d{2}\/\d{4}/.test(s))return s;var d=new Date(s);if(isNaN(d))return s;function p(n){return(n<10?"0":"")+n;}return p(d.getDate())+"/"+p(d.getMonth()+1)+"/"+d.getFullYear();}

/* ===== OFFLINE SUPPORT =====
   The app must open and stay usable with no internet. The last successful
   sign-in (driver + assigned ops + saved trips) is cached; every status
   change and trip log is queued locally and flushed to Island Explorer
   automatically when the connection returns; and all of it — plus a draft of
   the trip form being typed — lives in localStorage, so leaving the app idle
   for hours (or the phone silently discarding the tab) never loses anything. */
var LS_SESSION="ie_drv_session_v1",LS_QUEUE="ie_drv_queue_v1",LS_DRAFT="ie_drv_draft_v1";
function lsGet(k){try{return JSON.parse(localStorage.getItem(k)||"null");}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function lsDel(k){try{localStorage.removeItem(k);}catch(e){}}
/* navigator.onLine lies — many Android browsers report it false while the
   phone clearly has signal. So we NEVER block on it: we always attempt the
   network and let the actual result decide. _netOk tracks the last real
   outcome (optimistically true until a request truly fails), and that — not
   navigator.onLine — drives the "offline" banner. */
var _netOk=true;
function isOnline(){return navigator.onLine!==false;}
var syncQueue=lsGet(LS_QUEUE)||[];
function saveSession(){if(myDriver)lsSet(LS_SESSION,{phone:myPhone,code:myCode,driver:myDriver,ops:allOps,vehicles:myVehicles,savedTrips:mySavedTrips,savedAt:Date.now()});}
function saveQueue(){lsSet(LS_QUEUE,syncQueue);updateNet();}
function enqueue(rec){syncQueue.push(rec);saveQueue();}
function updateNet(){
  var b=document.getElementById("netbar");if(!b)return;
  var pend=syncQueue.length;
  if(!_netOk){b.style.display="block";b.style.background="#fff4e0";b.style.color="#7a5a00";b.innerHTML="⚡ Offline — your changes are saved on this phone"+(pend?" · "+pend+" waiting to sync":"")+".";return;}
  if(pend){b.style.display="block";b.style.background="#e7f1fb";b.style.color="var(--blue)";b.innerHTML=pend+" change"+(pend>1?"s":"")+" waiting to sync · <span style='cursor:pointer;text-decoration:underline' onclick='syncNow()'>Sync now</span>";return;}
  b.style.display="none";
}
async function flushQueue(){
  ensureSb();
  if(!sb||!syncQueue.length)return;
  var still=[],anyOk=false,anyFail=false;
  for(var i=0;i<syncQueue.length;i++){
    var rec=syncQueue[i];
    try{var up=await sb.from("workspaces").insert({id:"sub_"+rec.id,data:rec,updated_at:rec.created_at});if(up&&up.error){still.push(rec);anyFail=true;}else anyOk=true;}
    catch(e){still.push(rec);anyFail=true;}
  }
  syncQueue=still;
  if(anyFail)_netOk=false;else if(anyOk)_netOk=true;
  saveQueue();
}
async function syncNow(){await flushQueue();backgroundRefresh();}
function showApp(){
  document.getElementById("gate").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("logoutBtn").style.display="block";
  document.getElementById("who").textContent="Welcome, "+((myDriver&&myDriver.name)||"");
  renderTrips();renderLogForm();restoreDraft();updateNet();
}
/* Re-fetch fresh data (and flush any queued writes) without disturbing the
   view — used on sign-in, when coming back online, and when the app regains
   focus after being idle. */
async function backgroundRefresh(){
  ensureSb();
  if(!sb||!myPhone||!myCode)return;
  await flushQueue();
  try{
    var res=await sb.rpc("driver_login",{p_phone:myPhone,p_code:myCode});
    if(res&&!res.error&&res.data&&!res.data.error){
      _netOk=true;
      myDriver=res.data.driver;allOps=res.data.ops||[];
      allOps.forEach(function(o){if(o.legs&&o.legs.length)o.legs.sort(function(a,b){if(!a.start)return b.start?1:0;if(!b.start)return -1;return a.start.localeCompare(b.start);});});
      myVehicles=res.data.vehicles||[];
      saveSession();renderTrips();updateNet();
    }else if(res&&res.error){_netOk=false;updateNet();}
  }catch(e){_netOk=false;updateNet();}
  loadSavedTrips();
}
function offlineRestore(phone,code){
  var s=lsGet(LS_SESSION);
  if(s&&s.driver&&String(s.phone)===String(phone)&&String(s.code)===String(code)){
    myDriver=s.driver;myPhone=phone;myCode=code;allOps=s.ops||[];myVehicles=s.vehicles||[];mySavedTrips=s.savedTrips||null;
    showApp();return true;
  }
  return false;
}
/* Persist / restore a half-finished trip-log form so a reload after hours idle
   (or the OS discarding the tab) doesn't wipe what the driver already typed. */
function saveDraft(){
  var lv=document.getElementById("logView");if(!lv||lv.style.display==="none")return;
  var d={};["dl_tour","dl_customtour","dl_date","dl_veh","dl_reg","dl_startt","dl_endt","dl_startkm","dl_endkm","dl_loc"].forEach(function(id){var el=document.getElementById(id);if(el)d[id]=el.value;});
  lsSet(LS_DRAFT,d);
}
function restoreDraft(){
  var d=lsGet(LS_DRAFT);if(!d)return;
  Object.keys(d).forEach(function(id){var el=document.getElementById(id);if(el&&d[id]!=null&&d[id]!=="")el.value=d[id];});
  if(typeof onTourPick==="function")onTourPick();
}
/* The browser's online/offline events are only hints — treat 'online' as a
   nudge to try syncing (the attempt itself decides _netOk) and 'offline' as a
   soft signal, but always keep attempting network calls regardless. */
window.addEventListener("online",function(){_netOk=true;updateNet();syncNow();});
window.addEventListener("offline",function(){_netOk=false;updateNet();});
document.addEventListener("visibilitychange",function(){saveSession();saveDraft();if(document.visibilityState==="visible")syncNow();});
window.addEventListener("pagehide",function(){saveSession();saveDraft();});
/* On open, restore the last session immediately so the app works offline, then
   always try to refresh in the background (the attempt sorts out connectivity). */
window.addEventListener("load",function(){
  var lv=document.getElementById("logView");if(lv)lv.addEventListener("input",saveDraft);
  var s=lsGet(LS_SESSION);
  if(s&&s.driver){myDriver=s.driver;myPhone=s.phone;myCode=s.code;allOps=s.ops||[];myVehicles=s.vehicles||[];mySavedTrips=s.savedTrips||null;showApp();backgroundRefresh();}
  else updateNet();

async function doLogin(){
  showErr("");
  var phone=normPhone(document.getElementById("gatePhone").value);
  var code=document.getElementById("gateCode").value.trim();
  if(!phone||!code){showErr("Enter your phone number and login code.");return;}
  var btn=document.getElementById("loginBtn");btn.disabled=true;var oldTxt=btn.textContent;btn.textContent="Signing in…";
  function done(){btn.disabled=false;btn.textContent=oldTxt;}
  function fail(m){done();showErr(m);}
  /* Always ATTEMPT the real sign-in — never pre-block on navigator.onLine
     (which is unreliable on Android). Only fall back to the cached session if
     the network request itself fails. */
  ensureSb();
  if(!sb){if(offlineRestore(phone,code)){done();return;}return fail("Can't reach the sign-in service. Check your connection and try again.");}
  try{
    var res=await sb.rpc("driver_login",{p_phone:phone,p_code:code});
    if(res.error){_netOk=false;if(offlineRestore(phone,code)){done();return;}return fail("Sign-in service error: "+(res.error.message||"unknown")+". Ask Island Explorer to check the app setup (docs/SECURE_ACCESS.md).");}
    if(!res.data||res.data.error){_netOk=true;return fail("Phone number or code didn't match. Ask Island Explorer to confirm your login code.");}
    _netOk=true;
    myDriver=res.data.driver;myPhone=phone;myCode=code;
    allOps=res.data.ops||[];
    allOps.forEach(function(o){if(o.legs&&o.legs.length)o.legs.sort(function(a,b){if(!a.start)return b.start?1:0;if(!b.start)return -1;return a.start.localeCompare(b.start);});});
    myVehicles=res.data.vehicles||[];
    done();saveSession();showApp();flushQueue();
    loadSavedTrips();
  }catch(e){_netOk=false;if(offlineRestore(phone,code)){done();return;}fail("Couldn't reach the server. If you're offline, connect to the internet for your first sign-in, then try again.");}
}
function doLogout(){
  myDriver=null;myPhone="";myCode="";allOps=[];myVehicles=[];mySavedTrips=null;_savedLoading=false;_tripFilter="Scheduled";
  lsDel(LS_SESSION);lsDel(LS_DRAFT); /* keep the sync queue — unsynced changes must survive logout */
  document.getElementById("gatePhone").value="";
  document.getElementById("gateCode").value="";
  document.getElementById("app").style.display="none";
  document.getElementById("gate").style.display="block";

/* Registration number for a vehicle name — used wherever a vehicle is shown, so a
   bare name is never displayed alone when we know its reg. no. */
function regForVeh(name){
  if(!name)return "";
  var v=(myVehicles||[]).find(function(x){return (x.name||"").toLowerCase()===String(name).toLowerCase();});
  return v?(v.reg||""):"";
}
function vehLabel(name,reg){reg=reg||regForVeh(name);return name?(reg?name+" · "+reg:name):"—";}
function switchTab(t){
  document.getElementById("tab_trips").classList.toggle("on",t==="trips");
  document.getElementById("tab_log").classList.toggle("on",t==="log");
  document.getElementById("tab_saved").classList.toggle("on",t==="saved");
  document.getElementById("tripsView").style.display=(t==="trips")?"block":"none";
  document.getElementById("logView").style.display=(t==="log")?"block":"none";
  document.getElementById("savedView").style.display=(t==="saved")?"block":"none";
  if(t==="saved"){
    if(mySavedTrips!==null)renderSavedTrips();
    else{document.getElementById("savedView").innerHTML="<div class='empty'>Loading your trips…</div>";if(!_savedLoading)loadSavedTrips();}
  }
}
/* A tour can switch vehicle/driver partway (e.g. one pair in South Andaman,
   a different pair once the group reaches Great Nicobar) — each such leg is
   a separate vehicle+driver+date-range on the operation. The SAME driver can
   appear more than once on the SAME operation too (e.g. drives leg 1, hands
   off, then drives leg 3 again) — so a driver's assignments are a list of
   entries (one per matching segment), not one entry per operation, or a
   repeat assignment would silently disappear behind the first match. */
/* Segment key — identifies WHICH leg of an operation a status update is for.
   "primary" for the operation's own Vehicle/Driver fields; legs are keyed by
   start-date + driver (stable across the chronological re-sort, unlike an
   array index). The console routes updates to the same key. */
function segKeyFor(seg,idx){return idx===0?"primary":(seg.start||"")+"|"+(seg.driver||"");}
function myTripEntries(){
  var mine=myDriver.name.trim().toLowerCase();
  var entries=[];
  allOps.forEach(function(o){
    var segs=[{start:o.startISO||o.start,end:(o.legs&&o.legs.length)?o.legs[0].start:(o.endISO||o.end),veh:o.veh,reg:o.reg,driver:o.driver}].concat(o.legs||[]);
    segs.forEach(function(seg,idx){
      if((seg.driver||"").trim().toLowerCase()!==mine)return;
      var isPrimary=(idx===0);
      entries.push({
        o:o,leg:seg,entryId:o.id+"_"+idx,segKey:segKeyFor(seg,idx),
        /* Each leg has its OWN driver-reported status/note — leg 1 can be
           Completed while leg 3 is still Scheduled. Falls back to the
           operation's real status when this driver hasn't set one. */
        status:(isPrimary?o.driverStatus:seg.driverStatus)||o.status||"Scheduled",
        fb:(isPrimary?o.driverFeedback:seg.driverFeedback)||"",
        fbAt:(isPrimary?o.driverFeedbackAt:seg.driverFeedbackAt)||""
      });
    });
  });
  return entries.sort(function(a,b){return (a.leg.start||"").localeCompare(b.leg.start||"");});
}
/* This driver's own slice of a (possibly multi-leg) operation — only their
   own working dates and vehicle, never the whole tour's span or another
   leg's assignment. Used only for the Log-trip form's pre-fill, where
   showing just the first matching segment is a fine default. */
function myLeg(o){
  var mine=myDriver.name.trim().toLowerCase();
  if((o.driver||"").trim().toLowerCase()===mine){
    var end=(o.legs&&o.legs.length)?o.legs[0].start:(o.endISO||o.end);
    return {start:o.startISO||o.start,end:end,veh:o.veh,reg:o.reg};
  }
  var leg=(o.legs||[]).find(function(l){return (l.driver||"").trim().toLowerCase()===mine;});
  if(leg)return {start:leg.start,end:leg.end,veh:leg.veh,reg:leg.reg};
  return {start:o.startISO||o.start,end:o.endISO||o.end,veh:o.veh,reg:o.reg};
}
function opStatusPillClass(s){s=(s||"").toLowerCase();if(s==="completed")return "ok";if(s==="declined"||s==="cancelled")return "warn";if(s==="transferred")return "mid";return "";}
/* A tour can sleep in more than one place. This driver's card shows only the
   stays overlapping THEIR leg's dates (a stay with no dates applies to the
   whole tour). Every stay lives in o.stays now; o.stay is only a legacy
   fallback for old operations that never had a stays list. Returns an array
   of formatted lines (one per stay) so the card can list them left-aligned. */
function staysLinesForRange(o,s,e){
  var rows=(o.stays||[]).filter(function(x){return x.stay&&x.stay!=="—";});
  if(!rows.length&&o.stay&&o.stay!=="—")rows=[{stay:o.stay}];
  if(!rows.length)return [];
  var hits=rows.filter(function(x){
    if(!x.start&&!x.end)return true;
    var xs=x.start||"0000",xe=x.end||"9999",ss=s||"0000",ee=e||"9999";
    return xs<=ee&&xe>=ss;
  });
  if(!hits.length)hits=rows;
  return hits.map(function(x){
    var extra=[];if(x.rooms!=null&&x.rooms!=="")extra.push(x.rooms+" room"+(x.rooms==1?"":"s"));if(x.note)extra.push(x.note);
    return x.stay+((x.start||x.end)?" ("+dmy(x.start)+" – "+dmy(x.end)+")":"")+(extra.length?" — "+extra.join(" · "):"");
  });
}

async function postOpStatus(entryId,opId,segKey,status,reason,clearFeedback){
  showErr("");

    data:{opId:opId,newStatus:status,reason:reason,driver:myDriver.name,segKey:segKey||"primary",clearFeedback:!!clearFeedback}};
  /* Apply locally first so the card moves instantly and offline works, then
     queue the update — flushed now if online, later if not. Apply to THIS
     segment only: leg 1 completing must not move leg 3. */
  var o=allOps.find(function(x){return x.id===opId;});
  if(o){
    var tgt=o;
    if(segKey&&segKey!=="primary"){tgt=(o.legs||[]).find(function(x){return ((x.start||"")+"|"+(x.driver||""))===segKey;})||o;}
    tgt.driverStatus=status;
    if(reason){tgt.driverFeedback=reason;tgt.driverFeedbackAt=rec.created_at;}
    else if(clearFeedback){tgt.driverFeedback="";tgt.driverFeedbackAt="";}
  }
  enqueue(rec);saveSession();renderTrips();
  await flushQueue();updateNet();
}

async function submitTrip(){
  showErr("");showOk("");
  var date=document.getElementById("dl_date").value;
  var veh=document.getElementById("dl_veh").value.trim();
  var sKm=document.getElementById("dl_startkm").value,eKm=document.getElementById("dl_endkm").value;
  if(!date||!veh){showErr("Enter the date and vehicle.");return;}
  if(eKm!==""&&sKm!==""&&(+eKm)<(+sKm)){showErr("End km must be greater than start km.");return;}
  var sT=document.getElementById("dl_startt").value,eT=document.getElementById("dl_endt").value;
  var time="—";
  if(sT&&eT){var sh=+sT.split(":")[0],sm=+sT.split(":")[1],eh=+eT.split(":")[0],em=+eT.split(":")[1];var mins=(eh*60+em)-(sh*60+sm);if(mins<0)mins+=1440;time=Math.floor(mins/60)+"h "+String(mins%60).padStart(2,"0")+"m";}
  /* Prefer the explicitly-selected tour; fall back to the old heuristic (vehicle +
     date match against assigned ops) only for an ad-hoc trip with no tour picked. */
  var tc="";

  var selOp=selOpId&&selOpId!=="custom"?allOps.find(function(o){return o.id===selOpId;}):null;

    if(!tc){showErr("Enter a name for the custom tour.");return;}
  }else if(selOp){tc=selOp.tourId||"";}
  else{
    var _sn=function(a,b){return a&&b&&String(a).trim().toLowerCase()===String(b).trim().toLowerCase();};
    var mop=(allOps||[]).find(function(o){return _sn(o.veh,veh)&&(o.startISO||"")<=date&&date<=(o.endISO||"");})||(allOps||[]).find(function(o){return _sn(o.veh,veh)&&o.tourId;})||(allOps||[]).find(function(o){return o.tourId;});
    tc=(mop&&mop.tourId)||"";
  }
  var reg=document.getElementById("dl_reg").value.trim();
  var rec={id:"S"+Date.now()+Math.floor(Math.random()*100000),type:"driver_trip_log",status:"new",name:myDriver.name,created_at:new Date().toISOString(),
    data:{date:date,veh:veh,reg:reg,startKm:sKm,endKm:eKm,loc:document.getElementById("dl_loc").value,startT:sT,endT:eT,time:time,tourCode:tc}};
  /* Queue the trip, clear the draft + form, then try to flush. The trip shows
     in Saved Trips straight away via the queue; the message reflects whether
     it actually reached the server. */
  enqueue(rec);lsDel(LS_DRAFT);saveSession();
  clearTrip();renderLogForm();
  await flushQueue();
  if(_netOk){mySavedTrips=null;loadSavedTrips(true);showOk("Trip saved — it will appear in Island Explorer's Activities Log shortly.");}
  else showOk("Trip saved on your phone — it will sync to Island Explorer automatically once the connection is back.");
  updateNet();
}

function exportTripsCSV(){
  var list=mySavedTrips||[];
  if(!list.length){alert("No saved trips yet.");return;}
  var cols=["Tour Code","Date","Vehicle","Reg. No.","Start KM","End KM","Total KM","Location","Time"];
  var esc=function(v){return '"'+String(v==null?"":v).replace(/"/g,'""')+'"';};
  var lines=[cols.join(",")].concat(list.map(function(t){return [t.tourCode||"—",dmy(t.date),t.veh||"",t.reg||regForVeh(t.veh)||"",t.startKm||0,t.endKm||0,t.totalKm||0,t.loc||"",t.time||""].map(esc).join(",");}));
  var blob=new Blob([lines.join("\n")],{type:"text/csv;charset=utf-8"});
  var url=URL.createObjectURL(blob);
