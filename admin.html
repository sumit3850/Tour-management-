<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Company approvals · Ops Console</title>
<style>
  :root{--forest:#12332a;--sea:#2f7dd1;--ink:#1b2a24;--soft:#5a6b63;--line:#e2e8e4;--surface:#fff}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;color:var(--ink);
       background:radial-gradient(1100px 700px at 20% -10%,#1d4d3b 0%,#12332a 45%,#0a201a 100%);min-height:100vh;padding:28px 16px}
  .wrap{max-width:980px;margin:0 auto}
  .card{background:var(--surface);border-radius:16px;box-shadow:0 30px 70px rgba(0,0,0,.35);padding:24px 26px;margin-bottom:18px}
  h1{margin:0 0 4px;font-size:21px}
  .sub{color:var(--soft);font-size:13.5px;margin:0 0 6px}
  label{display:block;font-size:12.5px;font-weight:600;color:var(--soft);margin:10px 0 5px}
  input{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:14px}
  .btn{padding:10px 16px;border:0;border-radius:9px;font-size:13.5px;font-weight:700;cursor:pointer}
  .btn-primary{background:var(--forest);color:#fff;width:100%;margin-top:14px;padding:12px}
  .btn-ok{background:#1c7a45;color:#fff}
  .btn-no{background:#fdeceb;color:#b23b32;border:1px solid #f4c7c2}
  .btn-ghost{background:#eef3f0;color:var(--ink)}
  .msg{padding:10px 13px;border-radius:9px;font-size:13px;display:none;margin-top:10px}
  .msg.err{display:block;background:#fdeceb;color:#b23b32}
  .row{display:flex;gap:14px;align-items:flex-start;border:1.5px solid var(--line);border-radius:13px;padding:14px;margin-top:12px}
  .logo{width:58px;height:58px;border-radius:10px;background:#f4f8f6 center/contain no-repeat;border:1px solid var(--line);flex-shrink:0}
  .meta{flex:1;min-width:0;font-size:13px;color:var(--soft);line-height:1.55}
  .meta b{color:var(--ink);font-size:15px}
  .pill{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11.5px;font-weight:700;margin-left:8px;vertical-align:2px}
  .pill.pending{background:#fff3e0;color:#b26a00}.pill.approved{background:#e9f6ee;color:#1c7a45}.pill.rejected{background:#fdeceb;color:#b23b32}
  .acts{display:flex;flex-direction:column;gap:8px;flex-shrink:0}
  .top{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .empty{color:var(--soft);font-size:13.5px;padding:18px 4px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card" id="loginCard">
    <h1>Company approvals</h1>
    <p class="sub">Platform owner sign-in. Approve or reject registered companies.</p>
    <div class="msg err" id="lerr"></div>
    <label>Email</label><input id="aemail" type="email" autocomplete="username">
    <label>Password</label><input id="apw" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')adminLogin()">
    <button class="btn btn-primary" onclick="adminLogin()">Sign in</button>
  </div>

  <div class="card" id="listCard" style="display:none">
    <div class="top">
      <div><h1>Registered companies</h1><p class="sub" id="count"></p></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" onclick="loadOrgs()">Refresh</button>
        <button class="btn btn-ghost" onclick="adminOut()">Sign out</button>
      </div>
    </div>
    <div class="msg err" id="err"></div>
    <div id="rows"></div>
  </div>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var C=(window.APP_CONFIG&&window.APP_CONFIG.supabase)||{};
var sb=null;try{sb=window.supabase.createClient(C.url,C.key);}catch(e){}
var $=function(id){return document.getElementById(id);};
function esc(s){var d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}
function showErr(id,m){var e=$(id);e.textContent=m;e.style.display='block';setTimeout(function(){e.style.display='none';},6000);}

async function adminLogin(){
  if(!sb){showErr('lerr','Cannot reach the server.');return;}
  var r=await sb.auth.signInWithPassword({email:$('aemail').value.trim(),password:$('apw').value});
  if(r.error){showErr('lerr',r.error.message);return;}
  enter();
}
async function enter(){
  $('loginCard').style.display='none';$('listCard').style.display='block';
  loadOrgs();
}
async function loadOrgs(){
  var r=await sb.rpc('admin_list_orgs');
  if(r.error){showErr('err',r.error.message);return;}
  var d=r.data;
  if(d&&d.error==='not_admin'){$('listCard').style.display='none';$('loginCard').style.display='block';showErr('lerr','This account is not a platform admin.');await sb.auth.signOut();return;}
  var orgs=Array.isArray(d)?d:[];
  $('count').textContent=orgs.filter(function(o){return o.status==='pending';}).length+' pending · '+orgs.length+' total';
  var h='';
  orgs.forEach(function(o){
    h+='<div class="row">'
      +'<div class="logo" style="background-image:url('+(o.logo_url?esc(o.logo_url):'assets/logo.png')+')"></div>'
      +'<div class="meta"><b>'+esc(o.company)+'</b><span class="pill '+esc(o.status)+'">'+esc(o.status)+'</span><br>'
      +esc(o.contact_person||o.username||'')+' · '+esc(o.email)+' · '+esc(o.phone||'—')+'<br>'
      +'CIN: '+esc(o.cin||'—')+(o.website?' · '+esc(o.website):'')+(o.domain?' · '+esc(o.domain):'')+'<br>'
      +esc(o.address||'')+'<br><span style="font-size:11.5px">Workspace: '+esc(o.workspace)+' · Registered: '+esc((o.created_at||'').slice(0,10))+'</span></div>'
      +'<div class="acts">'
      +(o.status!=='approved'?'<button class="btn btn-ok" onclick="setStatus(\''+o.id+'\',\'approved\')">Approve</button>':'')
      +(o.status!=='rejected'?'<button class="btn btn-no" onclick="setStatus(\''+o.id+'\',\'rejected\')">Reject</button>':'')
      +(o.status!=='pending'?'<button class="btn btn-ghost" onclick="setStatus(\''+o.id+'\',\'pending\')">Set pending</button>':'')
      +'</div></div>';
  });
  $('rows').innerHTML=h||'<div class="empty">No companies registered yet.</div>';
}
async function setStatus(id,st){
  var r=await sb.rpc('admin_set_org_status',{p_org:id,p_status:st});
  if(r.error||(r.data&&r.data.error)){showErr('err',(r.error&&r.error.message)||r.data.error);return;}
  loadOrgs();
}
async function adminOut(){await sb.auth.signOut();location.reload();}
/* auto-enter if already signed in */
if(sb)sb.auth.getSession().then(function(r){if(r&&r.data&&r.data.session)enter();});
</script>
</body>
</html>
