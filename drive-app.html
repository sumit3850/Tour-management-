<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Island Explorer Drive</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Calistoga&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f2016;--sidebar:#15281e;--card:#162c21;--card-h:#1a3527;--ink:#e8e2d8;--ink-soft:#8a8a7c;--line:#1e3b2b;--line-h:#2a4f3a;--teal:#7ccbab;--teal-800:#235e4b;--sea:#5db2d1;--rose:#e07a7a;--amber:#e6c26e;--forest:#1b4d3e;--surface:#1b3627;--surface-2:#fbf9f3;--surface-3:#e8e2d8;--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;overflow:hidden}
a{color:var(--teal);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none}

/* Sidebar */
.sidebar{width:240px;background:var(--sidebar);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:20px 0}
.sidebar-head{padding:0 20px 16px;border-bottom:1px solid var(--line);margin-bottom:12px}
.sidebar-head .logo{font-family:'Calistoga',Georgia,serif;font-size:18px;color:var(--teal);line-height:1.2}
.sidebar-head .sub{font-size:11px;color:var(--ink-soft);margin-top:2px;letter-spacing:.04em}
.sidebar-head .sub2{font-size:10px;color:var(--ink-soft);margin-top:4px;font-family:'JetBrains Mono',monospace}

.nav-group{padding:10px 20px 4px;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 20px;font-size:13px;color:var(--ink);cursor:pointer;transition:background .15s;border:none;background:transparent;width:100%;font-family:inherit}
.nav-item:hover{background:var(--line-h)}
.nav-item.active{background:var(--line-h);border-left:3px solid var(--teal)}
.nav-item svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:var(--sidebar)}
.topbar h1{font-size:15px;font-weight:600;letter-spacing:-.01em}
.topbar .actions{display:flex;gap:8px;align-items:center}

/* Content */
.content{flex:1;overflow:auto;padding:24px}

/* Upload zone */
.upload-zone{border:2px dashed var(--line-h);border-radius:var(--radius);padding:40px;text-align:center;transition:all .2s;background:var(--card);cursor:pointer}
.upload-zone:hover{border-color:var(--teal);background:var(--card-h)}
.upload-zone svg{width:48px;height:48px;stroke:var(--teal);fill:none;stroke-width:1.5;margin-bottom:12px}
.upload-zone h3{font-size:16px;font-weight:600;margin-bottom:4px}
.upload-zone p{font-size:13px;color:var(--ink-soft)}

/* File grid */
.file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-top:20px}
.file-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;transition:all .15s;position:relative}
.file-card:hover{border-color:var(--line-h);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.2)}
.file-card .icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;font-size:18px}
.file-card .icon.pdf{background:rgba(224,122,122,.15);color:var(--rose)}
.file-card .icon.doc{background:rgba(93,178,209,.15);color:var(--sea)}
.file-card .icon.img{background:rgba(124,203,171,.15);color:var(--teal)}
.file-card .icon.xls{background:rgba(230,194,110,.15);color:var(--amber)}
.file-card .name{font-size:13px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-card .meta{font-size:11px;color:var(--ink-soft)}
.file-card .tags{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.file-card .tag{font-size:10px;padding:2px 8px;border-radius:20px;background:var(--line);color:var(--ink-soft)}
.file-card .actions{position:absolute;top:12px;right:12px;display:flex;gap:4px;opacity:0;transition:opacity .15s}
.file-card:hover .actions{opacity:1}
.file-card .actions button{width:28px;height:28px;border-radius:6px;background:var(--sidebar);color:var(--ink);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer}
.file-card .actions button:hover{background:var(--teal);color:#fff}

/* Tour filter */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-bar select,.filter-bar input{background:var(--card);border:1px solid var(--line);color:var(--ink);padding:8px 12px;border-radius:8px;font-family:inherit;font-size:13px;outline:none}
.filter-bar select:focus,.filter-bar input:focus{border-color:var(--teal)}
.filter-bar .count{margin-left:auto;font-size:12px;color:var(--ink-soft)}

/* Buttons */
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn-primary{background:var(--forest);color:var(--ink)}
.btn-primary:hover{background:var(--teal-800)}
.btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
.btn-ghost:hover{background:var(--line-h)}
.btn-sea{background:var(--sea);color:#fff}
.btn-sea:hover{opacity:.9}
.btn-sm{padding:6px 12px;font-size:12px}

/* Connect banner */
.connect-banner{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;text-align:center;margin-bottom:20px}
.connect-banner h3{font-size:15px;margin-bottom:4px}
.connect-banner p{font-size:12px;color:var(--ink-soft);margin-bottom:12px}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--forest);color:var(--ink);padding:10px 18px;border-radius:10px;font-size:13px;transform:translateY(100px);transition:transform .3s;z-index:1000}
.toast.show{transform:translateY(0)}

/* Storage files (local mock) */
.local-files .file-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;background:var(--card);margin-bottom:6px;border:1px solid var(--line)}
.local-files .file-row:hover{border-color:var(--line-h)}
.local-files .file-icon{font-size:20px;width:36px;text-align:center}
.local-files .file-info{flex:1;min-width:0}
.local-files .file-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.local-files .file-meta{font-size:11px;color:var(--ink-soft)}
.local-files .file-actions{display:flex;gap:4px}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--ink-soft)}
.empty svg{width:64px;height:64px;stroke:var(--line-h);fill:none;stroke-width:1.2;margin-bottom:16px}
.empty h3{font-size:16px;color:var(--ink);margin-bottom:4px}
.empty p{font-size:13px}

/* Responsive */
@media(max-width:768px){.sidebar{width:0;padding:0;overflow:hidden}.content{padding:16px}}
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-head">
    <div class="logo">Island Explorer</div>
    <div class="sub">Google Drive App</div>
    <div class="sub2" id="connStatus">Disconnected</div>
  </div>

  <div class="nav-group">Drive</div>
  <button class="nav-item active" onclick="switchTab('all')" id="nav-all">
    <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    All Files
  </button>
  <button class="nav-item" onclick="switchTab('tours')" id="nav-tours">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    Tour Documents
  </button>
  <button class="nav-item" onclick="switchTab('quotes')" id="nav-quotes">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8M16 17H8M10 9H8"/></svg>
    Quotations
  </button>
  <button class="nav-item" onclick="switchTab('guests')" id="nav-guests">
    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Guest Lists
  </button>

  <div class="nav-group">Actions</div>
  <button class="nav-item" onclick="showUpload()">
    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
    Upload Files
  </button>
  <button class="nav-item" onclick="showConnect()">
    <svg viewBox="0 0 24 24"><path d="M15 7h3a5 5 0 0 1 5 5 5 5 0 0 1-5 5h-3m-6 0H6a5 5 0 0 1-5-5 5 5 0 0 1 5-5h3"/><path d="M8 12h8"/></svg>
    Connect Drive
  </button>
  <button class="nav-item" onclick="window.open('https://drive.google.com','_blank')">
    <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14L21 3"/></svg>
    Open Drive
  </button>

  <div style="margin-top:auto;padding:16px 20px;border-top:1px solid var(--line)">
    <a href="index.html" class="nav-item" style="padding:8px 0">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
      Back to Ops
    </a>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <h1 id="pageTitle">All Files</h1>
    <div class="actions">
      <button class="btn btn-ghost btn-sm" onclick="showConnect()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
        How to Connect
      </button>
      <button class="btn btn-primary btn-sm" onclick="showUpload()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
        Upload
      </button>
    </div>
  </div>

  <div class="content" id="content">
    <!-- Dynamic content -->
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== Tour names for tags =====
const TOUR_NAMES = [
  "5-Night South Andaman",
  "7-Night South & Little Andaman",
  "8-Night South & Little Andaman",
  "12-Night Great Nicobar",
  "Guided Session - Full Day",
  "Guided Session - Night",
  "Custom Expedition"
];

// ===== Demo files =====
let files = [
  {id:1,name:"Q-2025-054_Great-Nicobar_Fernandez.pdf",type:"pdf",size:"142 KB",tour:"12-Night Great Nicobar",category:"quotations",date:"2026-01-18"},
  {id:2,name:"Q-2025-053_South-Andaman_Marsh-Vogel-Tan.pdf",type:"pdf",size:"98 KB",tour:"5-Night South Andaman",category:"quotations",date:"2026-01-12"},
  {id:3,name:"Q-2025-055_South-Little-Andaman_Bianchi.pdf",type:"pdf",size:"112 KB",tour:"7-Night South & Little Andaman",category:"quotations",date:"2026-02-03"},
  {id:4,name:"Guest-List_Fernandez+2_Great-Nicobar.xlsx",type:"xls",size:"18 KB",tour:"12-Night Great Nicobar",category:"guests",date:"2026-01-20"},
  {id:5,name:"Guest-List_Marsh-Vogel-Tan_South-Andaman.xlsx",type:"xls",size:"24 KB",tour:"5-Night South Andaman",category:"guests",date:"2026-01-15"},
  {id:6,name:"Itinerary_Great-Nicobar-12N.docx",type:"doc",size:"156 KB",tour:"12-Night Great Nicobar",category:"tours",date:"2025-12-10"},
  {id:7,name:"Itinerary_South-Andaman-5N.docx",type:"doc",size:"134 KB",tour:"5-Night South Andaman",category:"tours",date:"2025-12-10"},
  {id:8,name:"Itinerary_South-Little-Andaman-7N.docx",type:"doc",size:"148 KB",tour:"7-Night South & Little Andaman",category:"tours",date:"2025-12-10"},
  {id:9,name:"Permit-Checklist_Great-Nicobar.pdf",type:"pdf",size:"62 KB",tour:"12-Night Great Nicobar",category:"tours",date:"2026-01-05"},
  {id:10,name:"Vehicle-Assignment_Jan-2026.xlsx",type:"xls",size:"32 KB",tour:"All Tours",category:"tours",date:"2026-01-01"},
  {id:11,name:"Expense-Report_Dec-2025.xlsx",type:"xls",size:"45 KB",tour:"All Tours",category:"tours",date:"2026-01-02"},
  {id:12,name:"Post-Tour-Summary_Great-Nicobar-Dec.xlsx",type:"xls",size:"28 KB",tour:"12-Night Great Nicobar",category:"tours",date:"2026-01-10"},
  {id:13,name:"Marsh_Repeat-Guest-Notes.docx",type:"doc",size:"8 KB",tour:"5-Night South Andaman",category:"guests",date:"2026-01-08"},
  {id:14,name:"Fernandez_Photo-Release.pdf",type:"pdf",size:"45 KB",tour:"12-Night Great Nicobar",category:"guests",date:"2026-01-14"},
  {id:15,name:"Invoice-2025-054_Great-Nicobar.pdf",type:"pdf",size:"88 KB",tour:"12-Night Great Nicobar",category:"quotations",date:"2026-01-22"},
];

let currentTab = 'all';
let searchTerm = '';

// ===== Icon map =====
function fileIcon(type) {
  const map = {pdf:'\u{1F4C4}',doc:'\u{1F4C4}',xls:'\u{1F4CA}',img:'\u{1F5BC}',default:'\u{1F4C1}'};
  return map[type] || map.default;
}

function fileIconClass(type) {
  return type;
}

// ===== Render files =====
function renderFiles() {
  const $c = document.getElementById('content');
  let filtered = files;

  if (currentTab !== 'all') {
    const catMap = {tours:'tours',quotes:'quotations',guests:'guests'};
    filtered = filtered.filter(f => f.category === catMap[currentTab]);
  }

  if (searchTerm) {
    const s = searchTerm.toLowerCase();
    filtered = filtered.filter(f => f.name.toLowerCase().includes(s) || f.tour.toLowerCase().includes(s));
  }

  // Filter bar
  let html = `<div class="filter-bar">
    <select onchange="filterByTour(this.value)" id="tourFilter">
      <option value="">All Tours</option>
      ${TOUR_NAMES.map(t => `<option value="${t}">${t}</option>`).join('')}
    </select>
    <input type="text" placeholder="Search files..." oninput="searchFiles(this.value)" value="${searchTerm}">
    <span class="count">${filtered.length} file${filtered.length!==1?'s':''}</span>
  </div>`;

  if (filtered.length === 0) {
    html += `<div class="empty">
      <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="3"/></svg>
      <h3>No files found</h3>
      <p>Upload files or adjust your filters</p>
    </div>`;
    $c.innerHTML = html;
    return;
  }

  // File grid
  html += `<div class="file-grid">`;
  filtered.forEach(f => {
    const icon = fileIcon(f.type);
    const iconClass = fileIconClass(f.type);
    html += `
      <div class="file-card">
        <div class="actions">
          <button onclick="downloadFile(${f.id})" title="Download">\u{2B07}</button>
          <button onclick="deleteFile(${f.id})" title="Delete">\u{1F5D1}</button>
        </div>
        <div class="icon ${iconClass}">${icon}</div>
        <div class="name">${f.name}</div>
        <div class="meta">${f.size} &middot; ${f.date}</div>
        <div class="tags">
          <span class="tag">${f.tour}</span>
          <span class="tag">${f.type.toUpperCase()}</span>
        </div>
      </div>`;
  });
  html += `</div>`;

  $c.innerHTML = html;

  // Restore tour filter
  const tf = document.getElementById('tourFilter');
  if (tf) {
    const urlTour = new URLSearchParams(location.search).get('tour');
    if (urlTour) tf.value = urlTour;
  }
}

// ===== Tab switching =====
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('nav-' + tab)?.classList.add('active');

  const titles = {all:'All Files',tours:'Tour Documents',quotes:'Quotations',guests:'Guest Lists'};
  document.getElementById('pageTitle').textContent = titles[tab] || 'Files';

  renderFiles();
}

// ===== Search & Filter =====
function searchFiles(term) {
  searchTerm = term;
  renderFiles();
}

function filterByTour(tour) {
  if (tour) {
    searchTerm = tour;
  } else {
    searchTerm = '';
  }
  renderFiles();
}

// ===== Upload =====
function showUpload() {
  const $c = document.getElementById('content');
  $c.innerHTML = `
    <div class="connect-banner">
      <h3>Upload Files</h3>
      <p>Select files from your device to store in the Island Explorer document library.</p>
      <div style="margin-top:16px">
        <label class="btn btn-primary" style="cursor:pointer;display:inline-flex">
          <input type="file" multiple style="display:none" onchange="handleFiles(this.files)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
          Choose Files
        </label>
      </div>
      <div style="margin-top:12px">
        <p style="font-size:11px">Supported: PDF, DOC, XLS, XLSX, JPG, PNG</p>
      </div>
    </div>
    <div id="uploadPreview"></div>
  `;
}

function handleFiles(fileList) {
  const preview = document.getElementById('uploadPreview');
  if (!preview) return;

  let html = '<h3 style="margin-bottom:12px;font-size:14px">Selected Files</h3>';
  Array.from(fileList).forEach(file => {
    const type = file.name.endsWith('.pdf') ? 'pdf' : file.name.match(/\.(xls|xlsx)$/) ? 'xls' : 'doc';
    const id = Date.now() + Math.random();

    files.unshift({
      id: id,
      name: file.name,
      type: type,
      size: (file.size / 1024).toFixed(0) + ' KB',
      tour: 'Unsorted',
      category: currentTab === 'all' ? 'tours' : currentTab,
      date: new Date().toISOString().split('T')[0]
    });

    html += `<div class="local-files"><div class="file-row">
      <span class="file-icon">${fileIcon(type)}</span>
      <div class="file-info">
        <div class="file-name">${file.name}</div>
        <div class="file-meta">${(file.size/1024).toFixed(0)} KB</div>
      </div>
      <span style="color:var(--teal);font-size:12px">\u2713 Added</span>
    </div></div>`;
  });

  preview.innerHTML = html;
  toast(`${fileList.length} file(s) added to library`);
  saveFiles();
}

// ===== File actions =====
function downloadFile(id) {
  const f = files.find(x => x.id === id);
  if (!f) return;

  // Create a dummy download
  const blob = new Blob(['This is a demo file: ' + f.name + '\n\nIn production, this would download the actual file from Google Drive.'], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = f.name;
  a.click();
  URL.revokeObjectURL(url);

  toast('Downloading: ' + f.name);
}

function deleteFile(id) {
  if (!confirm('Delete this file?')) return;
  files = files.filter(f => f.id !== id);
  renderFiles();
  saveFiles();
  toast('File deleted');
}

// ===== Connect to Drive =====
function showConnect() {
  const $c = document.getElementById('content');
  $c.innerHTML = `
    <div class="connect-banner">
      <h3>Connect Google Drive</h3>
      <p>To link with your Google Drive account, follow these steps:</p>
    </div>

    <div style="background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px">
      <h4 style="margin-bottom:12px;color:var(--teal)">Step 1: Create a Google Cloud Project</h4>
      <ol style="font-size:13px;color:var(--ink-soft);padding-left:20px;line-height:2">
        <li>Go to <a href="https://console.cloud.google.com/" target="_blank">Google Cloud Console</a></li>
        <li>Create a new project named "Island Explorer Drive"</li>
        <li>Enable the <strong>Google Drive API</strong></li>
        <li>Go to Credentials &rarr; Create OAuth 2.0 Client ID (Web application)</li>
        <li>Add <code>${location.origin}</code> as an authorized origin</li>
        <li>Copy your <strong>Client ID</strong></li>
      </ol>
    </div>

    <div style="background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px">
      <h4 style="margin-bottom:12px;color:var(--teal)">Step 2: Configure This App</h4>
      <ol style="font-size:13px;color:var(--ink-soft);padding-left:20px;line-height:2">
        <li>Open <code>drive-app.html</code> in a text editor</li>
        <li>Find the line: <code>const CLIENT_ID = 'YOUR_CLIENT_ID_HERE';</code></li>
        <li>Replace with your actual Client ID</li>
        <li>Save and reload this page</li>
        <li>Click "Authorize" below</li>
      </ol>
    </div>

    <div style="background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px">
      <h4 style="margin-bottom:12px;color:var(--teal)">Step 3: Authorize</h4>
      <p style="font-size:13px;color:var(--ink-soft);margin-bottom:12px">Click the button below to authorize access to your Google Drive.</p>
      <button class="btn btn-primary" onclick="authorizeDrive()">Authorize Google Drive</button>
      <p style="font-size:11px;color:var(--ink-soft);margin-top:8px">You can revoke access anytime at <a href="https://myaccount.google.com/permissions" target="_blank">Google Account Permissions</a>.</p>
    </div>
  `;
}

function authorizeDrive() {
  toast('In production, this would open the Google OAuth consent screen. For now, files are stored locally.');
  document.getElementById('connStatus').textContent = 'Local Mode (Demo)';
  document.getElementById('connStatus').style.color = 'var(--amber)';
}

// ===== Persistence =====
function saveFiles() {
  try { localStorage.setItem('ie_drive_files', JSON.stringify(files)); } catch(e) {}
}

function loadFiles() {
  try {
    const saved = localStorage.getItem('ie_drive_files');
    if (saved) files = JSON.parse(saved);
  } catch(e) {}
}

// ===== Toast =====
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ===== Init =====
loadFiles();
renderFiles();
</script>
</body>
</html>
